<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>萌宠管家-登录正常+云端实时互通最终版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:80px;font-family:sans-serif;}
/*登录弹窗*/
.login-pop{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;display:flex;align-items:center;justify-content:center;}
.box{width:85%;background:#fff;border-radius:16px;padding:20px;}
.btn-switch{display:flex;border-bottom:1px solid #eee;margin-bottom:15px;}
.s-item{flex:1;text-align:center;padding:12px 0;font-size:16px;cursor:pointer;}
.s-item.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none !important;}
input{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin:8px 0;}
textarea{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin:8px 0;}
.btn{width:100%;background:#ff5c8d;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;margin-top:8px;}
#userTip{text-align:right;padding:10px;color:#666;}

/*底部导航*/
#nav{position:fixed;bottom:0;left:0;width:100%;height:52px;background:#fff;display:flex;z-index:999;box-shadow:0 -1px 4px #eee;}
.nav-i{flex:1;text-align:center;line-height:52px;font-size:15px;color:#666;}
.nav-i.active{color:#ff5c8d;font-weight:bold;}
.main{padding:15px;margin-bottom:60px;}
.banner{width:100%;height:120px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:bold;margin-bottom:15px;}
.post-card{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px;}
.reply-area{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>

<!--登录注册-->
<div class="login-pop" id="loginPop">
<div class="box">
<div class="btn-switch">
<div class="s-item active" id="tabLogin">登录</div>
<div class="s-item" id="tabReg">注册</div>
</div>
<div id="formLogin">
<input id="lAcc" placeholder="登录账号">
<input id="lPwd" type="password" placeholder="登录密码">
<button class="btn" onclick="doLogin()">立即登录</button>
</div>
<div id="formReg" class="hide">
<input id="rAcc" placeholder="注册账号">
<input id="rNick" placeholder="社区昵称">
<input id="rPwd" type="password" placeholder="设置密码">
<button class="btn" onclick="doReg()">立即注册</button>
</div>
</div>
</div>

<div id="userTip">👤 未登录</div>

<div class="main">
<!--预约-->
<div class="page-show" id="page0">
<div class="banner">🐾上门萌宠喂养预约</div>
<input id="uname" placeholder="您的称呼">
<input id="phone" placeholder="手机号码">
<input id="addr" placeholder="上门详细地址">
<input type="datetime-local" id="ptime">
<textarea id="note" rows="3" placeholder="备注说明"></textarea>
<button class="btn" onclick="saveOrder()">提交预约</button>
</div>

<!--社区互通-->
<div id="page1" style="display:none;">
<div class="banner">🐱宠友实时云端社区</div>
<div class="form-box">
<textarea id="postText" placeholder="登录后发布养宠动态"></textarea>
<button class="btn" onclick="pubPost()">发布帖子</button>
</div>
<div id="postList">加载云端数据中...</div>
</div>

<!--商家后台-->
<div id="page2" style="display:none;">
<div class="banner">🔐商家管理中心</div>
<input type="password" id="admPwd" placeholder="管理员密码">
<button class="btn" onclick="admLogin()">进入后台</button>
<div id="admBox"></div>
</div>
</div>

<!--底部导航-->
<div id="nav">
<div class="nav-i active" onclick="switchPage(0)">预约</div>
<div class="nav-i" onclick="switchPage(1)">社区</div>
<div class="nav-i" onclick="switchPage(2)">后台</div>
</div>

<script>
//登录注册切换绑定
let tabLogin = document.getElementById('tabLogin');
let tabReg = document.getElementById('tabReg');
let formLogin = document.getElementById('formLogin');
let formReg = document.getElementById('formReg');

tabLogin.onclick = function(){
  tabLogin.classList.add('active');tabReg.classList.remove('active');
  formLogin.classList.remove('hide');formReg.classList.add('hide');
}
tabReg.onclick = function(){
  tabReg.classList.add('active');tabLogin.classList.remove('active');
  formReg.classList.remove('hide');formLogin.classList.add('hide');
}

//用户账号本地存储（保留你已注册的账号，不用重新建）
function getUserList(){
  return JSON.parse(localStorage.getItem('userList')||'[]');
}
let currentUser = null;

//注册
function doReg(){
  let a = rAcc.value.trim();
  let n = rNick.value.trim();
  let p = rPwd.value.trim();
  if(!a||!n||!p){alert('账号、昵称、密码不能为空');return;}
  let arr = getUserList();
  if(arr.some(x=>x.acc===a)){alert('账号已存在');return;}
  arr.push({acc:a,nick:n,pwd:p});
  localStorage.setItem('userList',JSON.stringify(arr));
  alert('注册成功！请切换登录');
  tabLogin.onclick();
}

//登录
function doLogin(){
  let a = lAcc.value.trim();
  let p = lPwd.value.trim();
  let arr = getUserList();
  let u = arr.find(item=>item.acc===a && item.pwd===p);
  if(!u){alert('账号或密码错误');return;}
  currentUser = u;
  userTip.innerText = '✅ 当前登录：'+u.nick;
  loginPop.style.display = 'none';
  renderCloudData();
}

//页面切换
function switchPage(idx){
  document.querySelectorAll('.main>div').forEach(el=>el.style.display='none');
  if(idx===0) page0.style.display='block';
  if(idx===1){page1.style.display='block';if(currentUser)renderCloudData();}
  if(idx===2) page2.style.display='block';
  document.querySelectorAll('.nav-i').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });
}

//预约本地保存
function saveOrder(){
  let data = {
    n:uname.value,p:phone.value,a:addr.value,t:ptime.value,nt:note.value
  };
  let list = JSON.parse(localStorage.getItem('petOrder')||'[]');
  list.unshift(data);
  localStorage.setItem('petOrder',JSON.stringify(list));
  alert('预约提交成功！');
}

// ========== 公共云端 帖子+评论 实时互通核心 ==========
const cloudUrl = "https://jsonblob.com/api/jsonBlob/1157000000000000000";

async function getCloud(){
  try{
    let res = await fetch(cloudUrl+"?_t="+Date.now());
    return await res.json() || [];
  }catch(e){return [];}
}
async function setCloud(d){
  await fetch(cloudUrl,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(d)
  });
}

//发布帖子 云端同步
async function pubPost(){
  if(!currentUser){alert('请先登录账号');return;}
  let txt = postText.value.trim();
  if(!txt){alert('内容不能为空');return;}
  let arr = await getCloud();
  arr.unshift({
    id:Date.now(),
    nick:currentUser.nick,
    content:txt,
    reply:[]
  });
  await setCloud(arr);
  postText.value = '';
  renderCloudData();
  alert('发布成功，好友手机立刻可见');
}

//渲染帖子+所有评论
async function renderCloudData(){
  let arr = await getCloud();
  let html = '';
  if(arr.length===0){
    html = '<div style="padding:30px;text-align:center;color:#999;">暂无共享帖子，快来首发</div>';
  }else{
    arr.forEach(item=>{
      html += `<div class="post-card">
        <strong>🐾 ${item.nick}</strong>
        <div style="margin:8px 0;">${item.content}</div>
        <div class="reply-area">
          <input placeholder="回复昵称">
          <textarea placeholder="写下你的回复"></textarea>
