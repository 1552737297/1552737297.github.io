<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼豆图纸生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: #6366f1;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
    }

    .upload-area {
      background: white;
      border: 3px dashed #d1d5db;
      border-radius: 20px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .upload-area:hover {
      border-color: #6366f1;
      background: #f8faff;
    }

    #fileInput {
      display: none;
    }

    .brand-tabs {
      background: white;
      border-radius: 20px;
      padding: 15px;
      display: flex;
      gap: 15px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .brand-tab {
      padding: 10px 20px;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      background: white;
      cursor: pointer;
    }

    .brand-tab.active {
      background: #6366f1;
      color: white;
      border-color: #6366f1;
    }

    .settings-panel {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
    }

    .setting-item {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .slider-container {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    #sizeSlider {
      flex: 1;
    }

    .generate-btn {
      width: 100%;
      padding: 18px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
    }

    .result-tabs {
      background: white;
      display: flex;
      margin-top: 20px;
    }

    .result-tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
    }

    .result-tab.active {
      background: #6366f1;
      color: white;
    }

    .result-area {
      background: white;
      padding: 20px;
      overflow: auto;
      max-height: 600px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    #originalImage {
      max-width: 100%;
    }

    .beads-grid {
      border-collapse: collapse;
      width: 100%;
      font-size: 7px;
    }

    .beads-grid th, .beads-grid td {
      border: 1px solid #ccc;
      min-width: 14px;
      height: 14px;
      text-align: center;
    }

    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 16px;
    }

    .crop-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 15px;
    }

    .crop-btn {
      padding: 10px 30px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .confirm {
      background: #10b981;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>拼豆图纸生成器</h1>
  </div>

  <label class="upload-area">
    点击上传图片
    <input type="file" id="fileInput" accept="image/*">
  </label>

  <div class="brand-tabs">
    <div class="brand-tab active" data-brand="MARD">MARD</div>
    <div class="brand-tab" data-brand="COCO">COCO</div>
  </div>

  <div class="settings-panel">
    <div class="setting-item">
      <label>水平反转</label>
      <input type="checkbox" id="flipCheckbox">
    </div>
    <div class="setting-item">
      <label>去除背景</label>
      <input type="checkbox" id="removeBgCheckbox">
    </div>
    <div class="setting-item">
      <label>网格大小</label>
      <div class="slider-container">
        <input type="range" id="sizeSlider" min="10" max="60" value="32">
        <span id="sizeValue">32×32</span>
      </div>
    </div>
    <button class="generate-btn" id="generateBtn">生成拼豆图纸</button>
  </div>

  <div class="result-tabs">
    <div class="result-tab" data-tab="original">原图</div>
    <div class="result-tab active" data-tab="result">图纸</div>
    <div class="result-tab" data-tab="preview">预览</div>
  </div>

  <div class="result-area">
    <div class="tab-content" id="originalTab">
      <img id="originalImage">
    </div>
    <div class="tab-content active" id="resultTab">
      <div id="beadsGridContainer"></div>
    </div>
    <div class="tab-content" id="previewTab">
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</div>

<div class="modal" id="cropModal">
  <div class="modal-content">
    <canvas id="cropCanvas"></canvas>
    <div class="crop-buttons">
      <button class="crop-btn confirm" id="cropConfirm">确认裁剪</button>
      <button class="crop-btn" id="cropCancel">取消</button>
    </div>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeValue = document.getElementById('sizeValue');
  const generateBtn = document.getElementById('generateBtn');
  const cropModal = document.getElementById('cropModal');
  const cropCanvas = document.getElementById('cropCanvas');
  const cropConfirm = document.getElementById('cropConfirm');
  const cropCancel = document.getElementById('cropCancel');
  const originalImageEl = document.getElementById('originalImage');
  const beadsGridContainer = document.getElementById('beadsGridContainer');
  const previewCanvas = document.getElementById('previewCanvas');

  let originalImage;
  let croppedImage;
  let gridSize = 32;

  const brandColors = {
    MARD: [
      { code: 'H2', rgb: [255,255,255] },
      { code: 'K1', rgb: [0,0,0] },
      { code: 'R1', rgb: [255,0,0] },
      { code: 'G1', rgb: [0,255,0] },
      { code: 'B1', rgb: [0,0,255] },
      { code: 'Y1', rgb: [255,255,0] },
    ],
    COCO: [
      { code: 'W', rgb: [255,255,255] },
      { code: 'BL', rgb: [0,0,0] },
      { code: 'RD', rgb: [255,0,0] },
    ]
  };

  // 尺寸滑块
  sizeSlider.addEventListener('input', () => {
    gridSize = +sizeSlider.value;
    sizeValue.textContent = `${gridSize}×${gridSize}`;
  });

  // 上传图片
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;

        originalImage = img;
        openCropModal(img);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
