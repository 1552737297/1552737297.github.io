<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>泰拉瑞亚 终极Bug修复+生命+存档+背包</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;touch-action:none;}
body{background:#000;overflow:hidden;}
#gameCanvas{display:block;background:#87CEEB;}

.ctrl{z-index:20;}
.left-ctrl{position:fixed;bottom:120px;left:20px;display:flex;gap:15px;}
.right-ctrl{position:fixed;bottom:120px;right:20px;display:flex;flex-direction:column;gap:15px;}
.btn{width:70px;height:70px;background:rgba(0,0,0,0.5);border-radius:50%;color:#fff;text-align:center;line-height:70px;font-size:22px;border:2px solid #fff;}

.inventory-bar{
    position:fixed;
    bottom:20px;left:50%;transform:translateX(-50%);
    background:rgba(20,20,20,0.8);
    padding:10px 15px;border-radius:12px;
    display:flex;gap:8px;z-index:30;
}
.inv-slot{
    width:55px;height:55px;background:#333;
    border:2px solid #666;border-radius:8px;color:#fff;
    font-size:14px;padding:3px;text-align:right;
}
.inv-slot.active{border-color:#ffd700;box-shadow:0 0 8px #ffd700;}

.hp-ui{position:fixed;top:15px;left:15px;display:flex;gap:4px;z-index:40;}
.heart{width:28px;height:28px;background:#e74c3c;border-radius:50%;}
.heart.empty{background:#444;}
.save-btn{position:fixed;top:15px;right:15px;padding:8px 16px;background:#27ae60;color:#fff;border-radius:8px;z-index:40;border:none;font-size:16px;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div class="left-ctrl">
<div class="btn" id="btnL">←</div>
<div class="btn" id="btnR">→</div>
</div>
<div class="right-ctrl">
<div class="btn" id="btnJ">跳跃</div>
</div>

<div class="hp-ui" id="hpUI"></div>
<button class="save-btn" id="saveBtn">存档</button>

<div class="inventory-bar">
    <div class="inv-slot active" data-id="0"></div>
    <div class="inv-slot" data-id="2"></div>
    <div class="inv-slot" data-id="1"></div>
    <div class="inv-slot" data-id="3"></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.onresize = resize;

const TILE = 32;
const WORLD_W = 80;
const WORLD_H = 30;

let world = [];
let mobs = [];

// 初始化纯净地形（修复数组错位BUG）
function initFreshWorld(){
    world = [];
    for(let y = 0; y < WORLD_H; y++){
        world[y] = [];
        for(let x = 0; x < WORLD_W; x++){
            let groundH = Math.floor(WORLD_H/2 + Math.sin(x * 0.1) * 4);
            if(y < groundH) world[y][x] = 0;
            else if(y === groundH) world[y][x] = 2;
            else if(y < groundH + 8) world[y][x] = 1;
            else world[y][x] = 3;
        }
    }
}

// 玩家基础
let player = {
    x: WORLD_W / 2 * TILE,
    y: 10 * TILE,
    w:24, h:32,
    vx:0, vy:0,
    speed:3.5,
    gravity:0.5,
    jumpPower:-13,
    onGround:false,
    hp:5,
    maxHp:5
};

// 按键
let key = {left:false, right:false, jump:false};
document.getElementById("btnL").addEventListener("touchstart",e=>{e.preventDefault();key.left=true;});
document.getElementById("btnL").addEventListener("touchend",()=>key.left=false);
document.getElementById("btnR").addEventListener("touchstart",e=>{e.preventDefault();key.right=true;});
document.getElementById("btnR").addEventListener("touchend",()=>key.right=false);
document.getElementById("btnJ").addEventListener("touchstart",e=>{e.preventDefault();if(player.onGround)key.jump=true;});

// 背包 & 选中物品
let bag = {1:10,2:5,3:8};
let selectItem = 0;
const slots = document.querySelectorAll(".inv-slot");
slots.forEach(slot=>{
    slot.addEventListener("touchstart",e=>{
        e.preventDefault();
        slots.forEach(s=>s.classList.remove("active"));
        slot.classList.add("active");
        selectItem = Number(slot.dataset.id);
    });
});

// 精准固体判定 修复方块检测bug
function isSolid(px,py){
    let tx = Math.floor(px / TILE);
    let ty = Math.floor(py / TILE);
    if(tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return true;
    return world[ty][tx] > 0;
}
function checkCollision(x,y,w,h){
    return isSolid(x,y) || isSolid(x+w,y) || isSolid(x,y+h) || isSolid(x+w,y+h);
}

// 修复挖矿&放置
canvas.addEventListener("touchstart",e=>{
    e.preventDefault();
    let t = e.touches[0];
    let rect = canvas.getBoundingClientRect();
    let camX = player.x - canvas.width/2;
    let camY = player.y - canvas.height/2;

    let wx = (t.clientX - rect.left) + camX;
    let wy = (t.clientY - rect.top) + camY;

    let tileX = Math.floor(wx / TILE);
    let tileY = Math.floor(wy / TILE);
    if(tileX <0||tileX>=WORLD_W||tileY<0||tileY>=WORLD_H) return;

    let bid = world[tileY][tileX];
    if(selectItem === 0){
        if(bid > 0){
            world[tileY][tileX] = 0;
            bag[bid] = (bag[bid]||0)+1;
        }
    }else{
        if(bid === 0 && bag[selectItem]>0){
            world[tileY][tileX] = selectItem;
            bag[selectItem]--;
        }
    }
});

// 怪物生成
function spawnMob(){
    let side = Math.random()>0.5 ? 1 : -1;
    let mx = player.x + side * 350;
    let my = Math.floor(WORLD_H/2)*TILE;
    mobs.push({x:mx,y:my,w:28,h:28,speed:1,cool:0});
}
setInterval(spawnMob,3000);

// 红心UI
function renderHeartUI(){
    let html = "";
    for(let i=0;i<player.maxHp;i++){
        html += `<div class="heart ${i < player.hp ? '' : 'empty'}"></div>`;
    }
    document.getElementById("hpUI").innerHTML = html;
}

// 存档读取 防报错
function loadGameData(){
    let save = localStorage.getItem("teraSaveData");
    if(save){
        try{
            let d = JSON.parse(save);
            world = d.world;
            player = d.player;
            bag = d.bag;
        }catch(err){
            initFreshWorld();
        }
    }else{
        initFreshWorld();
    }
}
// 存档按钮
document.getElementById("saveBtn").onclick = function(){
    let saveObj = {world,player,bag};
    localStorage.setItem("teraSaveData",JSON.stringify(saveObj));
    alert("✅ 存档成功");
}

loadGameData();
renderHeartUI();

// 游戏物理更新
function update(){
    //移动
    player.vx = 0;
    if(key.left) player.vx = -player.speed;
    if(key.right) player.vx = player.speed;

    if(!checkCollision(player.x+player.vx, player.y, player.w, player.h)){
        player.x += player.vx;
    }

    //重力
    player.vy += player.gravity;
    player.onGround = false;

    if(checkCollision(player.x, player.y+player.vy, player.w, player.h)){
        player.onGround = true;
        player.vy = 0;
    }else{
        player.y += player.vy;
    }

    if(key.jump && player.onGround){
        player.vy = player.jumpPower;
        key.jump = false;
    }

    //怪物逻辑+扣血保护
    for(let i = mobs.length -1;i >=0;i--){
        let m = mobs[i];
        let dx = player.x - m.x;
        m.x += dx > 0 ? m.speed : -m.speed;

        if(m.cool <=0){
            if(
                m.x < player.x+player.w &&
                m.x+m.w > player.x &&
                m.y < player.y+player.h &&
