<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太空雷霆战机 - 终极完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#000;
display:flex;justify-content:center;align-items:center;
height:100vh;overflow:hidden;touch-action:none;
color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}
#game{
border:2px solid #0ef;
background:#000;
display:block;
box-shadow: 0 0 40px rgba(0,200,255,0.3);
border-radius: 8px;
position:relative;
}
.ui{
position:absolute;
color:#0ef;
font-size:16px;
font-weight:600;
text-shadow:0 0 6px #0ef;
background:rgba(0,10,25,0.6);
padding: 6px 10px;
border-radius: 20px;
backdrop-filter: blur(6px);
border: 1px solid rgba(0,200,255,0.2);
z-index:10;
}
#score{top:10px;left:10px}
#level{top:10px;left:50%;transform:translateX(-50%)}
#bossHp{
top:45px;left:50%;transform:translateX(-50%);
display:none;
min-width:200px;
text-align:center;
}
#bomb{top:10px;right:10px}
#ultimate{bottom:10px;left:50%;transform:translateX(-50%);min-width:200px;text-align:center;}
#levelUp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#ff0;font-weight:bold;text-shadow:0 0 10px #ff0;display:none;z-index:20;}

#logo{
position:absolute;top:22%;left:50%;transform:translate(-50%,-50%);
font-size:36px;font-weight:bold;
background: linear-gradient(90deg,#0ff,#08f,#f0f);
-webkit-background-clip: text;background-clip:text;color:transparent;
text-shadow:0 0 20px rgba(0,255,255,0.5);
white-space:nowrap;
}
#author{
position:absolute;top:32%;left:50%;transform:translateX(-50%);
font-size:14px;color:#ccc;
background:rgba(0,15,30,0.5);padding:5px 12px;border-radius:12px;
}

#startBtn{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
padding:16px 40px;
font-size:22px;
background:linear-gradient(90deg,#0ff,#08f);
color:#000;border:none;border-radius:50px;font-weight:bold;
box-shadow:0 0 25px #08f;cursor:pointer;transition:0.2s;
}
#startBtn:active{transform:translate(-50%,-50%) scale(0.95);}

#bombBtn{
position:absolute;bottom:20px;right:20px;
width:70px;height:70px;
border-radius:50%;
background:linear-gradient(135deg,#f30,#f60);
color:#fff;font-size:14px;font-weight:bold;border:none;
box-shadow:0 0 20px #f30;display:none;transition:0.2s;
}
#bombBtn:active{transform:scale(0.92);}

#ultBtn{
position:absolute;bottom:20px;left:100px;
width:70px;height:70px;
border-radius:50%;
background:linear-gradient(135deg,#90f,#f0f);
color:#fff;font-size:14px;font-weight:bold;border:none;
box-shadow:0 0 20px #90f;display:none;transition:0.2s;
}
#ultBtn:disabled{background:#444;box-shadow:none;opacity:0.5;}
#ultBtn:active:enabled{transform:scale(0.92);box-shadow:0 0 35px #f0f;}

.skinBtn{
position:absolute;bottom:20px;left:20px;
width:60px;height:60px;
border-radius:50%;
font-size:13px;font-weight:bold;
border:2px solid #0ff;background:#112;color:#0ff;
box-shadow:0 0 15px #08f;display:none;cursor:pointer;
}

#defeat{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;display:none;z-index:30;
background:rgba(0,10,25,0.9);padding:40px 30px;border-radius:20px;
backdrop-filter:blur(10px);border:1px solid #f33;
min-width:280px;
}
#defeatTitle{
font-size:40px;font-weight:bold;
background:linear-gradient(90deg,#f30,#f60);
-webkit-background-clip:text;background-clip:text;color:transparent;
margin-bottom:15px;
}
#restartBtn{
padding:14px 36px;
font-size:20px;
background:linear-gradient(90deg,#f30,#f60);
color:#fff;border:none;border-radius:50px;font-weight:bold;
box-shadow:0 0 20px #f30;cursor:pointer;margin-top:10px;
}
#restartBtn:active{transform:scale(0.95);}
</style>
</head>
<body>

<div id="logo">太空雷霆战机</div>
<div id="author">僚机·进阶·星空·完整版</div>

<div id="score" class="ui">分数：0</div>
<div id="level" class="ui">关卡：1</div>
<div id="bossHp" class="ui">BOSS 血量：</div>
<div id="bomb" class="ui">炸弹：0</div>
<div id="ultimate" class="ui">大招：0/100</div>
<div id="levelUp">LEVEL UP!</div>

<button id="startBtn">开始游戏</button>
<button id="bombBtn">炸弹</button>
<button id="ultBtn">星际湮灭</button>
<button class="skinBtn" id="skinBtn">换肤</button>

<div id="defeat">
  <div id="defeatTitle">游戏结束</div>
  <div id="defeatInfo" style="font-size:18px;margin-bottom:10px;"></div>
  <button id="restartBtn">再来一局</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const levelText = document.getElementById('level');
const bossHpText = document.getElementById('bossHp');
const bombText = document.getElementById('bomb');
const ultText = document.getElementById('ultimate');
const levelUpText = document.getElementById('levelUp');

canvas.width = 370;
canvas.height = 650;

// 星空背景
let stars = [];
for(let i=0;i<150;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2+1,
    speed: Math.random()*1+0.5
  });
}

let gameRunning = false;
let score = 0;
let level = 1;
let playerExp = 0;
let playerLevel = 1;
let expToNext = 10;

let playerSkin = 1;
let rainbowOffset = 0;

// 大招
let ultCharge = 0;
const ultMax = 100;
let ulting = false;
let ultFrame = 0;
const ultDuration = 70;

// 玩家
const player = {
  x: canvas.width/2-25, y: canvas.height*0.8, w:50, h:60,
  weaponLevel:1, shield:true, laserTime:0,
  invincible:0, bomb:0, magnet:0
};

// 僚机宠物
let pets = [];
const petOffsets = [{x:-55,y:15},{x:55,y:15}];

let bullets = [];
let enemies = [];
let items = [];
let effects = [];
let boss = null;
let bossBullets = [];

// 触摸移动
canvas.addEventListener('touchmove',e=>{
  if(!gameRunning || ulting) return;
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  player.x = t.clientX - r.left - player.w/2;
  player.y = t.clientY - r.top - player.h/2;
  if(player.x<0) player.x=0;
  if(player.x+player.w>canvas.width) player.x=canvas.width-player.w;
  if(player.y<0) player.y=0;
  if(player.y+player.h>canvas.height) player.y=canvas.height-player.h;
});

// 换肤
skinBtn.onclick=()=>{
  playerSkin++;
  if(playerSkin>5) playerSkin=1;
}
document.addEventListener('keydown',e=>{
  if(e.key>='1'&&e.key<='5') playerSkin=parseInt(e.key);
  if(e.key===' ' && ultCharge>=ultMax) useUlt();
});

// 炸弹
bombBtn.onclick=()=>{
  if(player.bomb<=0) return;
  player.bomb--;
  bombText.innerText='炸弹：'+player.bomb;
  enemies.forEach(e=>effect(e.x+e.w/2,e.y+e.h/2));
  enemies=[]; bossBullets=[];
  if(boss) boss.hp-=15;
}

// 大招
ultBtn.onclick=useUlt;
function useUlt(){
  if(ultCharge<ultMax || ulting) return;
  ultCharge=0;
  ulting=true;
  ultFrame=0;
  player.invincible=2000;
}

function applyUltDamage(){
  enemies.forEach(e=>effect(e.x+e.w/2,e.y+e.h/2));
  enemies=[]; bossBullets=[];
  if(boss) boss.hp-=30+level*6;
}

// 升级
function addExp(n){
  playerExp+=n;
  while(playerExp>=expToNext){
    playerExp-=expToNext;
    playerLevel++;
    expToNext=Math.floor(expToNext*1.3)+5;
    player.weaponLevel=Math.min(3,player.weaponLevel+1);
    if(playerLevel>=3 && pets.length<1) pets.push(0);
    if(playerLevel>=5 && pets.length<2) pets.push(1);
    levelUpText.style.display='block';
    setTimeout(()=>levelUpText.style.display='none',800);
  }
}

// 绘制星空
function drawStars(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let s of stars){
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
    s.y+=s.speed;
    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }
  }
}

// 绘制玩家
function drawPlayer(){
  if(player.invincible>0 && Math.floor(Date.now()/100)%2==0) return;
  const cx=player.x+25, cy=player.y+30;
  let g,wing,shield;
  switch(playerSkin){
    case 1:
      g=ctx.createLinearGradient(0,player.y,0,player.y+60);
      g.addColorStop(0,'#0df');g.addColorStop(1,'#05d');
      wing='#04b';shield='#0df';break;
    case 2:
      g=ctx.createLinearGradient(0,player.y,0,player.y+60);
      g.addColorStop(0,'#f42');g.addColorStop(1,'#c00');
      wing='#900';shield='#f42';break;
    case 3:
      g=ctx.createLinearGradient(0,player.y,0,player.y+60);
      g.addColorStop(0,'#c2f');g.addColorStop(1,'#60c');
      wing='#408';shield='#c2f';break;
    case 4:
      g=ctx.createLinearGradient(0,player.y,0,player.y+60);
      g.addColorStop(0,'#222');g.addColorStop(0.5,'#000');g.addColorStop(1,'#222');
      wing='#333';shield='#fc0';break;
    case 5:
      rainbowOffset+=0.02;
      if(rainbowOffset>1)rainbowOffset=0;
      g=ctx.createLinearGradient(0,player.y,0,player.y+60);
      const rb=['#f00','#fc0','#ff0','#0f0','#09f','#63f','#f0f'];
      rb.forEach((c,i)=>g.addColorStop((i/rb.length+rainbowOffset)%1,c));
      wing='#444';shield='#fff';break;
  }
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(cx,player.y);
  ctx.lineTo(player.x+10,player.y+40);
  ctx.lineTo(player.x+15,player.y+55);
  ctx.lineTo(cx,player.y+60);
  ctx.lineTo(player.x+35,player.y+55);
  ctx.lineTo(player.x+40,player.y+40);
  ctx.closePath();
  ctx.fill();
  // 引擎
  ctx.fillStyle=shield;
  ctx.fillRect(cx-3,player.y+52,6,8);
  // 护盾
  if(player.shield){
    ctx.strokeStyle=shield;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,40,0,Math.PI*2);ctx.stroke();
  }
}

// 绘制僚机
function drawPets(){
  for(let i=0;i<pets.length;i++){
    const ox=petOffsets[i].x, oy=petOffsets[i].y;
    const px=player.x+player.w/2+ox, py=player.y+oy;
    ctx.fillStyle='#1ff';
    ctx.beginPath();
    ctx.arc(px,py,8,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(px,py,4,0,Math.PI*2);
    ctx.fill();
  }
}

// 敌机
function addEnemy(){
  if(!gameRunning || boss || ulting) return;
  const s=2+level*0.25+Math.random()*1.5;
  enemies.push({x:Math.random()*(canvas.width-36),y:-40,w:36,h:40,speed:s,hp:1});
}

// BOSS
function spawnBoss(){
  if(boss) return;
  const hp=60+level*30;
  boss={
    x:canvas.width/2-70,y:50,w:140,h:100,
    hp,maxHp:hp,speed:1+level*0.15,dir:1,timer:0
  };
  bossHpText.style.display='block';
}

// 射击
function shoot(){
  if(!gameRunning || ulting) return;
  const cx=player.x+player.w/2;
  // 主机
  if(player.weaponLevel>=1) bullets.push({x:cx-2,y:player.y-5,w:4,h:10,speed:12,c:'#0ff'});
  if(player.weaponLevel>=2){
    bullets.push({x:cx-14,y:player.y+5,w:4,h:10,speed:12,c:'#0ff'});
    bullets.push({x:cx+10,y:player.y+5,w:4,h:10,speed:12,c:'#0ff'});
  }
  if(player.weaponLevel>=3){
    bullets.push({x:cx-22,y:player.y+10,w:4,h:10,speed:12,c:'#0ff'});
    bullets.push({x:cx+18,y:player.y+10,w:4,h:10,speed:12,c:'#0ff'});
  }
  // 僚机
  pets.forEach((_,i)=>{
    const ox=petOffsets[i].x, oy=petOffsets[i].y;
    const px=player.x+player.w/2+ox;
    const py=player.y+oy;
    bullets.push({x:px-2,y:py-10,w:4,h:8,speed:11,c:'#1ff'});
  });
}

// 爆炸特效
function effect(x,y){
  effects.push({x,y,t:0,max:20});
}

// 道具
function dropItem(x,y){
  const t=['weapon','shield','bomb','invincible','magnet','exp'][Math.floor(Math.random()*6)];
  items.push({x,y,w:24,h:24,type:t,speed:2});
}

// 碰撞
function hit(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// 大招动画
function drawUlt(){
  const a=ultFrame/ultDuration;
  const r=400*a;
  ctx.fillStyle=`rgba(255,0,255,${0.5-a*0.5})`;
  ctx.beginPath();
  ctx.arc(canvas.width/2,canvas.height/2,r,0,Math.PI*2);
  ctx.fill();
}

// 主循环
function loop(){
  if(!gameRunning) return;
  drawStars();
  // 时间递减
  if(player.invincible>0) player.invincible-=16;
  if(player.laserTime>0) player.laserTime-=16;
  if(player.magnet>0) player.magnet-=16;

  // 大招
  if(ulting){
    ultFrame++;
    drawUlt();
    if(ultFrame===20) applyUltDamage();
    if(ultFrame>=ultDuration) ulting=false;
    requestAnimationFrame(loop);
    return;
  }

  drawPlayer();
  drawPets();

  // 子弹
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.y-=b.speed;
    ctx.fillStyle=b.c;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    if(b.y<-20) bullets.splice(i,1);
  }

  // 道具
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y+=it.speed;
    // 磁吸
    if(player.magnet>0){
      const dx=player.x+player.w/2-it.x-it.w/2;
      const dy=player.y+player.h/2-it.y-it.h/2;
      const d=Math.hypot(dx,dy)||1;
      if(d<150){ it.x+=dx/d*4; it.y+=dy/d*4; }
    }
    ctx.fillStyle={
      weapon:'#fc0',shield:'#0ff',bomb:'#f60',invincible:'#ff0',magnet:'#0fc',exp:'#f0f'
    }[it.type];
    ctx.beginPath();
    ctx.arc(it.x+it.w/2,it.y+it.h/2,it.w/2,0,Math.PI*2);
    ctx.fill();
    // 吃道具
    if(hit(player,it)){
      if(it.type==='weapon') player.weaponLevel=Math.min(3,player.weaponLevel+1);
      if(it.type==='shield') player.shield=true;
      if(it.type==='bomb'){ player.bomb++; bombText.innerText='炸弹：'+player.bomb; }
      if(it.type==='invincible') player.invincible=3000;
      if(it.type==='magnet') player.magnet=4000;
      if(it.type==='exp') addExp(3);
      items.splice(i,1);
    }
    if(it.y>canvas.height) items.splice(i,1);
  }

  // 敌机
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.y+=e.speed;
    ctx.fillStyle='#f42';
    ctx.beginPath();
    ctx.moveTo(e.x+e.w/2,e.y);
    ctx.lineTo(e.x,e.y+e.h);
    ctx.lineTo(e.x+e.w,e.y+e.h);
    ctx.closePath();
    ctx.fill();
    // 撞机
    if(hit(player,e)){
      if(player.shield){ player.shield=false; effect(e.x+e.w/2,e.y+e.h/2); enemies.splice(i,1); continue; }
      if(player.invincible>0){ effect(e.x+e.w/2,e.y+e.h/2); enemies.splice(i,1); continue; }
      gameOver(); return;
    }
    if(e.y>canvas.height+50) enemies.splice(i,1);
  }

  // 子弹打敌机
  for(let i=bullets.length-1;i>=0;i--){
    for(let j=enemies.length-1;j>=0;j--){
      if(hit(bullets[i],enemies[j])){
        bullets.splice(i,1);
        enemies[j].hp--;
        if(enemies[j].hp<=0){
          effect(enemies[j].x+enemies[j].w/2,enemies[j].y+enemies[j].h/2);
          if(Math.random()<0.4) dropItem(enemies[j].x,enemies[j].y);
          score+=20; scoreText.innerText='分数：'+score;
          addExp(1);
          addUlt(2);
          enemies.splice(j,1);
          break;
        }
      }
    }
  }

  // BOSS
  if(boss){
    boss.x+=boss.speed*boss.dir;
    if(boss.x<20 || boss.x+boss.w>canvas.width-20) boss.dir*=-1;
    // BOSS绘图
    const g=ctx.createLinearGradient(boss.x,boss.y,boss.x,boss.y+boss.h);
    g.addColorStop(0,'#f80');g.addColorStop(1,'#f20');
    ctx.fillStyle=g;
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
    // BOSS攻击
    boss.timer++;
    if(boss.timer>=Math.max(25,70-level*5)){
      boss.timer=0;
      for(let a=0;a<Math.PI*2;a+=Math.PI/4){
        bossBullets.push({
          x:boss.x+boss.w/2,y:boss.y+boss.h/2,
          vx:Math.cos(a)*3,vy:Math.sin(a)*3,
          r:6,c:'#f44'
        });
      }
    }
    // BOSS子弹
    for(let i=bossBullets.length-1;i>=0;i--){
      const b=bossBullets[i];
      b.x+=b.vx; b.y+=b.vy;
      ctx.fillStyle=b.c;
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fill();
      if(hit(player,b)){
        if(player.shield){ player.shield=false; bossBullets.splice(i,1); continue; }
        if(player.invincible>0){ bossBullets.splice(i,1); continue; }
        gameOver(); return;
      }
      if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bossBullets.splice(i,1);
    }
    // 子弹打BOSS
    for(let i=bullets.length-1;i>=0;i--){
      if(hit(bullets[i],boss)){
        bullets.splice(i,1);
        boss.hp--;
        addUlt(1);
        if(boss.hp<=0){
          effect(boss.x+boss.w/2,boss.y+boss.h/2);
          score+=1000; scoreText.innerText='分数：'+score;
          addExp(10);
          addUlt(40);
          boss=null; bossBullets=[]; bossHpText.style.display='none';
          level++; levelText.innerText='关卡：'+level;
          setTimeout(spawnBoss,12000);
        }
        break;
      }
    }
    // 撞BOSS
    if(hit(player,boss)&&player.invincible<=0){ gameOver(); return; }
  }

  // 爆炸特效
  for(let i=effects.length-1;i>=0;i--){
    const e=effects[i]; e.t++;
    ctx.fillStyle=`rgba(255,${100+e.t*5},0,${0.8-e.t/25})`;
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.t*2,0,Math.PI*2);
    ctx.fill();
    if(e.t>=e.max) effects.splice(i,1);
  }

  requestAnimationFrame(loop);
}

// 大招能量
function addUlt(n){
  if(ultCharge>=ultMax) return;
  ultCharge=Math.min(ultMax,ultCharge+n);
  ultText.innerText='大招：'+Math.floor(ultCharge)+'/'+ultMax;
  ultBtn.disabled=ultCharge<ultMax;
}

function gameOver(){
  gameRunning=false;
  clearInterval(shootInt);
  clearInterval(enemyInt);
  defeatInfo.innerHTML='分数：'+score+'<br>关卡：'+level+'<br>战机等级：'+playerLevel;
  defeat.style.display='block';
  bombBtn.style.display=none;
  skinBtn.style.display=none;
  ultBtn.style.display=none;
}

let shootInt,enemyInt;

function start(){
  gameRunning=true;
  score=0;level=1;playerExp=0;playerLevel=1;expToNext=10;
  ultCharge=0;ulting=false;
  player.weaponLevel=1;player.shield=true;player.invincible=0;player.bomb=0;player.magnet=0;
  pets=[]; bullets=[];enemies=[];items=[];effects=[];boss=null;bossBullets=[];
  player.x=canvas.width/2-25;player.y=canvas.height*0.8;

  scoreText.innerText='分数：0';
  levelText.innerText='关卡：1';
  bombText.innerText='炸弹：0';
  ultText.innerText='大招：0/100';
  bossHpText.style.display='none';

  logo.style.display='none';
  author.style.display='none';
  startBtn.style.display='none';
  defeat.style.display='none';
  bombBtn.style.display='block';
  skinBtn.style.display='block';
  ultBtn.style.display='block';
  ultBtn.disabled=true;

  clearInterval(shootInt);clearInterval(enemyInt);
  shootInt=setInterval(shoot,220);
  enemyInt=setInterval(addEnemy,1200);
  setTimeout(spawnBoss,15000);
  loop();
}

startBtn.onclick=start;
restartBtn.onclick=start;
</script>
</body>
</html>
