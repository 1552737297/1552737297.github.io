<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>萌宠管家-专属云端互通终极版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:80px;font-family:sans-serif;}
#nav{
position:fixed;top:0;left:0;width:100%;height:52px;
background:#fff;display:flex;z-index:9999999;
pointer-events:auto !important;
box-shadow:0 1px 4px #eee;
}
.nav-item{
flex:1;text-align:center;line-height:52px;
font-size:15px;color:#666;user-select:none;
}
.nav-item.active{color:#ff5c8d;border-bottom:3px solid #ff5c8d;font-weight:bold;}
.main{margin-top:58px;padding:15px;}
.page{display:none;}
.page.show{display:block;}
.banner{width:100%;height:140px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;margin-bottom:15px;}
.form-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
input,textarea{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin-top:6px;margin-bottom:12px;}
.btn{width:100%;background:#ff5c8d;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;}
.post-card{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px;}
.reply-area{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:10px;}
.reply-item{font-size:14px;color:#555;padding:4px 0;border-bottom:1px solid #eee;}
.tip{text-align:center;color:#999;font-size:13px;margin:8px 0;}
</style>
</head>
<body>

<div id="nav">
<div class="nav-item active" ontouchstart="goTab(0)">下单预约</div>
<div class="nav-item" ontouchstart="goTab(1)">宠友社区</div>
<div class="nav-item" ontouchstart="goTab(2)">商家后台</div>
</div>

<div class="main">
<div class="page show" id="p0">
<div class="banner">🐾上门萌宠喂养</div>
<div class="tip">预约数据本地独立保存</div>
<div class="form-box">
<label>昵称</label>
<input id="uname" placeholder="您的称呼">
<label>手机号</label>
<input id="phone" placeholder="11位手机号">
<label>上门地址</label>
<input id="addr" placeholder="详细住址">
<label>预约时间</label>
<input type="datetime-local" id="ptime">
<label>备注</label>
<textarea id="note" rows="3"></textarea>
<button class="btn" onclick="orderSub()">立即预约</button>
</div>
</div>

<div class="page" id="p1">
<div class="banner">🐱宠友交流·专属云端互通</div>
<div class="tip">多人发帖/评论/回复互相实时可见</div>
<div class="form-box">
<input id="nick" placeholder="发帖昵称">
<textarea id="cnt" rows="4" placeholder="分享养宠日常"></textarea>
<button class="btn" onclick="addPost()">发布帖子</button>
</div>
<div id="plist">正在加载云端公共社区...</div>
</div>

<div class="page" id="p2">
<div class="banner">🔐商家管理中心</div>
<div class="form-box" style="text-align:center">
<p>管理员密码：123456</p >
<input type="password" id="pwd">
<button class="btn" onclick="loginAdmin()">登录后台</button>
</div>
<div id="adminCon" style="display:none" class="form-box">
<h4>我的预约订单</h4>
<div id="olist"></div>
</div>
</div>
</div>

<script>
// 顶部标签切换
function goTab(i){
let navs = document.querySelectorAll('.nav-item');
navs.forEach(x=>x.classList.remove('active'));
navs[i].classList.add('active');

let pages = document.querySelectorAll('.page');
pages.forEach(x=>x.classList.remove('show'));
document.getElementById('p'+i).classList.add('show');
if(i===1)renderCloudData();
}

// 预约 - 本地存储
function getOrder(){return JSON.parse(localStorage.getItem('petOrder')||'[]');}
function saveOrder(d){localStorage.setItem('petOrder',JSON.stringify(d));}
function orderSub(){
let o={
name:uname.value.trim(),
phone:phone.value.trim(),
addr:addr.value.trim(),
time:ptime.value,
note:note.value.trim()
};
if(!o.name||!o.phone||!o.addr||!o.time){alert('请完善预约信息');return;}
let arr=getOrder();arr.unshift(o);saveOrder(arr);
alert('预约成功！');
uname.value='';phone.value='';addr.value='';note.value='';
}

// ========== 专属私有云端公共社区 ==========
// 稳定无跨域专属数据池
const apiUrl = "https://api.jsonbin.io/v3/b/67e2a79f8a456b798ed7e898";
const secretKey = "$2a$10$yourPrivateKeyFix123456789";

//读取云端
async function getCloud(){
try{
let res = await fetch(apiUrl);
let json = await res.json();
return json.record || [];
}catch(err){
console.log('读取失败',err);
return [];
}
}

//写入云端
async function setCloud(data){
await fetch(apiUrl,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":secretKey
},
body:JSON.stringify(data)
});
}

//发帖
async function addPost(){
let n = nick.value.trim();
let c = cnt.value.trim();
if(!n||!c){alert('昵称和内容不能为空');return;}
let list = await getCloud();
list.unshift({
id:Date.now(),
nick:n,
content:c,
reply:[]
});
await setCloud(list);
nick.value="";cnt.value="";
renderCloudData();
alert('发布成功！好友刷新即可看到');
}

//渲染帖子+回复
async function renderCloudData(){
let arr = await getCloud();
let html = "";
if(arr.length===0){
html = '<div style="text-align:center;padding:20px;color:#999;">暂无社区帖子，快来首发~</div>';
}else{
arr.forEach(item=>{
html += `<div class="post-card">
  <div><strong>${item.nick}</strong></div>
  <div style="margin:8px 0;">${item.content}</div>
  <div class="reply-area">
    <input placeholder="你的回复昵称" class="repN" data-pid="${item.id}">
    <textarea placeholder="写下评论回复" class="repC" data-pid="${item.id}"></textarea>
    <button class="btn" style="padding:8px;margin-top:6px;" onclick="submitReply(${item.id})">提交回复</button>
    <div style="margin-top:10px;border-top:1px solid #eee;padding-top:8px;">`;
    if(item.reply&&item.reply.length>0){
      item.reply.forEach(r=>{
        html += `<div class="reply-item">${r.rnick}：${r.rcon}</div>`;
      });
    }else{
      html += `<div class="reply-item" style="color:#999;">暂无楼中楼回复</div>`;
    }
    html += `</div></div></div>`;
});
}
document.getElementById("plist").innerHTML = html;
}

//提交回复
async function submitReply(pid){
let rnick = document.querySelector(`.repN[data-pid="${pid}"]`).value.trim();
let rcon = document.querySelector(`.repC[data-pid="${pid}"]`).value.trim();
if(!rnick||!rcon){alert('请填写回复昵称和内容');return;}
let list = await getCloud();
for(let i=0;i<list.length;i++){
if(list[i].id === pid){
list[i].reply.push({rnick,rcon});break;
}
}
await setCloud(list);
renderCloudData();
alert('回复成功，所有人可见');
}

//商家登录
function loginAdmin(){
if(pwd.value==="123456"){
document.getElementById('adminCon').style.display='block';
let arr=getOrder(),h='';
arr.forEach(x=>{
h+=`<div style="background:#f8f8f8;padding:10px;border-radius:8px;margin-bottom:6px;">
姓名：${x.name}<br>
手机：${x.phone}<br>
地址：${x.addr}<br>
时间：${x.time}
</div>`;
});
document.getElementById('olist').innerHTML=h;
alert('管理员登录成功');
}
}

window.onload=function(){renderCloudData();}
</script>

</body>
</html>
