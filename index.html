<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>萌宠管家-本地极速发帖修复（先测通）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:70px;}
.login-wrap{position:fixed;inset:0;background:#0008;z-index:999999;display:flex;align-items:center;justify-content:center;}
.box{width:85%;background:#fff;border-radius:16px;padding:20px;}
.tab{display:flex;border-bottom:1px solid #eee;margin-bottom:15px;}
.t1,.t2{flex:1;text-align:center;padding:10px;cursor:pointer;}
.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none !important;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #eee;border-radius:8px;}
.btn{width:100%;padding:12px;background:#ff5c8d;color:#fff;border:none;border-radius:8px;}
#nav{position:fixed;bottom:0;left:0;width:100%;height:50px;background:#fff;display:flex;}
.n-item{flex:1;text-align:center;line-height:50px;}
.n-item.active{color:#ff5c8d;font-weight:bold;}
.main{padding:15px;}
.card{background:#fff;padding:12px;border-radius:12px;margin:10px 0;}
</style>
</head>
<body>

<div class="login-wrap" id="loginPop">
<div class="box">
<div class="tab">
<div class="t1 active" onclick="switchL()">登录</div>
<div class="t2" onclick="switchR()">注册</div>
</div>
<div id="formL">
<input id="lacc" placeholder="账号">
<input id="lpwd" type="password" placeholder="密码">
<button class="btn" onclick="doLogin()">登录</button>
</div>
<div id="formR" class="hide">
<input id="racc" placeholder="注册账号">
<input id="rnick" placeholder="昵称">
<input id="rpwd" type="password" placeholder="密码">
<button class="btn" onclick="doReg()">注册</button>
</div>
</div>
</div>

<div id="userTip" style="padding:10px;text-align:right;">未登录</div>

<div class="main">
<div id="p0">
<h3>🐾上门喂猫预约</h3>
<input placeholder="称呼"><input placeholder="手机号"><input placeholder="地址">
<button class="btn">提交预约</button>
</div>

<div id="p1" class="hide">
<h3>🐱宠友社区</h3>
<textarea id="txt" placeholder="登录后写内容"></textarea>
<!-- 这里改成普通同步按钮，不卡异步 -->
<button class="btn" onclick="pub()">立即发布帖子</button>
<div id="plist"></div>
</div>

<div id="p2" class="hide">
<h3>🔐商家后台</h3>
</div>
</div>

<div id="nav">
<div class="n-item active" onclick="go(0)">预约</div>
<div class="n-item" onclick="go(1)">社区</div>
<div class="n-item" onclick="go(2)">后台</div>
</div>

<script>
//登录切换
function switchL(){
document.querySelector('.t1').classList.add('active');
document.querySelector('.t2').classList.remove('active');
formL.classList.remove('hide');formR.classList.add('hide');
}
function switchR(){
document.querySelector('.t2').classList.add('active');
document.querySelector('.t1').classList.remove('active');
formR.classList.remove('hide');formL.classList.add('hide');
}

//用户
function getUser(){return JSON.parse(localStorage.getItem('userList')||'[]')}
let curr = null;

//注册
function doReg(){
let a=racc.value.trim(),n=rnick.value.trim(),p=rpwd.value.trim();
if(!a||!n||!p){alert('不能为空');return}
let arr=getUser();
if(arr.find(x=>x.acc===a)){alert('账号存在');return}
arr.push({acc:a,nick:n,pwd:p});
localStorage.setItem('userList',JSON.stringify(arr));
alert('注册成功，请登录');switchL();
}

//登录
function doLogin(){
let a=lacc.value.trim(),p=lpwd.value.trim();
let arr=getUser();
let u=arr.find(x=>x.acc===a&&x.pwd===p);
if(!u){alert('账号密码错');return}
curr=u;
userTip.innerText='欢迎：'+u.nick;
loginPop.style.display='none';
renderLocalPost();
}

//页面切换
function go(i){
p0.className='hide';p1.className='hide';p2.className='hide';
if(i===0)p0.classList.remove('hide');
if(i===1){p1.classList.remove('hide');if(curr)renderLocalPost();}
if(i===2)p2.classList.remove('hide');
let navs=document.querySelectorAll('.n-item');
navs.forEach((x,idx)=>x.classList.toggle('active',idx===i));
}

//=====纯本地帖子 无云端、无异步、绝不卡死=====
function getLocalPost(){
return JSON.parse(localStorage.getItem('myPetPost')||'[]');
}
function saveLocalPost(d){
localStorage.setItem('myPetPost',JSON.stringify(d));
}

//发布帖子 同步执行 点击必有反应
function pub(){
if(!curr){alert('请先登录');return;}
let c = txt.value.trim();
if(!c){alert('内容不能为空');return;}
let arr = getLocalPost();
arr.unshift({name:curr.nick,cont:c});
saveLocalPost(arr);
txt.value='';
renderLocalPost();
alert('✅帖子发布成功！');
}

//渲染
function renderLocalPost(){
let arr = getLocalPost();
let h='';
arr.forEach(item=>{
h += `<div class="card"><strong>${item.name}</strong><div>${item.cont}</div></div>`;
});
plist.innerHTML=h;
}
</script>
</body>
</html>
