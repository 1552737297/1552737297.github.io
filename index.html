<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太空雷霆战机 - 终极美化版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#000;
display:flex;justify-content:center;align-items:center;
height:100vh;overflow:hidden;touch-action:none;
color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}
#game{
border:2px solid #0ef;
background:linear-gradient(#000,#050612);
display:block;
box-shadow: 0 0 60px rgba(0,200,255,0.5);
border-radius: 8px;
}
.ui{
position:absolute;
color:#0ef;
font-size:17px;
font-weight:600;
text-shadow:0 0 6px #0ef;
background:rgba(0,10,25,0.6);
padding: 6px 12px;
border-radius: 20px;
backdrop-filter: blur(6px);
}
#score{top:16px;left:16px}
#level{top:16px;left:50%;transform:translateX(-50%)}
#bossHp{
top:56px;left:50%;transform:translateX(-50%);
display:none;
min-width:220px;text-align:center;
}
#bomb{top:16px;right:16px}
#ultimate{
position:absolute;
bottom:16px;left:50%;transform:translateX(-50%);
min-width:220px;text-align:center;
}

#logo{
position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);
font-size:42px;font-weight:bold;
background: linear-gradient(90deg,#0ff,#08f,#f0f);
-webkit-background-clip: text;
background-clip: text;
color:transparent;
text-shadow:0 0 20px rgba(0,255,255,0.6);
}
#startBtn{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
padding:20px 50px;
font-size:24px;
background:linear-gradient(90deg,#0ff,#08f);
color:#000;
border:none;
border-radius:50px;
font-weight:bold;
box-shadow:0 0 30px #08f;
cursor:pointer;
}

#bombBtn, #ultBtn, #skinSwitchBtn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 0 15px currentColor;
  background: radial-gradient(circle, #222 0%, #000 100%);
  color: #fff;
  font-size:12px;
  font-weight:bold;
  position: absolute;
  bottom: 30px;
  display: none;
}
#bombBtn { right:30px; color:#ff3300; border-color:#ff3300; }
#ultBtn { left:110px; color:#ff00ff; border-color:#ff00ff; }
#skinSwitchBtn { left:30px; color:#00ffff; border-color:#00ffff; }

#defeat{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;
display:none;
background:rgba(0,10,25,0.85);
padding:50px 40px;
border-radius:20px;
border:1px solid rgba(255,60,60,0.3);
}
#defeatTitle{
font-size:52px;
font-weight:bold;
background: linear-gradient(90deg,#f30,#f60);
-webkit-background-clip: text;
background-clip: text;
color:transparent;
margin-bottom:24px;
}
#restartBtn{
padding:18px 46px;
font-size:22px;
background:linear-gradient(90deg,#f30,#f60);
color:#fff;
border:none;
border-radius:50px;
font-weight:bold;
box-shadow:0 0 30px #f30;
cursor:pointer;
}

canvas {
  filter: brightness(1.1) contrast(1.2) saturate(1.3);
}
.ui {
  backdrop-filter: blur(8px);
  box-shadow: 0 0 10px rgba(0,200,255,0.3);
}
</style>
</head>
<body>

<div id="logo">太空雷霆战机</div>
<button id="startBtn">开始游戏</button>

<div id="score" class="ui">分数：0</div>
<div id="level" class="ui">关卡：1</div>
<div id="bossHp" class="ui">BOSS 血量：</div>
<div id="bomb" class="ui">炸弹：0</div>
<div id="ultimate" class="ui">大招能量：0/100</div>

<button id="bombBtn">💣</button>
<button id="ultBtn">⚡</button>
<button id="skinSwitchBtn">✈️</button>

<div id="defeat">
  <div id="defeatTitle">战 败</div>
  <div id="defeatInfo"></div>
  <button id="restartBtn">重新挑战</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const levelText = document.getElementById('level');
const bossHpText = document.getElementById('bossHp');
const bombText = document.getElementById('bomb');
const ultText = document.getElementById('ultimate');
const startBtn = document.getElementById('startBtn');
const bombBtn = document.getElementById('bombBtn');
const ultBtn = document.getElementById('ultBtn');
const skinSwitchBtn = document.getElementById('skinSwitchBtn');
const logo = document.getElementById('logo');
const defeat = document.getElementById('defeat');
const defeatTitle = document.getElementById('defeatTitle');
const defeatInfo = document.getElementById('defeatInfo');
const restartBtn = document.getElementById('restartBtn');

canvas.width = 375;
canvas.height = 667;

let gameRunning = false;
let score = 0;
let level = 1;
let bossSpawnTimer = null;

let currentSkin = 1;
let skinColors = {
  1: { body: '#00d9ff', shield: '#00d9ff' }
};

let ultCharge = 0;
const ultMax = 100;
let ulting = false;
let ultFrame = 0;
const ultDuration = 60;

let particles = [];

const player = {
  x: canvas.width/2-25, y: canvas.height*0.8, w:50, h:60,
  shieldCount: 1, shieldMax: 3,
  weaponLevel:1, weaponMax:3,
  laserLevel:0, laserMax:3, laserTime:0,
  wingLevel:0, wingMax:3,
  invincibleTime:0, bombCount:0
};

let bullets = [];
let enemies = [];
let items = [];
let effects = [];
let boss = null;
let bossBullets = [];

function addParticle(x, y, color) {
  particles.push({
    x, y,
    vx: (Math.random()-0.5)*2,
    vy: Math.random()*3+2,
    life: 40, maxLife:70, color
  });
}

function drawParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) {
      particles.splice(i,1);
      continue;
    }
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

canvas.addEventListener('touchmove', e=>{
  if(!gameRunning) return;
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  player.x = t.clientX - r.left - player.w/2;
  player.y = t.clientY - r.top - player.h/2;

  if(player.x < 0) player.x = 0;
  if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;
  if(player.y < 0) player.y = 0;
  if(player.y + player.h > canvas.height) player.y = canvas.height - player.h;
});

skinSwitchBtn.onclick = () => {
  currentSkin = currentSkin ===1 ? 1 : 1;
};

bombBtn.onclick = () => {
  if(player.bombCount <= 0) return;
  player.bombCount--;
  bombText.innerText = '炸弹：'+player.bombCount;
  enemies = [];
  bossBullets = [];
  if(boss) boss.hp -= 10;
};

ultBtn.onclick = () => {
  if(ultCharge < ultMax || ulting) return;
  ultCharge = 0;
  ulting = true;
  ultFrame = 0;
  player.invincibleTime = 2000;
};

function shoot(){
  if(!gameRunning) return;
  const cx = player.x + player.w/2;
  bullets.push({type:'normal',x:cx-2,y:player.y,w:4,h:14,speed:9,color:'#0ff'});
}

function createEnemy(){
  if(!gameRunning || boss) return;
  let speed = 2.6 + level*0.3;
  enemies.push({x:Math.random()*(canvas.width-36),y:-40,w:36,h:44,speed:speed,hp:1});
}

function spawnBoss(){
  if(!gameRunning || boss) return;
  let hp = 40 + level*25;
  let size = 140;
  boss = {
    x: canvas.width/2 - size/2,
    y: 50,
    w: size, h: size*0.75,
    hp: hp, maxHp: hp,
    speed: 1.3,
    dir: 1,
    attackTimer: 0
  };
  bossHpText.style.display = 'block';
}

function bossAttack(){
  if(!boss) return;
  boss.attackTimer++;
  if(boss.attackTimer >= 40){
    boss.attackTimer = 0;
    let cnt = 4 + level;
    for(let i=0;i<cnt;i++){
      let ang = (Math.PI*2/cnt)*i;
      let sp = 3;
      bossBullets.push({
        x: boss.x + boss.w/2,
        y: boss.y + boss.h/2,
        vx: Math.cos(ang)*sp,
        vy: Math.sin(ang)*sp,
        w:8,h:8,color:'#f44'
      });
    }
  }
}

function collide(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function boom(x,y){
  effects.push({x,y,t:0,max:14});
}

function drawPlayer(){
  if(player.invincibleTime>0 && Math.floor(Date.now()/120)%2==0) return;
  const cx = player.x + 25;
  const cy = player.y + 30;
  const colors = skinColors[currentSkin];

  for(let i=0; i<3; i++){
    addParticle(cx, player.y+55, colors.body);
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.translate(-cx, -cy);

  ctx.fillStyle = colors.body;
  ctx.shadowBlur = 15;
  ctx.shadowColor = colors.body;
  ctx.beginPath();
  ctx.moveTo(cx, player.y - 15);
  ctx.lineTo(cx-18, player.y + 10);
  ctx.lineTo(cx-22, player.y + 35);
  ctx.lineTo(cx-12, player.y + 50);
  ctx.lineTo(cx-8, player.y + 62);
  ctx.lineTo(cx, player.y + 68);
  ctx.lineTo(cx+8, player.y + 62);
  ctx.lineTo(cx+12, player.y + 50);
  ctx.lineTo(cx+22, player.y + 35);
  ctx.lineTo(cx+18, player.y + 10);
  closePath();
  ctx.fill();

  ctx.fillStyle = '#ff00ff';
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#ff00ff';
  ctx.beginPath();
  ctx.moveTo(cx-10, player.y + 20);
  ctx.lineTo(cx-45, player.y + 10);
  ctx.lineTo(cx-55, player.y + 25);
  ctx.lineTo(cx-40, player.y + 35);
  ctx.lineTo(cx-30, player.y + 45);
  closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx+10, player.y + 20);
  ctx.lineTo(cx+45, player.y + 10);
  ctx.lineTo(cx+55, player.y + 25);
  ctx.lineTo(cx+40, player.y + 35);
  ctx.lineTo(cx+30, player.y + 45);
  closePath();
  ctx.fill();

  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#00ffff';
  ctx.fillRect(cx-6, player.y + 52, 12, 10);

  if(player.shieldCount > 0){
    ctx.globalAlpha = 0.8;
    ctx.strokeStyle = colors.shield;
    ctx.lineWidth = 4;
    ctx.shadowBlur = 20;
    ctx.shadowColor = colors.shield;
    ctx.beginPath();
    ctx.arc(cx, cy, 50, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBullet(b){
  ctx.fillStyle = b.color;
  ctx.shadowBlur = 8;
  ctx.shadowColor = b.color;
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.shadowBlur = 0;
}

function loop(){
  if(!gameRunning) return;

  let bgGrd = ctx.createLinearGradient(0,0,0,canvas.height);
  bgGrd.addColorStop(0,'#050612');
  bgGrd.addColorStop(0.5,'#0a0a23');
  bgGrd.addColorStop(1,'#000011');
  ctx.fillStyle = bgGrd;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#2a3447';
  ctx.strokeStyle = '#4a74ff';
  ctx.lineWidth = 2;
  for(let i=0; i<8; i++){
    let x = Math.random() < 0.5 ? -20 : canvas.width-20;
    let y = Math.random()*canvas.height;
    let w = 40 + Math.random()*40;
    let h = 60 + Math.random()*60;
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+w,y+h*0.3);
    ctx.lineTo(x+w*0.7,y+h);
    ctx.lineTo(x+w*0.2,y+h*0.8);
    closePath();
    ctx.fill();
    ctx.stroke();
  }

  drawParticles();

  if(ulting){
    ultFrame++;
    if(ultFrame >= ultDuration) ulting = false;
    requestAnimationFrame(loop);
    return;
  }

  drawPlayer();
  bossAttack();

  for(let i=bullets.length-1;i>=0;i--){
    let b = bullets[i]; b.y -= b.speed; drawBullet(b);
    if(b.y < -20) bullets.splice(i,1);
  }

  for(let i=enemies.length-1;i>=0;i--){
    let e = enemies[i]; e.y += e.speed;
    ctx.fillStyle = '#f44';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#f44';
    ctx.beginPath();
    ctx.moveTo(e.x+e.w/2,e.y);
    ctx.lineTo(e.x,e.y+e.h);
    ctx.lineTo(e.x+e.w,e.y+e.h);
    closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    if(collide(player,e)){
      if(player.shieldCount>0){
        player.shieldCount--;
        enemies.splice(i,1);
        continue;
      }
      gameOver();
      return;
    }
    if(e.y>canvas.height) enemies.splice(i,1);
  }

  if(boss){
    ctx.fillStyle = '#f80';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#f80';
    ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
    ctx.shadowBlur = 0;

    boss.x += boss.speed * boss.dir;
    if(boss.x<20 || boss.x+boss.w>canvas.width-20) boss.dir *= -1;

    for(let i=bossBullets.length-1;i>=0;i--){
      let b = bossBullets[i];
      b.x += b.vx; b.y += b.vy;
      ctx.fillStyle = b.color;
      ctx.shadowBlur = 8;
      ctx.shadowColor = b.color;
      ctx.beginPath();
      ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w/2,0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;

      if(collide(player,b)){
        if(player.shieldCount>0){
          player.shieldCount--;
          bossBullets.splice(i,1);
          continue;
        }
        gameOver();
        return;
      }
    }

    for(let i=bullets.length-1;i>=0;i--){
      if(boss && collide(bullets[i],boss)){
        bullets.splice(i,1);
        boss.hp--;
        if(boss.hp<=0){
          boss = null;
          bossBullets = [];
          bossHpText.style.display = 'none';
          level++;
          levelText.innerText='关卡：'+level;
        }
      }
    }
  }

  for(let i=bullets.length-1;i>=0;i--){
    for(let j=enemies.length-1;j>=0;j--){
      if(collide(bullets[i],enemies[j])){
        bullets.splice(i,1);
        enemies[j].hp--;
        if(enemies[j].hp<=0){
          enemies.splice(j,1);
          score += 20;
          scoreText.innerText='分数：'+score;
        }
        break;
      }
    }
  }

  requestAnimationFrame(loop);
}

function start(){
  gameRunning = true;
  score = 0; level = 1;
  player.x = canvas.width/2-25;
  player.y = canvas.height*0.8;
  player.shieldCount = 1;
  player.bombCount = 2;

  bullets = []; enemies = []; effects = []; items = [];
  boss = null; bossBullets = [];

  scoreText.innerText='分数：0';
  levelText.innerText='关卡：1';
  bombText.innerText='炸弹：2';

  logo.style.display = 'none';
  startBtn.style.display = 'none';
  bombBtn.style.display = 'block';
  skinSwitchBtn.style.display = 'block';
  ultBtn.style.display = 'block';
  defeat.style.display = 'none';

  setInterval(shoot, 250);
  setInterval(createEnemy, 1200);
  loop();
}

function gameOver(){
  gameRunning = false;
  defeatInfo.innerHTML = `关卡：${level}<br>得分：${score}`;
  defeat.style.display = 'block';
  bombBtn.style.display = 'none';
  skinSwitchBtn.style.display = 'none';
  ultBtn.style.display = 'none';
}

restartBtn.onclick = start;
startBtn.onclick = start;
</script>
</body>
</html>
