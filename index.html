<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机端核心适配：禁用缩放、强制全屏、适配所有设备 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>2D沙盒游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- 血条 -->
    <div class="hp-bar" id="hpBar">
        <div id="hp-fill"></div>
    </div>

    <!-- 设置面板 -->
    <div class="setting-panel" id="settingPanel">
        <div>按键大小 <input type="range" id="btnSize" min="40" max="90" value="60"></div>
    </div>

    <!-- 背包切换按钮 -->
    <button class="toggle-backpack" id="toggleBackpack">背包</button>
    <!-- 10格快捷物品栏 -->
    <div class="inventory" id="hotbar"></div>
    <!-- 背包面板 -->
    <div class="backpack" id="backpack">
        <div class="backpack-grid" id="backpackGrid"></div>
        <button class="close-backpack" id="closeBackpack">关闭背包</button>
    </div>

    <!-- 独立按键：左、右、跳、挖、放（全部单独可拖） -->
    <div class="btn single-btn" id="leftBtn">←</div>
    <div class="btn single-btn" id="rightBtn">→</div>
    <div class="btn single-btn" id="jumpBtn">跳</div>
    <div class="btn single-btn" id="digBtn">挖</div>
    <div class="btn single-btn" id="placeBtn">放</div>
</div>

<script src="game.js"></script>
<script>
// 拖动功能核心：支持任意元素单独拖动+位置本地保存+屏幕适配
function makeDraggable(elId, defaultXPercent, defaultYPercent) {
    const el = document.getElementById(elId);
    if(!el) return;
    let isDrag = false, offsetX = 0, offsetY = 0;

    // 设置初始定位：按屏幕百分比定位，适配所有尺寸
    el.style.position = "absolute";
    el.style.cursor = "move";
    el.style.zIndex = 998;

    // 计算默认位置（按屏幕百分比，永不消失）
    function calcDefaultPos() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        return {
            x: w * defaultXPercent,
            y: h * defaultYPercent
        };
    }

    // 初始化位置：优先本地保存，无则按百分比计算
    function initPos() {
        const saved = localStorage.getItem("drag_"+elId);
        const defaultPos = calcDefaultPos();
        if(saved) {
            let [lx, ly] = saved.split("|");
            el.style.left = lx;
            el.style.top = ly;
        } else {
            el.style.left = defaultPos.x + "px";
            el.style.top = defaultPos.y + "px";
        }
    }
    initPos();

    // 鼠标拖动
    el.addEventListener('mousedown', start);
    // 触屏拖动（移动端适配，阻止默认行为）
    el.addEventListener('touchstart', (e) => {
        start(e.touches[0]);
        e.preventDefault();
    }, { passive: false });

    function start(e) {
        isDrag = true;
        offsetX = e.clientX - el.getBoundingClientRect().left;
        offsetY = e.clientY - el.getBoundingClientRect().top;
        el.style.zIndex = 99999; // 拖动时置顶
    }

    // 鼠标/触屏移动
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', (e) => {
        move(e.touches[0]);
    }, { passive: false });

    function move(e) {
        if(!isDrag) return;
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;
        // 限制边界：防止拖出屏幕外
        x = Math.max(0, Math.min(x, window.innerWidth - el.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - el.offsetHeight));
        el.style.left = x + "px";
        el.style.top = y + "px";
    }

    // 结束拖动
    document.addEventListener('mouseup', stop);
    document.addEventListener('touchend', stop);

    function stop() {
        isDrag = false;
        el.style.zIndex = 998; // 恢复层级
        // 保存位置到本地存储
        localStorage.setItem("drag_"+elId, el.style.left + "|" + el.style.top);
    }

    // 屏幕尺寸变化时，重新初始化位置（适配横竖屏）
    window.addEventListener('resize', initPos);
    window.addEventListener('orientationchange', initPos);
}

// ********** 按屏幕百分比设置默认位置（0-1之间，适配所有手机）**********
// 基础UI：按百分比定位，永不消失
makeDraggable("hpBar", 0.02, 0.02);          // 血条：左2% 上2%
makeDraggable("settingPanel", 0.7, 0.02);    // 设置面板：左70% 上2%
makeDraggable("toggleBackpack", 0.2, 0.02);  // 背包按钮：左20% 上2%
makeDraggable("hotbar", 0.05, 0.85);         // 快捷栏：左5% 上85%（底部）
// 独立按键：按屏幕百分比定位，手机端必见
makeDraggable("leftBtn", 0.05, 0.7);         // 左键：左5% 上70%
makeDraggable("rightBtn", 0.2, 0.7);         // 右键：左20% 上70%
makeDraggable("jumpBtn", 0.05, 0.85);        // 跳键：左5% 上85%（独立，永不消失）
makeDraggable("digBtn", 0.75, 0.7);          // 挖键：左75% 上70%
makeDraggable("placeBtn", 0.75, 0.85);       // 放键：左75% 上85%

// 按键大小调节（适配所有屏幕，默认60更适合手机）
const btnSize = document.getElementById('btnSize');
const allBtns = document.querySelectorAll('.btn');
function updateBtnSize(){
    let sz = btnSize.value;
    allBtns.forEach(el=>{
        el.style.width = sz+'px';
        el.style.height = sz+'px';
        el.style.fontSize = (sz/3)+'px';
    });
}
btnSize.oninput = updateBtnSize;
updateBtnSize();

// 设置面板自动隐藏（原有功能保留）
let hideTimer;
const sPanel = document.getElementById('settingPanel');
document.addEventListener('touchstart',()=>{
    clearTimeout(hideTimer);
    sPanel.style.opacity = "1";
});
document.addEventListener('touchend',()=>{
    hideTimer = setTimeout(()=>{
        sPanel.style.opacity = "0.15";
    },2500);
});

// 背包显示/隐藏（原有功能保留）
const toggleBackpackBtn = document.getElementById('toggleBackpack');
const backpackPanel = document.getElementById('backpack');
const closeBackpackBtn = document.getElementById('closeBackpack');
toggleBackpackBtn.addEventListener('click', () => {
    backpackPanel.classList.toggle('show');
});
closeBackpackBtn.addEventListener('click', () => {
    backpackPanel.classList.remove('show');
});
</script>
</body>
</html>
