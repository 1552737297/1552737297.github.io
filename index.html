<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>萌宠管家-发帖修复可用版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:80px;font-family:sans-serif;}
#nav{
position:fixed;top:0;left:0;width:100%;height:52px;
background:#fff;display:flex;z-index:9999999;
pointer-events:auto !important;
box-shadow:0 1px 4px #eee;
}
.nav-item{
flex:1;text-align:center;line-height:52px;
font-size:15px;color:#666;user-select:none;
}
.nav-item.active{color:#ff5c8d;border-bottom:3px solid #ff5c8d;font-weight:bold;}
.main{margin-top:58px;padding:15px;}
.page{display:none;}
.page.show{display:block;}
.banner{width:100%;height:140px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;margin-bottom:15px;}
.form-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
input,textarea{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin-top:6px;margin-bottom:12px;}
.btn{width:100%;background:#ff5c8d;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;}
.post-card{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px;}
.reply-area{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>

<div id="nav">
<div class="nav-item active" onclick="goTab(0)">下单预约</div>
<div class="nav-item" onclick="goTab(1)">宠友社区</div>
<div class="nav-item" onclick="goTab(2)">商家后台</div>
</div>

<div class="main">
<div class="page show" id="p0">
<div class="banner">🐾上门萌宠喂养</div>
<div class="form-box">
<label>昵称</label>
<input id="uname">
<label>手机号</label>
<input id="phone">
<label>地址</label>
<input id="addr">
<label>预约时间</label>
<input type="datetime-local" id="ptime">
<label>备注</label>
<textarea id="note" rows="3"></textarea>
<button class="btn" onclick="orderSub()">立即预约</button>
</div>
</div>

<div class="page" id="p1">
<div class="banner">🐱宠友社区</div>
<div class="form-box">
<input id="postName" placeholder="你的昵称">
<textarea id="postText" placeholder="发帖内容"></textarea>
<button class="btn" onclick="sendPost()">点击发布帖子</button>
</div>
<div id="postList"></div>
</div>

<div class="page" id="p2">
<div class="banner">🔐商家后台</div>
<div class="form-box" style="text-align:center">
<p>密码：123456</p >
<input type="password" id="admPwd">
<button class="btn" onclick="admLogin()">登录</button>
</div>
<div id="admBox" style="display:none;"></div>
</div>
</div>

<script>
//切换
function goTab(i){
let nav=document.querySelectorAll(".nav-item");
let pg=document.querySelectorAll(".page");
nav.forEach(x=>x.classList.remove("active"));nav[i].classList.add("active");
pg.forEach(x=>x.classList.remove("show"));pg[i].classList.add("show");
if(i===1)renderPosts();
}

//预约
function getOrd(){return JSON.parse(localStorage.getItem("petOrd")||"[]")}
function saveOrd(d){localStorage.setItem("petOrd",JSON.stringify(d))}
function orderSub(){
let o={n:uname.value,p:phone.value,a:addr.value,t:ptime.value,nt:note.value};
let arr=getOrd();arr.unshift(o);saveOrd(arr);alert("预约成功");
}

//社区 纯稳定本地先保证【按钮点得动+能发帖】
function getPs(){return JSON.parse(localStorage.getItem("myPs")||"[]")}
function savePs(d){localStorage.setItem("myPs",JSON.stringify(d))}

//核心：强制可点击发帖
function sendPost(){
let n=postName.value.trim();
let t=postText.value.trim();
if(!n||!t){alert("昵称和内容不能为空");return;}
let arr=getPs();
arr.unshift({id:Date.now(),name:n,txt:t,rep:[]});
savePs(arr);
postName.value="";postText.value="";
renderPosts();
alert("发帖成功！");
}

function renderPosts(){
let arr=getPs(),h="";
arr.forEach(x=>{
h+=`<div class="post-card">
<strong>${x.name}</strong>
<div style="margin:8px 0;">${x.txt}</div>
<div class="reply-area">
<input placeholder="回复昵称" data-id="${x.id}">
<textarea placeholder="回复内容" data-id="${x.id}"></textarea>
<button class="btn" style="padding:6px" onclick="addRep(${x.id})">回复</button>
</div>
</div>`;
})
document.getElementById("postList").innerHTML=h;
}

function addRep(id){
let ipt=document.querySelector(`input[data-id="${id}"]`).value.trim();
let txt=document.querySelector(`textarea[data-id="${id}"]`).value.trim();
if(!ipt||!txt){alert("请填写完整");return;}
let arr=getPs();
for(let j=0;j<arr.length;j++){
if(arr[j].id===id){
arr[j].rep.push({n:ipt,c:txt});
break;
}
}
savePs(arr);renderPosts();alert("回复成功");
}

//商家登录
function admLogin(){
if(admPwd.value==="123456"){
let arr=getOrd(),h="";
arr.forEach(x=>{h+=`<div style="padding:10px;background:#f5f5f5;margin:6px 0;">${x.n} ${x.p} ${x.a}</div>`})
document.getElementById("admBox").style.display="block";
document.getElementById("admBox").innerHTML=h;
}
}

window.onload=function(){renderPosts();}
</script>
</body>
</html>
