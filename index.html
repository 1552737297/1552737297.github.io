<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>萌宠管家-互通+按钮可用终极版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:80px;font-family:sans-serif;}
#nav{
position:fixed;top:0;left:0;width:100%;height:52px;
background:#fff;display:flex;z-index:9999999;
box-shadow:0 1px 4px #eee;
}
.nav-item{
flex:1;text-align:center;line-height:52px;font-size:15px;color:#666;
}
.nav-item.active{color:#ff5c8d;border-bottom:3px solid #ff5c8d;font-weight:bold;}
.main{margin-top:58px;padding:15px;}
.page{display:none;}
.page.show{display:block;}
.banner{width:100%;height:140px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;margin-bottom:15px;}
.form-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
input,textarea{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin:6px 0 12px;}
.btn{width:100%;background:#ff5c8d;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;}
.post-card{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px;}
.reply-area{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>

<div id="nav">
<div class="nav-item active" onclick="goTab(0)">下单预约</div>
<div class="nav-item" onclick="goTab(1)">宠友社区</div>
<div class="nav-item" onclick="goTab(2)">商家后台</div>
</div>

<div class="main">
<div class="page show" id="p0">
<div class="banner">🐾上门萌宠喂养</div>
<div class="form-box">
<label>昵称</label>
<input id="uname">
<label>手机号</label>
<input id="phone">
<label>上门地址</label>
<input id="addr">
<label>预约时间</label>
<input type="datetime-local" id="ptime">
<label>备注</label>
<textarea id="note" rows="3"></textarea>
<button class="btn" onclick="orderSub()">立即预约</button>
</div>
</div>

<div class="page" id="p1">
<div class="banner">🐱宠友社区·多人互通</div>
<div class="form-box">
<input id="postName" placeholder="发帖昵称">
<textarea id="postText" placeholder="分享养宠日常"></textarea>
<button class="btn" onclick="sendPost()">发布帖子</button>
</div>
<div id="postList">载入云端数据中...</div>
</div>

<div class="page" id="p2">
<div class="banner">🔐商家管理中心</div>
<div class="form-box" style="text-align:center">
<p>管理员密码：123456</p >
<input type="password" id="admPwd">
<button class="btn" onclick="admLogin()">登录后台</button>
</div>
<div id="admBox" style="display:none;" class="form-box"></div>
</div>
</div>

<script>
//页面切换
function goTab(i){
let nav=document.querySelectorAll(".nav-item");
let pg=document.querySelectorAll(".page");
nav.forEach(x=>x.classList.remove("active"));nav[i].classList.add("active");
pg.forEach(x=>x.classList.remove("show"));pg[i].classList.add("show");
if(i===1)loadCloudData();
}

//预约本地存储
function getOrd(){return JSON.parse(localStorage.getItem("petOrd")||"[]")}
function saveOrd(d){localStorage.setItem("petOrd",JSON.stringify(d))}
function orderSub(){
let o={
n:uname.value,p:phone.value,a:addr.value,t:ptime.value,nt:note.value
};
let arr=getOrd();arr.unshift(o);saveOrd(arr);
alert("预约提交成功");
}

//====公共免费互通云仓库（兼容GitHub、不卡死、可发布）====
const cloudUrl = "https://jsonblob.com/api/jsonBlob/1156000000000000000";

async function getCloud(){
try{
let res = await fetch(cloudUrl+"?_t="+Date.now());
return await res.json() || [];
}catch(e){return [];}
}

async function setCloud(data){
await fetch(cloudUrl,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
}

//发布帖子 有弹窗、不没反应
async function sendPost(){
let n = postName.value.trim();
let t = postText.value.trim();
if(!n||!t){alert("昵称和内容不能为空！");return;}
let list = await getCloud();
list.unshift({id:Date.now(),name:n,txt:t,rep:[]});
await setCloud(list);
postName.value="";postText.value="";
loadCloudData();
alert("发帖成功！好友立刻可见");
}

//渲染互通帖子+回复
async function loadCloudData(){
let arr = await getCloud();
let html = "";
if(arr.length===0){
html = '<div style="padding:30px;text-align:center;color:#999;">暂无共享帖子，快来首发</div>';
}else{
arr.forEach(item=>{
html += `<div class="post-card">
<strong>${item.name}</strong>
<div style="margin:8px 0;">${item.txt}</div>
<div class="reply-area">
<input placeholder="回复昵称" data-id="${item.id}">
<textarea placeholder="写下你的回复" data-id="${item.id}"></textarea>
<button class="btn" style="padding:6px;margin-top:4px;" onclick="addReply(${item.id})">提交回复</button>
</div>
</div>`;
});
}
document.getElementById("postList").innerHTML = html;
}

//互通回复
async function addReply(pid){
let rName = document.querySelector(`input[data-id="${pid}"]`).value.trim();
let rTxt = document.querySelector(`textarea[data-id="${pid}"]`).value.trim();
if(!rName||!rTxt){alert("请填写回复昵称和内容");return;}
let list = await getCloud();
for(let i=0;i<list.length;i++){
if(list[i].id === pid){
list[i].rep.push({rn:rName,rt:rTxt});break;
}
}
await setCloud(list);
loadCloudData();
alert("回复成功，所有人可见");
}

//商家登录
function admLogin(){
if(admPwd.value==="123456"){
let arr=getOrd(),h="";
arr.forEach(x=>{
h+=`<div style="padding:10px;background:#f5f5f5;margin:6px 0;">
昵称：${x.n}<br>手机：${x.p}<br>地址：${x.a}<br>时间：${x.t}
</div>`;
})
document.getElementById("admBox").style.display="block";
document.getElementById("admBox").innerHTML=h;
}
}

window.onload=function(){loadCloudData();}
</script>

</body>
</html>
