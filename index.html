<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机端核心适配：禁用缩放、强制全屏、适配所有设备 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2D沙盒游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- 血条 -->
    <div class="hp-bar" id="hpBar">
        <div id="hp-fill"></div>
    </div>

    <!-- 设置面板 + 重置布局 + 全屏按钮 -->
    <div class="setting-panel" id="settingPanel">
        <div>按键大小 <input type="range" id="btnSize" min="40" max="90" value="60"></div>
        <button class="reset-layout" id="resetLayoutBtn">重置布局</button>
        <button class="fullscreen-btn" id="fullscreenBtn">全屏游戏</button>
    </div>

    <!-- 背包切换按钮 -->
    <button class="toggle-backpack" id="toggleBackpack">背包</button>
    <!-- 10格快捷物品栏 -->
    <div class="inventory" id="hotbar"></div>
    <!-- 背包面板 -->
    <div class="backpack" id="backpack">
        <div class="backpack-grid" id="backpackGrid"></div>
        <button class="close-backpack" id="closeBackpack">关闭背包</button>
    </div>

    <!-- 独立按键：左、右、跳、挖、放（全部单独可拖） -->
    <div class="btn single-btn" id="leftBtn">←</div>
    <div class="btn single-btn" id="rightBtn">→</div>
    <div class="btn single-btn" id="jumpBtn">跳</div>
    <div class="btn single-btn" id="digBtn">挖</div>
    <div class="btn single-btn" id="placeBtn">放</div>
</div>

<script src="game.js"></script>
<script>
// 所有可拖动元素的ID和默认百分比位置（统一管理，方便重置）
const draggableElements = [
    { id: "hpBar", defaultX: 0.02, defaultY: 0.02 },
    { id: "settingPanel", defaultX: 0.7, defaultY: 0.02 },
    { id: "toggleBackpack", defaultX: 0.2, defaultY: 0.02 },
    { id: "hotbar", defaultX: 0.05, defaultY: 0.85 },
    { id: "leftBtn", defaultX: 0.05, defaultY: 0.7 },
    { id: "rightBtn", defaultX: 0.2, defaultY: 0.7 },
    { id: "jumpBtn", defaultX: 0.05, defaultY: 0.85 },
    { id: "digBtn", defaultX: 0.75, defaultY: 0.7 },
    { id: "placeBtn", defaultX: 0.75, defaultY: 0.85 }
];

// 拖动功能核心：支持任意元素单独拖动+位置本地保存+屏幕适配
function makeDraggable(config) {
    const { id, defaultX, defaultY } = config;
    const el = document.getElementById(id);
    if(!el) return;
    let isDrag = false, offsetX = 0, offsetY = 0;

    // 设置初始定位：按屏幕百分比定位，适配所有尺寸
    el.style.position = "absolute";
    el.style.cursor = "move";
    el.style.zIndex = 998;

    // 计算默认位置（按屏幕百分比，永不消失）
    function calcDefaultPos() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        return {
            x: w * defaultX,
            y: h * defaultY
        };
    }

    // 初始化位置：优先本地保存，无则按百分比计算
    function initPos() {
        const saved = localStorage.getItem("drag_"+id);
        const defaultPos = calcDefaultPos();
        if(saved) {
            let [lx, ly] = saved.split("|");
            el.style.left = lx;
            el.style.top = ly;
        } else {
            el.style.left = defaultPos.x + "px";
            el.style.top = defaultPos.y + "px";
        }
    }
    initPos();

    // 鼠标拖动
    el.addEventListener('mousedown', start);
    // 触屏拖动（移动端适配，阻止默认行为）
    el.addEventListener('touchstart', (e) => {
        start(e.touches[0]);
        e.preventDefault();
    }, { passive: false });

    function start(e) {
        isDrag = true;
        offsetX = e.clientX - el.getBoundingClientRect().left;
        offsetY = e.clientY - el.getBoundingClientRect().top;
        el.style.zIndex = 99999; // 拖动时置顶
    }

    // 鼠标/触屏移动
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', (e) => {
        move(e.touches[0]);
    }, { passive: false });

    function move(e) {
        if(!isDrag) return;
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;
        // 限制边界：防止拖出屏幕外
        x = Math.max(0, Math.min(x, window.innerWidth - el.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - el.offsetHeight));
        el.style.left = x + "px";
        el.style.top = y + "px";
    }

    // 结束拖动
    document.addEventListener('mouseup', stop);
    document.addEventListener('touchend', stop);

    function stop() {
        isDrag = false;
        el.style.zIndex = 998; // 恢复层级
        // 保存位置到本地存储
        localStorage.setItem("drag_"+id, el.style.left + "|" + el.style.top);
    }

    // 屏幕尺寸变化时，重新初始化位置（适配横竖屏/全屏切换）
    window.addEventListener('resize', initPos);
    window.addEventListener('orientationchange', initPos);
    window.addEventListener('fullscreenchange', initPos); // 全屏切换时适配

    // 返回重置该元素的方法
    return {
        reset: () => {
            localStorage.removeItem("drag_"+id);
            const defaultPos = calcDefaultPos();
            el.style.left = defaultPos.x + "px";
            el.style.top = defaultPos.y + "px";
        }
    };
}

// 初始化所有可拖动元素，并存储重置方法
const resetMethods = {};
draggableElements.forEach(config => {
    const { reset } = makeDraggable(config);
    resetMethods[config.id] = reset;
});

// 一键重置布局逻辑
const resetLayoutBtn = document.getElementById('resetLayoutBtn');
resetLayoutBtn.addEventListener('click', () => {
    // 重置所有元素位置
    Object.values(resetMethods).forEach(reset => reset());
    // 提示重置成功
    alert("布局已重置为默认状态！");
});

// ********** 核心：手机端全屏功能 **********
const fullscreenBtn = document.getElementById('fullscreenBtn');
const gameContainer = document.getElementById('gameContainer');
let isFullscreen = false;

// 全屏切换逻辑
function toggleFullscreen() {
    if (!isFullscreen) {
        // 进入全屏
        if (gameContainer.requestFullscreen) {
            gameContainer.requestFullscreen();
        } else if (gameContainer.webkitRequestFullscreen) { // Safari
            gameContainer.webkitRequestFullscreen();
        } else if (gameContainer.msRequestFullscreen) { // IE/Edge
            gameContainer.msRequestFullscreen();
        } else if (gameContainer.mozRequestFullScreen) { // Firefox
            gameContainer.mozRequestFullScreen();
        }
        // iOS 特殊处理：隐藏状态栏
        document.documentElement.style.setProperty('--webkit-full-screen', 'true');
        alert("已进入全屏模式！退出全屏可再次点击按钮或使用手机返回键/手势。");
    } else {
        // 退出全屏
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
        }
        document.documentElement.style.setProperty('--webkit-full-screen', 'false');
    }
}

// 绑定全屏按钮点击事件
fullscreenBtn.addEventListener('click', toggleFullscreen);

// 监听全屏状态变化
function handleFullscreenChange() {
    isFullscreen = !!document.fullscreenElement || 
                   !!document.webkitFullscreenElement || 
                   !!document.msFullscreenElement || 
                   !!document.mozFullScreenElement;
    // 更新按钮文本
    fullscreenBtn.innerText = isFullscreen ? "退出全屏" : "全屏游戏";
    // 全屏切换后重新适配布局
    resizeCanvas();
}
document.addEventListener('fullscreenchange', handleFullscreenChange);
document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
document.addEventListener('msfullscreenchange', handleFullscreenChange);
document.addEventListener('mozfullscreenchange', handleFullscreenChange);

// 按键大小调节（适配所有屏幕，默认60更适合手机）
const btnSize = document.getElementById('btnSize');
const allBtns = document.querySelectorAll('.btn');
function updateBtnSize(){
    let sz = btnSize.value;
    allBtns.forEach(el=>{
        el.style.width = sz+'px';
        el.style.height = sz+'px';
        el.style.fontSize = (sz/3)+'px';
    });
}
btnSize.oninput = updateBtnSize;
updateBtnSize();

// 设置面板自动隐藏（原有功能保留）
let hideTimer;
const sPanel = document.getElementById('settingPanel');
document.addEventListener('touchstart',()=>{
    clearTimeout(hideTimer);
    sPanel.style.opacity = "1";
});
document.addEventListener('touchend',()=>{
    hideTimer = setTimeout(()=>{
        sPanel.style.opacity = "0.15";
    },2500);
});

// 背包显示/隐藏（原有功能保留）
const toggleBackpackBtn = document.getElementById('toggleBackpack');
const backpackPanel = document.getElementById('backpack');
const closeBackpackBtn = document.getElementById('closeBackpack');
toggleBackpackBtn.addEventListener('click', () => {
    backpackPanel.classList.toggle('show');
});
closeBackpackBtn.addEventListener('click', () => {
    backpackPanel.classList.remove('show');
});
</script>
</body>
</html>
