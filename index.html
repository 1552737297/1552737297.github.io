<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#000;

}
#score{top:16px;left:16px}
#level{top:16px;left:50%;transform:translateX(-50%)}
#bossHp{
top:56px;left:50%;transform:translateX(-50%);

min-width: 220px;
text-align: center;
}
#bomb{top:16px;right:16px}

#ultimate{
position:absolute;
bottom:16px;left:50%;transform:translateX(-50%);

#unlockTip{
position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
font-size:14px;color:#fff;
background:rgba(0,20,40,0.8);
padding:8px 16px;
border-radius:12px;

#logo{
position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);

background: linear-gradient(90deg,#0ff,#40f,#f0f);
-webkit-background-clip: text;
background-clip: text;

}
@keyframes glowPulse {
  0% { filter: brightness(1); }

}
#author{
position:absolute;top:30%;left:50%;transform:translateX(-50%);

#startBtn{

#ultBtn{

#luckyBtn{

box-shadow:0 0 20px #f90;
display:none;
cursor:pointer;
transition: all 0.3s ease;
z-index:8;
}

box-shadow:0 0 30px #fc0;
}

}

#luckyPopup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:flex;justify-content:center;align-items:center;

}
.lucky-box{
background:rgba(10,15,35,0.95);
padding:30px 24px;
border-radius:20px;
border:2px solid #fc0;

}
.lucky-title{
font-size:26px;
background:linear-gradient(90deg,#fc0,#fa0);

#wheel{
width:240px;height:240px;

}
.wheel-bg{
width:100%;height:100%;
border-radius:50%;
background:conic-gradient(#fc0 0% 12.5%,#f60 12.5% 25%,#f0f 25% 37.5%,#0ff 37.5% 50%,#0f6 50% 62.5%,#60f 62.5% 75%,#ff6 75% 87.5%,#f66 87.5% 100%);

}
.wheel-arrow{
position:absolute;top:-10px;left:50%;transform:translateX(-50%);

#spinBtn{
padding:12px 30px;
font-size:18px;font-weight:bold;

cursor:pointer;
transition:all 0.3s;
}

}
#spinResult{
margin-top:16px;font-size:18px;color:#fff;

}
#closeLucky{
margin-top:12px;padding:8px 20px;
background:#223;color:#fff;border:none;
border-radius:20px;cursor:pointer;
opacity:0.7;
}
@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(2160deg)}
}

#pediaPopup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:flex;justify-content:center;align-items:center;
z-index:999;
backdrop-filter: blur(10px);
display:none;
}
.pedia-box{
background:rgba(10,20,40,0.98);
padding:28px 24px;
border-radius:20px;
border:2px solid #0fa;
box-shadow:0 0 60px rgba(0,255,170,0.4);
width:340px;
max-height:80vh;
overflow-y:auto;
text-align:center;
}
.pedia-title{
font-size:28px;
background:linear-gradient(90deg,#0fa,#0af);
-webkit-background-clip:text;background-clip:text;color:transparent;
font-weight:bold;margin-bottom:24px;
}
.skin-list{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-bottom:20px;
}
.skin-item{
background:rgba(0,15,30,0.7);
border:2px solid #334;
border-radius:14px;
padding:16px 10px;
transition:0.3s;
}
.skin-item.unlocked{
border-color:#0fa;
background:rgba(0,40,30,0.6);
}
.skin-item.current{
border-color:#0ff;
background:rgba(0,60,50,0.7);
box-shadow:0 0 20px rgba(0,255,170,0.5);
}
.skin-color{
width:50px;height:50px;
border-radius:50%;
margin:0 auto 10px;
border:2px solid #fff;
}
.skin-name{
font-size:16px;font-weight:bold;color:#fff;margin-bottom:6px;
}
.skin-desc{
font-size:12px;color:#aaa;line-height:1.4;margin-bottom:8px;
}
.use-skin-btn{
padding:6px 14px;
font-size:13px;font-weight:bold;
background:#0fa;color:#000;
border:none;border-radius:20px;
cursor:pointer;
opacity:0.8;
}
.use-skin-btn:disabled{
background:#445;color:#888;cursor:not-allowed;
}
#closePedia{
margin-top:16px;padding:10px 24px;
background:#224;color:#fff;border:none;
border-radius:20px;cursor:pointer;
}

#defeat{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;
display:none;
z-index:10;
background:rgba(0,10,25,0.9);
padding: 50px 40px;
border-radius: 20px;
backdrop-filter: blur(12px);
border: 1px solid rgba(255,60,60,0.4);
box-shadow: 0 0 60px rgba(255,60,60,0.3);
min-width: 300px;
}
#defeatTitle{
font-size:52px;
font-weight:bold;
background: linear-gradient(90deg,#f30,#f60);
-webkit-background-clip: text;
background-clip: text;
color:transparent;
text-shadow:0 0 30px #f30;
margin-bottom:24px;
}
#defeatInfo{
font-size:20px;
color:#fff;
margin-bottom:34px;
line-height:1.7;
opacity: 0.95;
}
#restartBtn{
padding:18px 46px;
font-size:22px;
background:linear-gradient(90deg,#f30,#f60);
color:#fff;
border:none;
border-radius:50px;
font-weight:bold;
box-shadow:0 0 40px #f30;
cursor:pointer;
transition: all 0.3s ease;
}
#restartBtn:hover{
transform: scale(1.06);
box-shadow:0 0 50px #f30;
}
#restartBtn:active{
transform: scale(0.94);
}
</style>
</head>
<body>
<div id="logo">太空雷霆战机</div>
<div id="author">机甲流光 · 粒子尾焰 · 金属质感</div>
<div id="score" class="ui">分数：0</div>
<div id="level" class="ui">关卡：1</div>
<div id="bossHp" class="ui">BOSS 血量：</div>
<div id="bomb" class="ui">炸弹：0</div>
<div id="ultimate" class="ui">大招能量：0/100</div>
<div id="unlockTip">解锁提示</div>

<button id="startBtn">开始游戏</button>
<button id="bombBtn">全屏炸弹</button>
<button id="ultBtn">星际湮灭</button>
<button id="skinSwitchBtn">换肤</button>
<button id="pediaBtn">图鉴</button>
<button id="luckyBtn">抽奖</button>

<div id="luckyPopup">
  <div class="lucky-box">
    <div class="lucky-title">星际抽奖</div>
    <div id="wheel">
      <div class="wheel-arrow"></div>
      <div class="wheel-bg" id="wheelBg"></div>
    </div>
    <button id="spinBtn">开始抽奖 (300分)</button>
    <div id="spinResult"></div>
    <button id="closeLucky">关闭</button>
  </div>
</div>

<div id="pediaPopup">
  <div class="pedia-box">
    <div class="pedia-title">战机图鉴</div>
    <div class="skin-list" id="skinList"></div>
    <button id="closePedia">关闭图鉴</button>
  </div>
</div>

<div id="defeat">
  <div id="defeatTitle">战 败</div>
  <div id="defeatInfo"></div>
  <button id="restartBtn">重新挑战</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const levelText = document.getElementById('level');
const bossHpText = document.getElementById('bossHp');
const bombText = document.getElementById('bomb');
const ultText = document.getElementById('ultimate');
const startBtn = document.getElementById('startBtn');
const bombBtn = document.getElementById('bombBtn');
const ultBtn = document.getElementById('ultBtn');
const skinSwitchBtn = document.getElementById('skinSwitchBtn');
const logo = document.getElementById('logo');
const author = document.getElementById('author');
const defeat = document.getElementById('defeat');
const defeatTitle = document.getElementById('defeatTitle');
const defeatInfo = document.getElementById('defeatInfo');
const restartBtn = document.getElementById('restartBtn');
const unlockTip = document.getElementById('unlockTip');

const pediaBtn = document.getElementById('pediaBtn');
const pediaPopup = document.getElementById('pediaPopup');
const skinList = document.getElementById('skinList');
const closePedia = document.getElementById('closePedia');

const luckyBtn = document.getElementById('luckyBtn');
const luckyPopup = document.getElementById('luckyPopup');
const spinBtn = document.getElementById('spinBtn');
const wheelBg = document.getElementById('wheelBg');
const spinResult = document.getElementById('spinResult');
const closeLucky = document.getElementById('closeLucky');

canvas.width = 375;
canvas.height = 667;

let gameRunning = false;
let score = 0;
let level = 1;
let bossSpawnTimer = null;

let unlockedSkins = [1];
let currentSkin = 1;
let skinColors = {
  1: { body: '#00d9ff', bodyDark: '#005dff', wing: '#0ff', shield: '#0ff' }
};
const skinInfo = {
  1: { name: "基础战机", desc: "均衡型战机\n适合新手" },
  2: { name: "迅风战机", desc: "攻击速度大幅提升" },
  3: { name: "湮灭战机", desc: "大招充能速度加快" },
  4: { name: "圣盾战机", desc: "护盾永久不消耗" },
  5: { name: "至尊战机", desc: "获得分数全部翻倍" }
};

let ultCharge = 0;
const ultMax = 100;
let ulting = false;
let ultFrame = 0;
const ultDuration = 60;

let shipRotate = 0;
let particles = [];

const player = {
  x: canvas.width/2-25, y: canvas.height*0.8, w:50, h:60,
  shieldCount: 1, shieldMax: 3,
  weaponLevel:1, weaponMax:3,
  laserLevel:0, laserMax:3, laserTime:0,
  wingLevel:0, wingMax:3,
  invincibleTime:0, bombCount:0, magnetTime:0
};

let bullets = [];
let enemies = [];
let items = [];
let effects = [];
let followMissiles = [];
let boss = null;
let bossBullets = [];
let textEffects = [];

const prizes = [
  {name:'护盾+1',color:'#0ef'},
  {name:'武器升级',color:'#fc0'},
  {name:'激光满级',color:'#f0f'},
  {name:'僚机满级',color:'#0f6'},
  {name:'炸弹+2',color:'#f60'},
  {name:'无敌10秒',color:'#ff6'},
  {name:'磁铁10秒',color:'#60f'},
  {name:'分数+500',color:'#f66'}
];

function randomHexColor() {
  const letters = '0123456789ABCDEF';
  let color = '#';
  for (let i = 0; i < 6; i++) {
    color += letters[Math.floor(Math.random() * 16)];
  }
  return color;
}

function generateRandomSkinColor() {
  const c1 = randomHexColor();
  const c2 = randomHexColor();
  const c3 = randomHexColor();
  const c4 = randomHexColor();
  return { body: c1, bodyDark: c2, wing: c3, shield: c4 };
}

function addParticle(x, y, color) {
  if(particles.length > 300) return;
  particles.push({
    x, y,
    vx: (Math.random()-0.5)*1.5,
    vy: Math.random()*2.5+1.5,
    life: 35+Math.random()*20,
    maxLife: 55,
    color
  });
}

function drawParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) {
      particles.splice(i,1);
      continue;
    }
    const a = p.life / p.maxLife;
    const s = 2 + a*4;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, s, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function showItemText(x, y, text) {
  textEffects.push({
    x, y, text,
    alpha: 1, life: 60,
    vy: -1.5
  });
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgMusicLoop = null;
let musicGain = null;

function initAudio() {
  if (musicGain) return;
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.25;
  musicGain.connect(audioCtx.destination);
  createBgMusic();
}

function createBgMusic() {
  if (bgMusicLoop) return;
  bgMusicLoop = audioCtx.createBufferSource();
  bgMusicLoop.loop = true;
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < buffer.length; i++) {
    const t = i / audioCtx.sampleRate;
    const note = 440 * Math.pow(2, (Math.floor(t * 2) % 4) / 12);
    data[i] = Math.sin(2 * Math.PI * note * t) * Math.exp(-t * 0.5) * 0.3;
  }
  bgMusicLoop.buffer = buffer;
  bgMusicLoop.connect(musicGain);
}
 function playSkinSwitchSound(skinId) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.25;
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  const tones = {
    1: [523, 587],
    2: [659, 740],
    3: [784, 880],
    4: [880, 988],
    5: [1047, 1175]
  };
  const [f1, f2] = tones[skinId] || tones[1];

  osc.type = 'sine';
  osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
  osc.frequency.setValueAtTime(f2, audioCtx.currentTime + 0.08);
  gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.2;
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  switch (type) {
    case 'shoot':
      osc.type = 'square';
      osc.frequency.setValueAtTime(660, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.12);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
      break;
    case 'boom':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.35);
      break;
    case 'item':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.15);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
      break;
    case 'ult':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.4);
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
      break;
    case 'bomb':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(60, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.6);
      break;
    case 'gameover':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.8);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.9);
      break;
    case 'unlock':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.setValueAtTime(550, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
      break;
    case 'lucky':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime+0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime+0.2);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.4);
      osc.start();osc.stop(audioCtx.currentTime+0.4);
      break;
  }
}

function playBgMusic() {
  if (!bgMusicLoop) createBgMusic();
  try { bgMusicLoop.start(); } catch (e) {}
}
function stopBgMusic() {
  try { if (bgMusicLoop) bgMusicLoop.stop(); } catch (e) {}
  bgMusicLoop = null;
}

canvas.addEventListener('touchmove', e=>{
  if(!gameRunning || ulting) return;
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  const oldX = player.x;
  player.x = t.clientX - r.left - player.w/2;
  player.y = t.clientY - r.top - player.h/2;
  
  const diff = player.x - oldX;
  shipRotate = diff * 0.12;
  if (shipRotate > 0.25) shipRotate = 0.25;
  if (shipRotate < -0.25) shipRotate = -0.25;

  if(player.x < 0) player.x = 0;
  if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;
  if(player.y < 0) player.y = 0;
  if(player.y + player.h > canvas.height) player.y = canvas.height - player.h;
});

skinSwitchBtn.onclick = () => {
  let oldSkin = currentSkin;
  let next = currentSkin;
  for (let i = 0; i < 10; i++) {
    next++;
    if (next > 5) next = 1;
    if (unlockedSkins.includes(next)) {
      currentSkin = next;
      playSkinSwitchSound(currentSkin);
      break;
    }
  }
};

document.addEventListener('keydown', e=>{
  const k = parseInt(e.key);
  if (k >= 1 && k <= 5 && unlockedSkins.includes(k)) {
    currentSkin = k;
    playSkinSwitchSound(currentSkin);
  }
  if(e.key === ' ' && ultCharge >= ultMax) useUltimate();
});

bombBtn.onclick = () => {
  if(player.bombCount <= 0) return;
  player.bombCount--;
  bombText.innerText = '炸弹：'+player.bombCount;
  playSound('bomb');
  for(let i=0;i<enemies.length;i++) boom(enemies[i].x+enemies[i].w/2, enemies[i].y+enemies[i].h/2);
  enemies = [];
  bossBullets = [];
  if(boss) boss.hp -= 10;
};

ultBtn.onclick = useUltimate;
function useUltimate(){
  if(ultCharge < ultMax || ulting) return;
  ultCharge = 0;
  ulting = true;
  ultFrame = 0;
  player.invincibleTime = 2000;
  playSound('ult');
}

function doUltimateDamage(){
  for(let e of enemies) boom(e.x+e.w/2, e.y+e.h/2);
  enemies = [];
  bossBullets = [];
  if(boss) boss.hp -= 25 + level*5;
}

function shoot(){
  if(!gameRunning || ulting) return;
  playSound('shoot');
  const cx = player.x + player.w/2;

  if(player.laserLevel > 0){
    bullets.push({type:'laser',x:cx-10,y:player.y,w:20,h:60,speed:14,color:'#f0f'});
    if(player.laserLevel >=3){
      bullets.push({type:'laser',x:cx-20,y:player.y+8,w:12,h:44,speed:13,color:'#f0f'});
      bullets.push({type:'laser',x:cx+8,y:player.y+8,w:12,h:44,speed:13,color:'#f0f'});
    }
  }

  if(player.weaponLevel>=1){
    bullets.push({type:'normal',x:cx-2,y:player.y,w:4,h:14,speed:9,color:'#0ff'});
  }
  if(player.weaponLevel>=2){
    bullets.push({type:'normal',x:player.x+8,y:player.y+12,w:4,h:14,speed:9,color:'#0ff'});
    bullets.push({type:'normal',x:player.x+38,y:player.y+12,w:4,h:14,speed:9,color:'#0ff'});
  }

  if(player.wingLevel >=1){
    bullets.push({type:'normal',x:player.x-10,y:player.y+24,w:3,h:12,speed:8,color:'#0ff'});
  }
  if(player.wingLevel >=2){
    bullets.push({type:'normal',x:player.x+56,y:player.y+24,w:3,h:12,speed:8,color:'#0ff'});
  }
}

function fireFollowMissile(){
  if(!gameRunning || ulting) return;
  if(enemies.length === 0) return;
  let t = enemies[Math.floor(Math.random()*enemies.length)];
  followMissiles.push({x:player.x+player.w/2,y:player.y,target:t,w:8,h:12,speed:6,color:'#f80'});
}

function createEnemy(){
  if(!gameRunning || boss || ulting) return;
  let speed = 2.6 + level*0.3 + Math.random()*1.8;
  enemies.push({x:Math.random()*(canvas.width-36),y:-40,w:36,h:44,speed:speed,hp:1});
}

function spawnBoss(){
  if(!gameRunning || boss) return;
  let hp = 40 + level*25;
  let size = 140 + level*12;
  if(size > 210) size = 210;
  boss = {
    x: canvas.width/2 - size/2,
    y: 50,
    w: size, h: size*0.75,
    hp: hp, maxHp: hp,
    speed: 1.3 + level*0.22,
    dir: 1,
    level: level,
    attackTimer: 0
  };
  bossHpText.style.display = 'block';
}

function bossAttack(){
  if(!gameRunning || !boss || ulting) return;
  boss.attackTimer++;
  let cd = Math.max(18, 55 - level*9);
  if(boss.attackTimer >= cd){
    boss.attackTimer = 0;
    let cnt = 4 + level*2;
    for(let i=0;i<cnt;i++){
      let ang = (Math.PI*2/cnt)*i;
      let sp = 3.2 + level*0.5;
      bossBullets.push({
        x: boss.x + boss.w/2,
        y: boss.y + boss.h/2,
        vx: Math.cos(ang)*sp,
        vy: Math.sin(ang)*sp,
        w: 8, h:8, color:'#f44'
      });
    }
  }
}

function collide(a,b){
  if(!a || !b) return false;
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function boom(x,y){
  effects.push({x,y,t:0,max:14});
  playSound('boom');
}

function dropItem(x,y){
  const list = [
    'weapon','shield','laser','wing','bomb','invincible','magnet','score'
  ];
  let type = list[Math.floor(Math.random()*list.length)];
  items.push({x,y,w:26,h:26,type,speed:2});
}

function applySkinEffect() {
  switch (currentSkin) {
    case 4:
      player.shieldCount = player.shieldMax;
      break;
  }
}

function drawPlayer(){
  if(player.invincibleTime>0 && Math.floor(Date.now()/120)%2==0) return;
  const cx = player.x + 25;
  const cy = player.y + 30;
  const colors = skinColors[currentSkin];

  addParticle(cx-8, player.y+55, colors.wing);
  addParticle(cx+8, player.y+55, colors.wing);
  addParticle(cx, player.y+58, '#fff');

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(shipRotate);
  ctx.translate(-cx, -cy);

  let grd = ctx.createLinearGradient(cx, player.y-10, cx, player.y + 70);
  grd.addColorStop(0, '#fff');
  grd.addColorStop(0.05, colors.body);
  grd.addColorStop(0.5, colors.bodyDark);
  grd.addColorStop(1, '#000');

  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(cx, player.y - 12);
  ctx.lineTo(player.x + 4, player.y + 20);
  ctx.lineTo(player.x + 2, player.y + 48);
  ctx.lineTo(cx, player.y + 64);
  ctx.lineTo(player.x + 48, player.y + 48);
  ctx.lineTo(player.x + 46, player.y + 20);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = colors.wing;
  ctx.shadowBlur = 22;
  ctx.shadowColor = colors.wing;
  
  ctx.beginPath();
  ctx.moveTo(player.x + 10, player.y + 16);
  ctx.lineTo(player.x - 26, player.y + 30);
  ctx.lineTo(player.x - 22, player.y + 54);
  ctx.lineTo(player.x + 14, player.y + 30);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(player.x + 40, player.y + 16);
  ctx.lineTo(player.x + 76, player.y + 30);
  ctx.lineTo(player.x + 72, player.y + 54);
  ctx.lineTo(player.x + 36, player.y + 30);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 30;
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 6, player.y + 58, 12, 4);
  ctx.fillStyle = colors.body;
  ctx.fillRect(cx - 5, player.y + 54, 10, 4);

  if(player.shieldCount > 0){
    let op = player.shieldCount / player.shieldMax;
    ctx.globalAlpha = op * 0.9;
    ctx.strokeStyle = colors.shield;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 25;
    ctx.shadowColor = colors.shield;
    ctx.beginPath();
    ctx.arc(cx, cy, 46, 0, Math.PI*2);
    ctx.stroke();

    ctx.globalAlpha = op * 0.3;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, 42, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.shadowBlur = 0;
  ctx.restore();

  if (shipRotate > 0) shipRotate -= 0.01;
  if (shipRotate < 0) shipRotate += 0.01;
}

function drawUltimate(){
  let a = ultFrame / ultDuration;
  let r = 350 * a;
  ctx.fillStyle = `rgba(255,0,255,${0.7 - a*0.7})`;
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, r, 0, Math.PI*2);
  ctx.fill();
}

function drawEnemy(e){
  ctx.fillStyle = '#ff2266';
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#ff2266';
  ctx.beginPath();
  ctx.moveTo(e.x + e.w/2, e.y);
  ctx.lineTo(e.x, e.y + e.h);
  ctx.lineTo(e.x + e.w, e.y + e.h);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(e.x + e.w/2 - 2, e.y + 10, 4, 6);
  ctx.shadowBlur = 0;
}

function drawBoss(){
  if(!boss) return;
  const grd = ctx.createLinearGradient(boss.x, boss.y, boss.x, boss.y + boss.h);
  grd.addColorStop(0, '#ff8800'); grd.addColorStop(1, '#ff2200');
  ctx.fillStyle = grd;
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#ff6600';
  ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
  ctx.fillStyle = '#fff';
  ctx.fillRect(boss.x + boss.w/2 - 6, boss.y + 10, 12, 8);
  ctx.fillRect(boss.x + 20, boss.y + boss.h - 20, 12, 8);
  ctx.fillRect(boss.x + boss.w - 32, boss.y + boss.h - 20, 12, 8);
  ctx.shadowBlur = 0;
}

function drawBullet(b){
  if(b.type === 'laser'){
    ctx.fillStyle = '#ff00ff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#f0f';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x + 5, b.y, 10, b.h);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x, b.y + 2, b.w, 4);
    ctx.shadowBlur = 0;
  }
}

function drawMissile(m){
  ctx.fillStyle = '#ff6600';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#ff6600';
  ctx.fillRect(m.x, m.y, m.w, m.h);
  ctx.fillStyle = '#ffff00';
  ctx.fillRect(m.x + 2, m.y + 2, 4, 8);
  ctx.shadowBlur = 0;
}

function drawItem(it){
  const colMap = {
    weapon:'#ffcc00', shield:'#00eeff', laser:'#ff00ff',
    wing:'#00ff88', bomb:'#ff3300', invincible:'#ffff88',
    magnet:'#00ffcc', score:'#ff66ff'
  };
  ctx.fillStyle = colMap[it.type];
  ctx.shadowBlur = 10;
  ctx.shadowColor = colMap[it.type];
  ctx.beginPath();
  ctx.arc(it.x + it.w/2, it.y + it.h/2, it.w/2, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawEffect(ef){
  let s = ef.t * 3.8;
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.arc(ef.x, ef.y, s, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.arc(ef.x, ef.y, s * 0.6, 0, Math.PI*2);
  ctx.fill();
}

function drawTextEffects() {
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  for (let i = textEffects.length - 1; i >= 0; i--) {
    const te = textEffects[i];
    te.life--;
    te.y += te.vy;
    te.alpha = te.life / 60;
    if (te.life <= 0) { textEffects.splice(i, 1); continue; }

    ctx.globalAlpha = te.alpha;
    ctx.fillStyle = '#fff';
    ctx.fillText(te.text, te.x, te.y);
    ctx.globalAlpha = 1;
  }
}

function openLucky(){
  if(!gameRunning) return;
  luckyPopup.style.display = 'flex';
  spinBtn.disabled = false;

  wheelBg.style.animation = 'none';

function givePrize(name){
  switch(name){
    case '护盾+1':
      if(player.shieldCount < player.shieldMax) player.shieldCount++;
      showItemText(player.x+25,player.y,'护盾+1');
      break;
    case '武器升级':

      break;
    case '激光满级':
      player.laserLevel = player.laserMax;
      player.laserTime = 999999;
      showItemText(player.x+25,player.y,'激光满级');
      break;
    case '僚机满级':
      player.wingLevel = player.wingMax;
      showItemText(player.x+25,player.y,'僚机满级');
      break;
    case '炸弹+2':
      player.bombCount +=2;
      bombText.innerText='炸弹：'+player.bombCount;
      showItemText(player.x+25,player.y,'炸弹+2');
      break;
    case '无敌10秒':
      player.invincibleTime = 10000;
      showItemText(player.x+25,player.y,'无敌10秒');
      break;
    case '磁铁10秒':

      score +=500;
      scoreText.innerText='分数：'+score;
      showItemText(player.x+25,player.y,'分数+500');

function unlockSkin(id){
  if(unlockedSkins.includes(id)) return;
  unlockedSkins.push(id);
  skinColors[id] = generateRandomSkinColor();
  unlockTip.innerText = '🎉 解锁新战机：'+skinInfo[id].name;
  unlockTip.style.display = 'block';
  playSound('unlock');
  setTimeout(()=>{unlockTip.style.display='none'},2800);
}

function checkUnlock(){
  if(score >= 800 && !unlockedSkins.includes(2)) unlockSkin(2);
  if(score >= 2000 && !unlockedSkins.includes(3)) unlockSkin(3);
  if(score >= 5000 && !unlockedSkins.includes(4)) unlockSkin(4);
  if(score >= 12000 && !unlockedSkins.includes(5)) unlockSkin(5);
}

function renderSkinPedia(){
  skinList.innerHTML = '';
  for(let id=1;id<=5;id++){
    let item = document.createElement('div');
    item.className = 'skin-item';
    if(unlockedSkins.includes(id)) item.classList.add('unlocked');
    if(currentSkin === id) item.classList.add('current');

    let colorDiv = document.createElement('div');
    colorDiv.className = 'skin-color';
    if(skinColors[id]){
      colorDiv.style.background = skinColors[id].body;
    }else{
      colorDiv.style.background = '#444';
    }

    let nameDiv = document.createElement('div');
    nameDiv.className = 'skin-name';
    nameDiv.innerText = skinInfo[id].name;

    let descDiv = document.createElement('div');
    descDiv.className = 'skin-desc';
    descDiv.innerText = skinInfo[id].desc;

    let btn = document.createElement('button');
    btn.className = 'use-skin-btn';
    btn.innerText = currentSkin===id ? '已使用' : '使用';
    btn.disabled = !unlockedSkins.includes(id);
    btn.onclick = ()=>{
      currentSkin = id;
      playSkinSwitchSound(id);
      renderSkinPedia();
    };

    item.appendChild(colorDiv);
    item.appendChild(nameDiv);
    item.appendChild(descDiv);
    item.appendChild(btn);
    skinList.appendChild(item);
  }
}

function openPedia(){
  renderSkinPedia();
  pediaPopup.style.display = 'flex';
}
function closePediaPopup(){
  pediaPopup.style.display = 'none';
}

function gameOver(){
  gameRunning = false;
  stopBgMusic();
  playSound('gameover');
  defeatTitle.innerText = '战 败';
  defeatInfo.innerHTML = `最终分数：${score}<br>达到关卡：${level}`;
  defeat.style.display = 'block';
}

function restartGame(){
  defeat.style.display = 'none';
  startGame();
}

function startGame(){
  gameRunning = true;
  score = 0;
  level = 1;
  ultCharge = 0;
  ulting = false;
  boss = null;
  bullets = [];enemies=[];items=[];effects=[];followMissiles=[];bossBullets=[];textEffects=[];
  
  player.x = canvas.width/2-25;
  player.y = canvas.height*0.8;
  player.shieldCount = 1;
  player.weaponLevel = 1;
  player.laserLevel = 0;player.laserTime=0;
  player.wingLevel=0;
  player.invincibleTime=0;player.bombCount=0;player.magnetTime=0;

  logo.style.display = 'none';
  author.style.display = 'none';
  startBtn.style.display = 'none';
  bombBtn.style.display = 'block';
  ultBtn.style.display = 'block';
  skinSwitchBtn.style.display = 'block';
  pediaBtn.style.display = 'block';
  luckyBtn.style.display = 'block';
  bossHpText.style.display = 'none';

  scoreText.innerText = '分数：0';
  levelText.innerText = '关卡：1';
  bombText.innerText = '炸弹：0';
  ultText.innerText = '大招能量：0/100';

  initAudio();
  playBgMusic();

  clearInterval(bossSpawnTimer);
  bossSpawnTimer = setInterval(()=>{
    if(gameRunning && !boss) spawnBoss();
  },28000);

  requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp){
  if(!gameRunning) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(player.invincibleTime>0) player.invincibleTime -= 16;
  if(player.magnetTime>0) player.magnetTime -=16;
  if(player.laserTime>0) player.laserTime -=16;
  if(player.laserTime <=0 && player.laserLevel>0) player.laserLevel=0;

  applySkinEffect();
  checkUnlock();

  drawParticles();

  if(Math.floor(timestamp/350)%2===0 && !ulting) shoot();
  if(Math.floor(timestamp/800)%1===0 && !ulting) fireFollowMissile();
  if(Math.floor(timestamp/600)%1===0) createEnemy();

  for(let i=bullets.length-1;i>=0;i--){
    let b = bullets[i];
    b.y -= b.speed;
    drawBullet(b);
    if(b.y < -50) bullets.splice(i,1);
  }

  for(let i=enemies.length-1;i>=0;i--){
    let e = enemies[i];
    if(!e) continue;
    e.y += e.speed;
    drawEnemy(e);
    if(e.y > canvas.height) {enemies.splice(i,1);continue;}
    if(collide(player,e) && player.invincibleTime<=0){
      boom(e.x+e.w/2,e.y+e.h/2);
      enemies.splice(i,1);
      player.shieldCount--;
      if(player.shieldCount <=0) {gameOver();return;}
    }
    for(let j=bullets.length-1;j>=0;j--){
      let b = bullets[j];
      if(!b) continue;
      if(collide(b,e)){
        e.hp--;
        bullets.splice(j,1);
        if(e.hp <=0){
          boom(e.x+e.w/2,e.y+e.h/2);
          let add = 10;
          if(currentSkin ===5) add *=2;
          score += add;
          scoreText.innerText = '分数：'+score;
          if(Math.random()<0.12) dropItem(e.x+e.w/2-13,e.y+e.h/2-13);
          enemies.splice(i,1);
          let uc = 2;
          if(currentSkin ===3) uc=4;
          ultCharge = Math.min(ultMax, ultCharge+uc);
          ultText.innerText = '大招能量：'+ultCharge+'/'+ultMax;
        }
        break;
      }
    }
  }

  for(let i=followMissiles.length-1;i>=0;i--){
    let m = followMissiles[i];
    if(!m || !m.target || enemies.indexOf(m.target)===-1){
      followMissiles.splice(i,1);continue;
    }
    let tx = m.target.x + m.target.w/2;
    let ty = m.target.y + m.target.h/2;
    let dx = tx - m.x;
    let dy = ty - m.y;
    let dist = Math.hypot(dx,dy);
    if(dist <=0) dist = 1;
    m.x += (dx/dist)*m.speed;
    m.y += (dy/dist)*m.speed;
    drawMissile(m);
    if(collide(m,m.target)){
      boom(m.x,m.y);
      followMissiles.splice(i,1);
      m.target.hp -=1;
      if(m.target.hp <=0){
        let add = 10;
        if(currentSkin ===5) add *=2;
        score += add;
        scoreText.innerText = '分数：'+score;
        enemies.splice(enemies.indexOf(m.target),1);
      }
    }
  }

  for(let i=items.length-1;i>=0;i--){
    let it = items[i];
    it.y += it.speed;
    if(player.magnetTime>0){
      let cx = player.x+player.w/2, cy=player.y+player.h/2;
      let ix=it.x+it.w/2, iy=it.y+it.h/2;
      let dx = cx-ix, dy=cy-iy;
      let d=Math.hypot(dx,dy);
      if(d<120 && d>0){it.x += (dx/d)*3; it.y += (dy/d)*3;}
    }
    drawItem(it);
    if(it.y>canvas.height) {items.splice(i,1);continue;}
    if(collide(player,it)){
      playSound('item');
      items.splice(i,1);
      switch(it.type){
        case 'weapon': if(player.weaponLevel<player.weaponMax) player.weaponLevel++; showItemText(player.x+25,player.y,'武器升级'); break;
        case 'shield': if(player.shieldCount<player.shieldMax) player.shieldCount++; showItemText(player.x+25,player.y,'护盾+1'); break;
        case 'laser': player.laserLevel=player.laserMax; player.laserTime=8000; showItemText(player.x+25,player.y,'激光已满'); break;
        case 'wing': if(player.wingLevel<player.wingMax) player.wingLevel++; showItemText(player.x+25,player.y,'僚机升级'); break;
        case 'bomb': player.bombCount++; bombText.innerText='炸弹：'+player.bombCount; showItemText(player.x+25,player.y,'炸弹+1'); break;
        case 'invincible': player.invincibleTime=6000; showItemText(player.x+25,player.y,'无敌'); break;
        case 'magnet': player.magnetTime=8000; showItemText(player.x+25,player.y,'磁铁'); break;
        case 'score': let add=50; if(currentSkin===5) add*=2; score+=add; scoreText.innerText='分数：'+score; showItemText(player.x+25,player.y,'分数+50'); break;
      }
    }
  }

  for(let i=effects.length-1;i>=0;i--){
    let ef = effects[i];
    ef.t++;
    drawEffect(ef);
    if(ef.t >= ef.max) effects.splice(i,1);
  }

  drawTextEffects();

  if(boss){
    boss.x += boss.speed * boss.dir;
    if(boss.x < 0 || boss.x + boss.w > canvas.width) boss.dir *= -1;
    drawBoss();
    bossAttack();
    bossHpText.innerText = `BOSS 血量：${Math.ceil(boss.hp)} / ${boss.maxHp}`;
    if(boss.hp <=0){
      boom(boss.x+boss.w/2,boss.y+boss.h/2);
      let add = 200;
      if(currentSkin ===5) add *=2;
      score += add;
      scoreText.innerText = '分数：'+score;
      boss = null;
      bossHpText.style.display = 'none';
      level++;
      levelText.innerText = '关卡：'+level;
    }
  }

  for(let i=bossBullets.length-1;i>=0;i--){
    let b = bossBullets[i];
    if(!b) continue;
    b.x += b.vx; b.y += b.vy;
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 8; ctx.shadowColor = b.color;
    ctx.fillRect(b.x,b.y,b.w,b.h); ctx.shadowBlur=0;
    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height){bossBullets.splice(i,1);continue;}
    if(collide(player,b) && player.invincibleTime<=0){
      bossBullets.splice(i,1);
      player.shieldCount--;
      if(player.shieldCount <=0) {gameOver();return;}
    }
  }

  if(ulting){
    ultFrame++;
    drawUltimate();
    if(ultFrame % 12 ===0) doUltimateDamage();
    if(ultFrame >= ultDuration) {ulting = false; ultFrame=0;}
  }

  drawPlayer();
  ultBtn.disabled = ultCharge < ultMax;
  requestAnimationFrame(gameLoop);
}

startBtn.onclick = startGame;
restartBtn.onclick = restartGame;
pediaBtn.onclick = openPedia;
closePedia.onclick = closePediaPopup;
luckyBtn.onclick = openLucky;
closeLucky.onclick = closeLuckyPopup;
spinBtn.onclick = spinWheel;
</script>
</body>
</html>
