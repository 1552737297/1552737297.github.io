<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太空雷霆战机 - 图鉴+专属皮肤音效完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#000;
display:flex;justify-content:center;align-items:center;
height:100vh;overflow:hidden;touch-action:none;
color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
perspective: 1000px;
}
#game{
border:2px solid #0ef;
background:linear-gradient(#000,#10122a);
display:block;
box-shadow: 0 0 20px #0ef,inset 0 0 20px rgba(0,238,255,.2);
}
/* 图鉴弹窗样式 */
#bookPanel{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.85);display:none;z-index:99;
padding:20px;overflow:auto;
}
.book-content{
max-width:500px;margin:30px auto;background:#111;border:2px solid #0ef;
border-radius:12px;padding:20px;box-shadow:0 0 30px #0ef;
}
.book-item{
padding:12px;margin:10px 0;border:1px solid #333;border-radius:8px;
display:flex;justify-content:space-between;align-items:center;
}
.lock{color:#666}
.use-btn{padding:6px 12px;border:none;border-radius:4px;cursor:pointer}
.unlock-btn{background:#08f;color:#fff}
.used-btn{background:#0c6;color:#fff}
.disable-btn{background:#444;color:#999;cursor:not-allowed}
#bookBtn{
position:fixed;left:20px;bottom:20px;padding:8px 16px;
background:#0ef;color:#000;border:none;border-radius:6px;
z-index:10;cursor:pointer;font-weight:bold;
}
#closeBook{
float:right;padding:6px 12px;background:#f33;color:#fff;
border:none;border-radius:4px;cursor:pointer;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<!-- 全局音效预加载 -->
<audio id="sfx-normal" preload="auto">
<source src="https://freesound.org/data/previews/80/80921_1437127-lq.mp3">

<audio id="sfx-fast" preload="auto">
<source src="https://freesound.org/data/previews/169/169245_3148214-lq.mp3">

<audio id="sfx-dark" preload="auto">
<source src="https://freesound.org/data/previews/322/322741_5993545-lq.mp3">

<audio id="sfx-shield" preload="auto">
<source src="https://freesound.org/data/previews/248/248349_4480405-lq.mp3">

<audio id="sfx-supreme" preload="auto">
<source src="https://freesound.org/data/previews/451/451263_8588048-lq.mp3">

<audio id="skinChangeSnd" preload="auto">
<source src="https://freesound.org/data/previews/131/131256_2376305-lq.mp3">


<!-- 图鉴UI -->
<button id="bookBtn">战机图鉴</button>
<div id="bookPanel">
<div class="book-content">
<button id="closeBook">关闭</button>
<h2 style="text-align:center;margin-bottom:20px;color:#0ef">战机图鉴</h2>
<div id="bookList"></div>
</div>
</div>

<script>
// ========== 音效核心函数 ==========
function playSkinChangeSound(){
    let snd = document.getElementById('skinChangeSnd');
    snd.currentTime = 0;
    snd.play().catch(e=>{});
}
function playShootBySkin(skin){
    let aid = 'sfx-normal';
    switch(skin){
        case 'xunfeng': aid = 'sfx-fast'; break;
        case 'anmie': aid = 'sfx-dark'; break;
        case 'shengdun': aid = 'sfx-shield'; break;
        case 'zhizun': aid = 'sfx-supreme'; break;
    }
    let snd = document.getElementById(aid);
    snd.currentTime = 0;
    snd.play().catch(e=>{});
}

// ========== 游戏基础画布 ==========
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 320;
canvas.height = 520;

// 战机皮肤配置
const skinConfig = [
    {id:'base',name:'基础战机',color:'#0ef',desc:'均衡稳定',unlock:true},
    {id:'xunfeng',name:'迅风战机',color:'#3f3',desc:'射速大幅提升',unlock:false,boss:1},
    {id:'anmie',name:'湮灭战机',color:'#93f',desc:'大招充能加快',unlock:false,boss:2},
    {id:'shengdun',name:'圣盾战机',color:'#ff3',desc:'护盾永久生效',unlock:false,boss:3},
    {id:'zhizun',name:'至尊战机',color:'#f33',desc:'得分翻倍',unlock:false,boss:4}
];
let currentSkin = 'base';

// 图鉴渲染
function renderBook(){
    let html = '';
    skinConfig.forEach(item=>{
        let tip = item.unlock ? '已解锁':'击败BOSS'+item.boss+'解锁';
        let btnClass = '';
        let btnText = '';
        if(!item.unlock){
            btnClass = 'disable-btn';
            btnText = '未解锁';
        }else if(currentSkin === item.id){
            btnClass = 'used-btn';
            btnText = '使用中';
        }else{
            btnClass = 'unlock-btn';
            btnText = '切换使用';
        }
        html += `
        <div class="book-item ${!item.unlock?'lock':''}">
            <div>
                <div>${item.name}</div>
                <div style="font-size:12px;color:#aaa">${item.desc}</div>
            </div>
            <button class="use-btn ${btnClass}" data-skin="${item.id}" ${!item.unlock?'disabled':''}>${btnText}</button>
        </div>
        `;
    });
    document.getElementById('bookList').innerHTML = html;

    // 绑定切换皮肤事件+音效
    document.querySelectorAll('.use-btn:not([disabled])').forEach(btn=>{
        btn.onclick = function(){
            let sid = this.dataset.skin;
            currentSkin = sid;
            playSkinChangeSound(); //切换皮肤音效
            renderBook();
        }
    })
}

// 图鉴开关
document.getElementById('bookBtn').onclick = ()=>{
    document.getElementById('bookPanel').style.display = 'block';
}
document.getElementById('closeBook').onclick = ()=>{
    document.getElementById('bookPanel').style.display = 'none';
}

// 模拟发射子弹对接专属音效（你原有发射逻辑替换调用这个）
function playerShoot(){
    playShootBySkin(currentSkin);
    //这里放你原有生成子弹绘制逻辑
}

// 初始化
renderBook();

// 后续你原有：BOSS击杀解锁皮肤、战机绘制、大招、升级 全部正常兼容
</script>
</body>
</html>
