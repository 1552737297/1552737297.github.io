function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function hexToRgb(h){return [parseInt(h.substr(1,2),16),parseInt(h.substr(3,2),16),parseInt(h.substr(5,2),16)];}
function colorDist(c1,c2){const dr=c1.r-c2.r, dg=c1.g-c2.g, db=c1.b-c2.b; return dr*dr+dg*dg+db*db;}
function matchColor(r,g,b){let best=null,bestDist=Infinity; for(const col of COLOR_CARD){const d=colorDist({r,g,b},col); if(d<bestDist){bestDist=d; best=col;}} return best || {code:null, r,g,b};}

// 主应用对象
const app = {

  historyIndex: -1,
  
  init(){

  bindEvents(){
    document.getElementById('fileInput').onchange = e => this.handleImageUpload(e);

    const canvas = document.getElementById('gridCanvas');
    canvas.addEventListener('click', (e) => this.onCanvasClick(e));
  },
  
  showLoading(show){
    const el = document.getElementById('loading');
    if(show) el.classList.add('show');
    else el.classList.remove('show');
  },
  
  handleImageUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.onload = () => {
      this.originalImage = img;
      this.generateGrid();
    };
    img.src = URL.createObjectURL(file);
  },
  
  setSize(n){
    document.getElementById('gridSize').value = n;
    this.currentSize = n;
    if(this.originalImage) this.generateGrid();
    else this.clearGrid();
  },
  
  clearGrid(){
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 0; canvas.height = 0;
    this.pixels = [];
    this.updateStat();
  },
  
  async generateGrid(){
    if(!this.originalImage){
      alert("请先上传图片");
      return;
    }
    this.showLoading(true);
    await new Promise(r => setTimeout(r, 10));   
    const size = parseInt(document.getElementById('gridSize').value);
    this.currentSize = size;
    const threshold = parseInt(document.getElementById('whiteThreshold').value);
    const flip = document.getElementById('flipX').checked;
    const useColorMatch = document.getElementById('useColorMatch').checked;
    
    const offCanvas = document.createElement('canvas');
    offCanvas.width = size;
    offCanvas.height = size;
    const ctx = offCanvas.getContext('2d');
    ctx.drawImage(this.originalImage, 0, 0, size, size);
    const imgData = ctx.getImageData(0, 0, size, size);
    const data = imgData.data;
    
    const newPixels = [];
    for(let y=0; y<size; y++){
      const row = [];
      for(let x=0; x<size; x++){
        const idx = (y*size + x) * 4;
        let r = data[idx], g = data[idx+1], b = data[idx+2];
        const or=r, og=g, ob=b;
        let code = null;
        // 去白
        if(r>threshold && g>threshold && b>threshold) r=g=b=255;
        // 色卡匹配
        if(useColorMatch){
          const matched = matchColor(r,g,b);
          r = matched.r; g = matched.g; b = matched.b;
          code = matched.code;
        }
        row.push({r,g,b,or,og,ob, code});
      }
      newPixels.push(row);
    }
    if(flip){
      for(let y=0; y<size; y++) newPixels[y].reverse();
    }
    this.pixels = newPixels;
    this.pushHistory();
    this.renderCanvas();
    this.updateStat();
    this.showLoading(false);
  },
  
  renderCanvas(){
    const size = this.pixels.length;
    if(size===0) return;
    const cellSize = 32;
    const canvas = document.getElementById('gridCanvas');
    canvas.width = size * cellSize;
    canvas.height = size * cellSize;
    const ctx = canvas.getContext('2d');
    for(let y=0; y<size; y++){
      for(let x=0; x<size; x++){
        const p = this.pixels[y][x];
        ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
        ctx.fillRect(x*cellSize, y*cellSize, cellSize-1, cellSize-1);
        let displayText = p.code ? p.code : rgbToHex(p.r,p.g,p.b).slice(1);
        ctx.font = "bold 11px monospace";
        ctx.fillStyle = (p.r*0.299 + p.g*0.587 + p.b*0.114) > 160 ? "#000" : "#fff";
        ctx.fillText(displayText, x*cellSize+4, y*cellSize+20);
      }
    }
  }, 
  onCanvasClick(e){
    const canvas = document.getElementById('gridCanvas');
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    const cellSize = 32;
    const x = Math.floor(mouseX / cellSize);
    const y = Math.floor(mouseY / cellSize);
    if(x>=0 && x<this.pixels.length && y>=0 && y<this.pixels.length){
      const p = this.pixels[y][x];
      document.getElementById('cellColor').value = rgbToHex(p.r,p.g,p.b);
      document.getElementById('r').value = p.r;
      document.getElementById('g').value = p.g;
      document.getElementById('b').value = p.b;
      this.selectedCell = {x,y};
    }
  },
  
  applyCellEdit(){
    if(!this.pixels.length || !this.selectedCell) { alert("请先在网格上点击一个格子"); return; }
    const r = parseInt(document.getElementById('r').value);
    const g = parseInt(document.getElementById('g').value);
    const b = parseInt(document.getElementById('b').value);
    const {x,y} = this.selectedCell;
    if(this.pixels[y] && this.pixels[y][x]){
      this.pixels[y][x].r = r;
      this.pixels[y][x].g = g;
      this.pixels[y][x].b = b;
      if(document.getElementById('useColorMatch').checked){
        const matched = matchColor(r,g,b);
        this.pixels[y][x].code = matched.code;
      } else {
        this.pixels[y][x].code = null;
      }
      this.pushHistory();
      this.renderCanvas();
      this.updateStat();
    }
  },
  applyBatchReplace(){
    const fromRGB = hexToRgb(document.getElementById('fromColor').value);
    const toRGB = hexToRgb(document.getElementById('toColor').value);
    const tolerance = parseInt(document.getElementById('replaceTolerance').value);
    const useColorMatch = document.getElementById('useColorMatch').checked;
    let changed = false;
    for(let y=0; y<this.pixels.length; y++){
      for(let x=0; x<this.pixels[y].length; x++){
        const p = this.pixels[y][x];
        const dist = Math.sqrt((p.r-fromRGB[0])**2 + (p.g-fromRGB[1])**2 + (p.b-fromRGB[2])**2);
        if(dist <= tolerance){
          p.r = toRGB[0];
          p.g = toRGB[1];
          p.b = toRGB[2];
          if(useColorMatch){
            const matched = matchColor(p.r, p.g, p.b);
            p.code = matched.code;
          } else {
            p.code = null;
          }
          changed = true;
        }
      }
    }
    if(changed){
      this.pushHistory();
      this.renderCanvas();
      this.updateStat();
    } else {
      alert("未找到匹配的颜色（可增加容差值）");
    }
  },
  
  pushHistory(){
    const copy = JSON.parse(JSON.stringify(this.pixels));
    this.history = this.history.slice(0, this.historyIndex+1);
    this.history.push(copy);
    if(this.history.length > 50) this.history.shift();
    this.historyIndex = this.history.length - 1;
  },
  undo(){
    if(this.historyIndex > 0){
      this.historyIndex--;
      this.pixels = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
      this.renderCanvas();
      this.updateStat();
    }
  },
  
  redo(){
    if(this.historyIndex < this.history.length-1){
      this.historyIndex++;
      this.pixels = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
      this.renderCanvas();
      this.updateStat();
    }
  },
  
  updateStat(){
    if(!this.pixels.length){ document.getElementById('statBody').innerHTML = '<tr><td colspan="7">暂无数据</td></tr>'; return; }
    const size = this.pixels.length;
    const total = size*size;
    const colorMap = new Map();
    for(let y=0; y<size; y++){
      for(let x=0; x<size; x++){
        const p = this.pixels[y][x];
        const key = `${p.r},${p.g},${p.b}`;
        if(!colorMap.has(key)) colorMap.set(key, {r:p.r,g:p.g,b:p.b, or:p.or, og:p.og, ob:p.ob, cnt:0, code:p.code});
        colorMap.get(key).cnt++;
      }
    }
    const sorted = Array.from(colorMap.values()).sort((a,b)=>b.cnt-a.cnt);
    const tbody = document.getElementById('statBody');
    tbody.innerHTML = '';
    for(const c of sorted){
      const tr = document.createElement('tr');
      const hex = rgbToHex(c.r,c.g,c.b);
      tr.innerHTML = `
        <td style="background:${hex};width:40px"></td>
        <td>${c.code || '-'}</td>
        <td>${hex}</td>
        <td>${c.or},${c.og},${c.ob}</td>
        <td>${c.r},${c.g},${c.b}</td>
        <td>${c.cnt}</td>
        <td>${(c.cnt/total*100).toFixed(2)}%</td>
      `;
      tbody.appendChild(tr);
    }
  }, 
  exportFull(){
    if(!this.pixels.length){ alert("没有可导出的图纸"); return; }
    const size = this.pixels.length;
    const scale = parseInt(document.getElementById('exportScale').value);
    const cellSize = 32;
    const outWidth = size * cellSize * scale;
    const outHeight = size * cellSize * scale;
    if(outWidth > 16384 || outHeight > 16384){
      alert("导出尺寸过大，请减小缩放倍数或网格尺寸");
      return;
    }
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = outWidth;
    exportCanvas.height = outHeight;
    const ctx = exportCanvas.getContext('2d');
    ctx.scale(scale, scale);
    for(let y=0; y<size; y++){
      for(let x=0; x<size; x++){
        const p = this.pixels[y][x];
        ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
        ctx.fillRect(x*cellSize, y*cellSize, cellSize, cellSize);
        let displayText = p.code ? p.code : rgbToHex(p.r,p.g,p.b).slice(1);
        ctx.font = "bold 11px monospace";
        ctx.fillStyle = (p.r*0.299 + p.g*0.587 + p.b*0.114) > 160 ? "#000" : "#fff";
        ctx.fillText(displayText, x*cellSize+4, y*cellSize+20);
      }
    }
    const link = document.createElement('a');
    link.download = `拼豆图纸_${size}x${size}.png`;
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
  }, 
  loadDemoData(){
    const img = new Image();
    img.onload = () => {
      this.originalImage = img;
      this.generateGrid();
    };
    img.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f0f0f0'/%3E%3Ccircle cx='50' cy='50' r='40' fill='%234caf50'/%3E%3C/svg%3E";
  }
};

window.onload = () => { app.init(); };
</script>
