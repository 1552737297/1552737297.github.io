   <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 游戏画布 */
        #gameCanvas {
            border: 2px solid #0ef;
            background: linear-gradient(to bottom, #000, #0a0b2e);
            display: block;
            box-shadow: 0 0 25px #0ef;
        }

        /* 图鉴按钮 */
        #bookBtn {
            position: fixed;
            left: 15px;
            bottom: 15px;
            padding: 8px 14px;
            background: #0ef;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            z-index: 999;
        }

        /* 图鉴弹窗 */
        #bookPanel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .bookContent {
            max-width: 480px;
            margin: 40px auto;
            background: #111435;
            border: 2px solid #0ef;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 30px #0ef;
        }

        .bookTitle {
            text-align: center;
            color: #0ef;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .closeBook {
            float: right;
            padding: 5px 10px;
            background: #f44336;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .planeItem {
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .planeName {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .planeDesc {
            font-size: 12px;
            color: #ccc;
        }

        .useBtn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .btnUnlocked {
            background: #2196f3;
            color: #fff;
        }

        .btnUsed {
            background: #4caf50;
            color: #fff;
            cursor: default;
        }

        .btnLocked {
            background: #666;
            color: #999;
            cursor: not-allowed;
        }

        /* 血条样式 */
        .hpBar {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .hpCurrent {
            height: 100%;
            background: #f44336;
            transition: width 0.2s ease;
</style</head>
<!-- 游戏画布 -->
    <canvas id="gameCanvas" width="360" height="640"><!-- 图鉴按钮 -->
    <button id="bookBtn"></button>
<!-- 图鉴弹窗 --><div id="bookPanel">
        <div class="bookContent"><button class="</button<h2 class="bookTitle">战机</h2>
<div id="plane</div>
        </div>
    <!-- 战机专属音效预加载 --><audio preload="auto" id="sfx-normal">
        <source src="https://freesound.org/data/previews/80/80921_1437127-lq.mp3" type="audio/mpeg">
    
    <audio preload="auto" id="sfx-fast"><source src="https://freesound.org/data/previews/169/169245_3148214-lq.mp3" type="audio/mpeg">
    <audio preload="auto" id="sfx-dark">
<source src="https://freesound.org/data/previews/322/322741_599354-lq.mp3" type="audio/mpeg">
    <audio preload="auto" id="sfx-shield">
       <source src="https://freesound.org/data/previews/248/248349_4480405-lq.mp3" type="audio/mpeg">
    <audio preload="auto" id="sfx-supreme">
       <source src="https://freesound.org/data/previews/451/451263_8588048-lq.mp3" type="audio/mpeg">
    <audio preload="auto" id="skin<source src="https://freesound.org/data/previews/131/131256_2376305-lq.mp3" type="audio/mpeg">
    

   <script>
        // 获取画布与上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const canvasW = canvas.width;
        const canvasH = canvas.height;

        // 战机配置（含图鉴、特性、音效）
        const planeConfig = [
            { id: 'base', name: '基础战机', color: '#0ef', unlock: true, desc: '均衡稳定，新手首选', shootSfx: 'sfx-normal' },
            { id: 'xunfeng', name: '迅风战机', color: '#3f3', unlock: false, desc: '射速大幅提升，压制力拉满', shootSfx: 'sfx-fast', unlockBoss: 1 },
            { id: 'anmie', name: '湮灭战机', color: '#93f', unlock: false, desc: '大招充能速度加快，清屏更快', shootSfx: 'sfx-dark', unlockBoss: 2 },
            { id: 'shengdun', name: '圣盾战机', color: '#ff3', unlock: false, desc: '护盾永久不消耗，生存拉满', shootSfx: 'sfx-shield', unlockBoss: 3 },
            { id: 'zhizun', name: '至尊战机', color: '#f33', unlock: false, desc: '所有获得分数翻倍，刷分神器', shootSfx: 'sfx-supreme', unlockBoss: 4 }
        ];

        // 游戏核心变量
        let currentPlane = planeConfig[0]; // 当前使用战机
        let planeX = canvasW / 2 - 20;
        let planeY = canvasH - 80;
        let planeW = 40;
        let planeH = 50;
        let bullets = [];
        let enemies = [];
        let score = 0;
        let gameRunning = true;
        let shootSpeed = 300; // 基础射速
        let lastShootTime = 0;

        // 音效播放函数（防报错、防叠加）
        function playSound(soundId) {
            const audio = document.getElementById(soundId);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(err => console.log('音效播放失败：', err));
            }
        }

        // 皮肤切换音效
        function playChangeSkinSound() {
            playSound('skinChange');
        }

        // 渲染图鉴列表
        function renderPlaneList() {
            const listDom = document.getElementById('planeList');
            let html = '';
            planeConfig.forEach(item => {
                let btnClass = '';
                let btnText = '';
                if (!item.unlock) {
                    btnClass = 'btnLocked';
                    btnText = `击败BOSS${item.unlockBoss}解锁`;
                } else if (currentPlane.id === item.id) {
                    btnClass = 'btnUsed';
                    btnText = '使用中';
                } else {
                    btnClass = 'btnUnlocked';
                    btnText = '切换使用';
                }
                html +=<div class="planeItem">
                    <div>
                        <div class="planeName" style="color:${item.color}">${item.name}</div>
                        <div class="planeDesc"></div</div><button class="useBtn ${btnClass}" data-id="${item.id}" ${!item.unlock ? 'disabled' : ''}></button></div>
                `;
            });
            listDom.innerHTML = html;

            // 绑定切换战机事件
            document.querySelectorAll('.useBtn:not([disabled])').forEach(btn => {
                btn.onclick = function () {
                    const planeId = this.dataset.id;
                    currentPlane = planeConfig.find(item => item.id === planeId);
                    // 切换射速适配迅风战机
                    shootSpeed = currentPlane.id === 'xunfeng' ? 150 : 300;
                    playChangeSkinSound();
                    renderPlaneList();
                };
            });
        }

        // 图鉴弹窗控制
        const bookBtn = document.getElementById('bookBtn');
        const bookPanel = document.getElementById('bookPanel');
        const closeBookBtn = document.querySelector('.closeBook');
        bookBtn.onclick = () => { bookPanel.style.display = 'block'; };
        closeBookBtn.onclick = () => { bookPanel.style.display = 'none'; };

        // 绘制战机（棱角分明+立体效果）
        function drawPlane() {
            ctx.fillStyle = currentPlane.color;
            // 立体棱角机身
            ctx.beginPath();
            ctx.moveTo(planeX + planeW / 2, planeY);
            ctx.lineTo(planeX, planeY + planeH * 0.7);
            ctx.lineTo(planeX + planeW * 0.3, planeY + planeH);
            ctx.lineTo(planeX + planeW * 0.7, planeY + planeH);
            ctx.lineTo(planeX + planeW, planeY + planeH * 0.7);
            ctx.closePath();
            ctx.fill();
            // 立体高光
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.moveTo(planeX + planeW / 2, planeY + 5);
            ctx.lineTo(planeX + 8, planeY + planeH * 0.7);
            ctx.lineTo(planeX + planeW / 2, planeY + planeH - 5);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // 绘制子弹
        function drawBullets() {
            ctx.fillStyle = '#fff';
            bullets.forEach((bullet, index) => {
                bullet.y -= 8;
                ctx.fillRect(bullet.x, bullet.y, 4, 10);
                if (< 0) bullets.splice(index, 1);
            });
        }

        // 发射子弹
        function shootBullet(timestamp) {
            if (timestamp - lastShootTime > shootSpeed && gameRunning) {
                bullets.push({ x: planeX + planeW / 2 - 2, y: planeY });
                playSound(currentPlane.shootSfx);
                lastShootTime = timestamp;
            }
        }

        // 绘制敌机
        function drawEnemies() {
            ctx.fillStyle = '#ff4444';
            enemies.forEach((enemy, index) => {
                enemy.y += 3;
                // 棱角敌机
                ctx.beginPath();
                ctx.moveTo(enemy.x + enemy.w / 2, enemy.y);
                ctx.lineTo(enemy.x, enemy.y + enemy.h);
                ctx.lineTo(enemy.x + enemy.w, enemy.y + enemy.h);
                ctx.closePath();
                ctx.fill();
                if (enemy.y > canvasH) enemies.splice(index, 1);
            });
        }

        // 随机生成敌机
        function createEnemy() {
            if< 0.02 && gameRunning) {
                enemies.push({
                    x: Math.random() * (canvasW - 30),
                    y: -40,
                    w: 30,
                    h: 35
                });
            }
        }

        // 碰撞检测
        function checkCollision() {
            // 子弹与敌机碰撞
            bullets.forEach((bullet, bIndex) => {
                enemies.forEach((enemy, eIndex) => {
                    if (
                        bullet.x > enemy.x &&< enemy.x + enemy.w &&
                        bullet.y > enemy.y &&
                        bullet.y < enemy.y + enemy.h
                    ) {
                        bullets.splice(bIndex, 1);
                        enemies.splice(eIndex, 1);
                        // 至尊战机分数翻倍
                        score += currentPlane.id === 'zhizun' ? 20 : 10;
                    }
                });
            });

            // 敌机与战机碰撞
            enemies.forEach((enemy, eIndex) => {
                if (
                    plane< enemy.x + enemy.w &&
                    planeX + planeW > enemy.x &&
                    planeY < enemy.y + enemy.h &&
                    planeY + planeH > enemy.y
                ) {
                    // 圣盾战机免疫碰撞
                    if (currentPlane.id !== 'shengdun') {
                        gameRunning = false;
                    }
                }
            });
        }

        // 绘制分数
        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.font = '20px Microsoft YaHei';
            ctx.fillText(`分数：${score}`, 10, 30);
        }

        // 绘制游戏结束
        function drawGameOver() {
            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvasW, canvasH);
                ctx.fillStyle = '#fff';
                ctx.font = '30px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', canvasW / 2, canvasH / 2 - 30);
                ctx.fillText(`最终分数：${score}`, canvasW / 2, canvasH / 2 + 10);
            }
        }

        // 鼠标/触摸控制战机移动
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            planeX = e.clientX - rect.left - planeW / 2;
            planeY = e.clientY - rect.top - planeH / 2;
            // 限制战机在画布内
            planeX = Math.max(0, Math.min(canvasW - planeW, planeX));
            planeY = Math.max(0, Math.min(canvasH - planeH, planeY));
        });

        // 游戏主循环
        function gameLoop(timestamp) {
            ctx.clearRect(0, 0, canvasW, canvasH);
            if (gameRunning) {
                shootBullet(timestamp);
                createEnemy();
                drawBullets();
                drawEnemies();
                checkCollision();
            }
            drawPlane();
            drawScore();
            drawGameOver();
            requestAnimationFrame(gameLoop);
        }

        // 初始化
        renderPlaneList();
        gameLoop(0);
    </body></html>
