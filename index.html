<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>轻奢宠伴 | 高端上门养护社区</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "SF Pro Display","PingFang SC","Microsoft Yahei",sans-serif;
}
body {
  background: linear-gradient(135deg,#f7f9fc,#eef2f7);
  font-size: 14px;
  padding-bottom: 60px;
}
/* 高端磨砂卡片 阴影分层 */
.glass-card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  margin: 18px 16px;
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 8px 24px rgba(26,71,141,0.08),0 2px 8px rgba(0,0,0,0.04);
  border: 1px solid rgba(255,255,255,0.6);
  transition: all 0.3s ease;
}
.glass-card:active {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(26,71,141,0.12);
}
/* 高级标题样式 */
.senior-title {
  display: flex;
  align-items: center;
  font-size: 17px;
  font-weight: 600;
  color: #1a2b48;
  margin-bottom: 20px;
  letter-spacing: 1px;
}
.senior-title::before {
  content: "";
  width: 5px;
  height: 20px;
  background: linear-gradient(180deg,#5b9df8,#3278e3);
  border-radius: 3px;
  margin-right: 10px;
}
/* 登录文案 */
.user-status {
  font-size: 15px;
  color: #445577;
  margin-bottom: 16px;
  font-weight: 500;
}
/* 轻奢输入框 */
.lux-input {
  width: 100%;
  height: 50px;
  padding: 0 16px;
  background: rgba(242,246,252,0.85);
  border: 1px solid rgba(200,215,235,0.5);
  border-radius: 16px;
  outline: none;
  font-size: 14px;
  color: #223;
  margin-bottom: 14px;
  transition: 0.25s;
}
.lux-input:focus {
  border-color: #5b9df8;
  background: #fff;
}
/* 高端按钮组 */
.btn-wrap {
  display: flex;
  gap: 14px;
}
.lux-btn {
  flex: 1;
  height: 48px;
  border-radius: 16px;
  border: none;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s ease;
}
.btn-gradient {
  background: linear-gradient(135deg,#5b9df8,#3278e3);
  color: #ffffff;
  box-shadow: 0 4px 14px rgba(50,120,227,0.25);
}
.btn-gradient:active {
  opacity: 0.9;
  transform: scale(0.98);
}
.btn-light {
  background: rgba(235,240,248,0.9);
  color: #556688;
}
/* 轻奢文本域 */
.lux-textarea {
  width: 100%;
  height: 110px;
  padding: 16px;
  background: rgba(242,246,252,0.85);
  border: 1px solid rgba(200,215,235,0.5);
  border-radius: 16px;
  resize: none;
  outline: none;
  font-size: 14px;
  transition: 0.25s;
}
.lux-textarea:focus {
  border-color: #5b9df8;
  background: #fff;
}
/* 精致帖子条目 */
.post-item {
  padding: 18px 0;
  border-bottom: 1px solid rgba(225,232,242,0.6);
}
.post-item:last-child {
  border-bottom: none;
}
.post-nick {
  font-size: 14px;
  font-weight: 600;
  color: #3278e3;
  margin-bottom: 10px;
}
.post-txt {
  color: #2c3b54;
  line-height: 1.7;
  font-size: 14px;
}
.post-time {
  font-size: 12px;
  color: #8899b3;
  margin-top: 10px;
}
</style>
</head>
<body>

<!-- 高端登录磨砂卡片 -->
<div class="glass-card">
  <div class="user-status" id="userInfo">未登录 · 请设置专属昵称</div>
  <input class="lux-input" id="nick" placeholder="🐾 输入你的专属昵称" />
  <div class="btn-wrap">
    <button class="lux-btn btn-gradient" onclick="login()">即刻登录</button>
    <button class="lux-btn btn-light" onclick="logout()">退出账号</button>
  </div>
</div>

<!-- 轻奢发布动态卡片 -->
<div class="glass-card">
  <div class="senior-title">宠爱动态 · 即刻分享</div>
  <textarea class="lux-textarea" id="content" placeholder="分享高端上门喂养、宠物洗护、临时寄养专属体验..."></textarea>
  <div class="btn-wrap" style="margin-top:16px;">
    <button class="lux-btn btn-gradient" onclick="publish()">发布轻奢动态</button>
    <button class="lux-btn btn-light" onclick="refreshAllPost()">全局实时刷新</button>
  </div>
</div>

<!-- 全局高端社区 -->
<div class="glass-card">
  <div class="senior-title">🌍 全域宠友轻奢社区</div>
  <div id="allPost"></div>
</div>

<!-- 个人专属发布 -->
<div class="glass-card">
  <div class="senior-title">🐈 我的专属宠爱记录</div>
  <div id="myPost"></div>
</div>

<script>
// 持久化登录核心（保留原有功能）
const USER_KEY = "petH5UserInfo";
function setUser(info){
  localStorage.setItem(USER_KEY,JSON.stringify(info));
}
function getUser(){
  let str = localStorage.getItem(USER_KEY);
  return str ? JSON.parse(str) : null;
}
function logout(){
  localStorage.removeItem(USER_KEY);
  alert("已安全退出轻奢账号");
  renderUser();
}
function login(){
  let nick = document.getElementById("nick").value.trim();
  if(!nick){alert("请填写你的专属昵称");return;}
  let user = {
    userId: Date.now()+"_"+Math.random().toFixed(3),
    nick: nick
  };
  setUser(user);
  renderUser();
  alert("✨ 轻奢社区登录成功 · 信息永久加密保存");
}
function renderUser(){
  let u = getUser();
  document.getElementById("userInfo").innerText = u ? "✅ 尊贵会员："+u.nick : "未登录 · 请设置专属昵称";
}

// 云端公共数据仓库（修复多人看不到数据bug）
const CLOUD_POST_KEY = "petGlobalPublicPost";
function getCloudData(){
  let s = localStorage.getItem(CLOUD_POST_KEY);
  return s ? JSON.parse(s) : [];
}
function saveCloudData(arr){
  localStorage.setItem(CLOUD_POST_KEY,JSON.stringify(arr));
}

// 发布动态逻辑
function publish(){
  let user = getUser();
  if(!user){alert("请先登录轻奢会员账号");return;}
  let val = document.getElementById("content").value.trim();
  if(!val){alert("轻奢动态内容不能为空");return;}

  let list = getCloudData();
  list.unshift({
    userId: user.userId,
    nick: user.nick,
    content: val,
    time: new Date().toLocaleString()
  });
  saveCloudData(list);

  document.getElementById("content").value = "";
  alert("发布成功 · 好友实时刷新即可查看");
  refreshAllPost();
}

// 全局同步刷新 根治数据不同步
function refreshAllPost(){
  let list = getCloudData();
  let html = "";
  if(list.length === 0){
    html = '<div class="post-item">暂无轻奢宠友动态，期待你的第一条分享✨</div>';
  }else{
    list.forEach(item=>{
      html += `
      <div class="post-item">
        <div class="post-nick">${item.nick}</div>
        <div class="post-txt">${item.content}</div>
        <div class="post-time">${item.time}</div>
      </div>
      `;
    });
  }
  document.getElementById("allPost").innerHTML = html;
  renderMyPost();
}

// 个人专属我的发布
function renderMyPost(){
  let user = getUser();
  if(!user){
    document.getElementById("myPost").innerHTML = '<div class="post-item">登录轻奢会员，查看你的专属宠爱记录</div>';
    return;
  }
  let all = getCloudData();
  let mine = all.filter(p=>p.userId === user.userId);
  let html = "";
  if(mine.length === 0){
    html = '<div class="post-item">你暂无专属宠爱动态，快来高端分享吧</div>';
  }else{
    mine.forEach(item=>{
      html += `
      <div class="post-item">
        <div class="post-txt">${item.content}</div>
        <div class="post-time">${item.time}</div>
      </div>
      `;
    });
  }
  document.getElementById("myPost").innerHTML = html;
}

window.onload = function(){
  renderUser();
  refreshAllPost();
}
</script>

</body>
</html>
