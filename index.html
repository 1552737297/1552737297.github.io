<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>萌宠管家-登录注册修复互通版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#fdf6f8;padding-bottom:80px;}
/*登录弹窗*/
.login-wrap{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{width:85%;background:#fff;border-radius:16px;padding:20px;}
.tab-row{display:flex;border-bottom:1px solid #eee;margin-bottom:15px;}
.tab-btn{flex:1;text-align:center;padding:10px;font-size:16px;}
.tab-btn.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none !important;}
input{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin:8px 0;}
.btn{width:100%;background:#ff5c8d;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;margin-top:8px;}
#userTip{text-align:right;padding:10px;color:#666;}

/*导航*/
#nav{position:fixed;top:0;left:0;width:100%;height:52px;background:#fff;display:flex;z-index:999;box-shadow:0 1px 4px #eee;}
.nav-item{flex:1;text-align:center;line-height:52px;font-size:15px;color:#666;}
.nav-item.active{color:#ff5c8d;border-bottom:3px solid #ff5c8d;font-weight:bold;}
.main{margin-top:58px;padding:15px;}
.page{display:none;}
.page.show{display:block;}
.banner{width:100%;height:140px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;margin-bottom:15px;}
.form-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
textarea{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin:8px 0;}
.post-card{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px;}
.reply-area{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>

<!--登录注册弹窗-->
<div class="login-wrap" id="loginWrap">
<div class="login-box">
<div class="tab-row">
<div class="tab-btn active" onclick="switchTab(0)">登录</div>
<div class="tab-btn" onclick="switchTab(1)">注册</div>
</div>

<!--登录表单-->
<div id="loginPanel">
<input id="loginAcc" placeholder="请输入登录账号">
<input id="loginPwd" type="password" placeholder="请输入密码">
<button class="btn" onclick="doLogin()">立即登录</button>
</div>

<!--注册表单-->
<div id="regPanel" class="hide">
<input id="regAcc" placeholder="自定义账号">
<input id="regNick" placeholder="社区显示昵称">
<input id="regPwd" type="password" placeholder="设置密码">
<button class="btn" onclick="doReg()">立即注册</button>
</div>
</div>
</div>

<div id="userTip">欢迎，未登录</div>

<!--底部导航-->
<div id="nav">
<div class="nav-item active" onclick="goTab(0)">下单预约</div>
<div class="nav-item" onclick="goTab(1)">宠友社区</div>
<div class="nav-item" onclick="goTab(2)">商家后台</div>
</div>

<div class="main">
<div class="page show" id="p0">
<div class="banner">🐾上门萌宠喂养</div>
<div class="form-box">
<label>联系人</label>
<input id="uname">
<label>手机号</label>
<input id="phone">
<label>上门地址</label>
<input id="addr">
<label>预约时间</label>
<input type="datetime-local" id="ptime">
<label>备注</label>
<textarea id="note" rows="3"></textarea>
<button class="btn" onclick="orderSub()">立即预约</button>
</div>
</div>

<div class="page" id="p1">
<div class="banner">🐱宠友云端互通社区</div>
<div class="form-box">
<input id="postTxt" placeholder="登录后才可发布动态">
<button class="btn" onclick="addPost()">发布帖子</button>
</div>
<div id="plist">加载云端共享数据...</div>
</div>

<div class="page" id="p2">
<div class="banner">🔐商家管理中心</div>
<div class="form-box" style="text-align:center">
<p>管理员密码：123456</p >
<input type="password" id="admPwd">
<button class="btn" onclick="admLogin()">登录后台</button>
</div>
<div id="admBox" style="display:none;"></div>
</div>
</div>

<script>
let nowUser = null;

// 切换登录/注册面板 修复核心
function switchTab(type){
    let tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(x=>x.classList.remove('active'));
    event.target.classList.add('active');
    if(type === 0){
        loginPanel.classList.remove('hide');
        regPanel.classList.add('hide');
    }else{
        loginPanel.classList.add('hide');
        regPanel.classList.remove('hide');
    }
}

// 用户账号管理
function getUserData(){
    return JSON.parse(localStorage.getItem("petUserList") || "[]");
}

// 注册
function doReg(){
    let a = regAcc.value.trim();
    let n = regNick.value.trim();
    let p = regPwd.value.trim();
    if(!a||!n||!p){alert("账号、昵称、密码不能为空");return;}
    let arr = getUserData();
    if(arr.some(x=>x.account===a)){alert("账号已存在，请更换");return;}
    arr.push({account:a,nick:n,pwd:p});
    localStorage.setItem("petUserList",JSON.stringify(arr));
    alert("注册成功！请前往登录");
    switchTab(0);
}

// 登录
function doLogin(){
    let a = loginAcc.value.trim();
    let p = loginPwd.value.trim();
    if(!a||!p){alert("请输入账号密码");return;}
    let arr = getUserData();
    let u = arr.find(x=>x.account===a && x.pwd===p);
    if(!u){alert("账号或密码错误");return;}
    nowUser = u;
    userTip.innerText = "👋 当前登录："+u.nick;
    loginWrap.style.display = "none";
    renderCloudPost();
}

// 页面切换
function goTab(i){
    let navs = document.querySelectorAll(".nav-item");
    let pages = document.querySelectorAll(".page");
    navs.forEach(x=>x.classList.remove("active"));
    navs[i].classList.add("active");
    pages.forEach(x=>x.classList.remove("show"));
    pages[i].classList.add("show");
    if(i===1 && nowUser){renderCloudPost();}
}

// 预约订单本地存储
function getOrder(){return JSON.parse(localStorage.getItem("petOrder")||"[]")}
function saveOrder(d){localStorage.setItem("petOrder",JSON.stringify(d))}
function orderSub(){
    let o = {
        name:uname.value,phone:phone.value,addr:addr.value,
        time:ptime.value,note:note.value
    };
    let arr = getOrder();arr.unshift(o);saveOrder(arr);
    alert("预约提交成功");
}

// 云端共享数据库
const cloudApi = "https://jsonblob.com/api/jsonBlob/1156400000000000000";
async function getCloudData(){
    try{
        let res = await fetch(cloudApi+"?_t="+Date.now());
        return await res.json() || [];
    }catch(e){return [];}
}
async function setCloudData(d){
    await fetch(cloudApi,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(d)
    });
}

// 发布帖子
async function addPost(){
    if(!nowUser){alert("请先登录账号");return;}
    let cont = postTxt.value.trim();
    if(!cont){alert("内容不能为空");return;}
    let list = await getCloudData();
    list.unshift({
        id:Date.now(),
        uname:nowUser.nick,
        content:cont,
        reply:[]
    });
    await setCloudData(list);
    postTxt.value = "";
    renderCloudPost();
    alert("发布成功，好友实时可见");
}

    let arr = await getCloudData();
    let html = "";
    if(arr.length ==
