<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 强制横屏+全屏锁定 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="screen-orientation" content="landscape">
<meta name="x5-orientation" content="landscape">
<meta http-equiv="ScreenOrientation" content="landscape">
<title>战地枪战 - 三角洲 横屏3D战场版</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
-webkit-user-select: none;
user-select: none;
}
body {
overflow: hidden;
background: #050505;
touch-action: none;
width: 100vw;
height: 100vh;
font-family: "Microsoft YaHei",sans-serif;
/*禁止竖屏*/
transform: rotate(0deg);
}
#gameCanvas {
display: block;
width: 100%;
height: 100%;
}
.crosshair {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 40px;
height: 40px;
z-index: 9;
pointer-events:none;
}
.crosshair::before,.crosshair::after{
content:"";position:absolute;background:rgba(0,220,255,0.8);
}
.crosshair::before{width:2px;height:12px;left:50%;top:0;transform:translateX(-50%);}
.crosshair::after{width:12px;height:2px;top:50%;left:0;transform:translateY(-50%);}
.top-hud{
position:fixed;top:20px;left:20px;
background:rgba(0,0,0,0.55);
border:1px solid rgba(0,200,255,0.3);
border-radius:10px;
padding:12px 16px;
color:#fff;z-index:15;
backdrop-filter: blur(6px);
}
.bar-line{
width:160px;height:10px;background:#222;border-radius:5px;margin:6px 0 10px;overflow:hidden;
}
.hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#ff3333,#ff6666);transition:0.2s;}
.armor-bar{height:100%;width:100%;background:linear-gradient(90deg,#3399ff,#66ccff);transition:0.2s;}
.joystick {
position: fixed;
bottom: 40px;
left: 30px;
width: 120px;
height: 120px;
background: rgba(20,25,35,0.65);
border: 2px solid rgba(0,180,255,0.4);
border-radius: 50%;
z-index: 12;
backdrop-filter: blur(4px);
}
.joystick-inner {
position: absolute;
top: 30px;
left: 30px;
width: 60px;
height: 60px;
background: linear-gradient(145deg,#cccccc,#888888);
border-radius: 50%;
}
.shoot-btn {
position: fixed;
bottom: 50px;
right: 35px;
width: 80px;
height: 80px;
background: radial-gradient(circle,#ff2b2b,#aa0000);
border: none;
border-radius: 50%;
color: #fff;
font-size:16px;
font-weight:bold;
z-index: 12;
}
.game-over {
position: fixed;
top: 0;left: 0;
width: 100%;height: 100%;
background: rgba(0,0,0,0.88);
display: none;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 20;
}
.game-over h2 {
font-size: 44px;
color: #ff4444;
margin-bottom: 20px;
}
.game-over p {
font-size: 24px;
color:#ddd;
margin-bottom: 30px;
}
.restart-btn {
padding:16px 45px;
background:linear-gradient(135deg,#0077cc,#00aaff);
border: none;border-radius:12px;
color: #fff;font-size:22px;
}
/*横屏提示*/
.landtip{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;color:#fff;font-size:24px;
display:flex;justify-content:center;align-items:center;
z-index:999;
}
</style>
</head>
<body>
<div class="landtip" id="landTip">请把手机横过来游玩</div>

<canvas id="gameCanvas"></canvas>
<div class="crosshair"></div>

<div class="top-hud">
<div>❤️ 生命值</div>
<div class="bar-line"><div class="hp-bar" id="hpFill"></div></div>
<div>🛡️ 护甲耐久</div>
<div class="bar-line"><div class="armor-bar" id="armorFill"></div></div>
<div>🎯 击杀分数：<span id="score">0</span></div>
</div>

<div class="joystick" id="joystick">
<div class="joystick-inner" id="joystickInner"></div>
</div>
<button class="shoot-btn" id="shootBtn">开火</button>

<div class="game-over" id="gameOver">
<h2>任务阵亡</h2>
<p>最终战绩：<span id="finalScore">0</span> 分</p >
<button class="restart-btn" id="restartBtn">重新空降</button>
</div>

<script>
// 横竖屏检测提示
const landTip = document.getElementById('landTip');
function checkLand(){
if(window.innerWidth > window.innerHeight){
landTip.style.display = 'none';
}else{
landTip.style.display = 'flex';
}
}
window.addEventListener('resize',checkLand);
checkLand();

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x10151b,20,80);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0f1419);

camera.position.set(0, 2, 8);
camera.rotation.order = 'YXZ';

let score = 0;
let hp = 100;
let armor = 100;
let gameActive = true;
const moveSpeed = 0.15;
let moveX = 0, moveZ = 0;
let enemies = [];
let bullets = [];

// ========== 超大3D战术战场场景 ==========
//地面
const groundGeo = new THREE.PlaneGeometry(120,120);
const groundMat = new THREE.MeshLambertMaterial({color:0x232b35});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

//批量掩体箱子
function createBox(x,z,w,h,d,color){
let g = new THREE.BoxGeometry(w,h,d);
let m = new THREE.MeshLambertMaterial({color});
let mesh = new THREE.Mesh(g,m);
mesh.position.set(x,h/2,z);
scene.add(mesh);
}
//四周楼房掩体
createBox(-30,20,8,6,8,0x444444);
createBox(30,20,8,6,8,0x444444);
createBox(-30,-20,8,6,8,0x444444);
createBox(30,-20,8,6,8,0x444444);

//中间战斗掩体
for(let i=0;i<12;i++){
let x = (Math.random()-0.5)*50;
let z = (Math.random()-0.5)*50;
createBox(x,z,2.5,2,2.5,0x555555);
}

//灯光
const amb = new THREE.AmbientLight(0xffffff,0.45);
scene.add(amb);
const dirLight = new THREE.DirectionalLight(0xc0d8f0,0.85);
dirLight.position.set(15,30,15);
scene.add(dirLight);

//敌人
function createEnemy() {
if (!gameActive) return;
const enemyGeo = new THREE.BoxGeometry(1, 2, 1);
const enemyMat = new THREE.MeshLambertMaterial({ color: 0xc82020 });
const enemy = new THREE.Mesh(enemyGeo, enemyMat);
enemy.position.set(
(Math.random() - 0.5) * 60,1,(Math.random() - 0.5) * 60 - 15
);
enemy.userData = { hp: 2, speed: 0.045 };
scene.add(enemy);
enemies.push(enemy);
}

//子弹
function createBullet() {
if (!gameActive) return;
const bulletGeo = new THREE.SphereGeometry(0.12, 8, 8);
const bulletMat = new THREE.MeshLambertMaterial({ color: 0xffff44 });
const bullet = new THREE.Mesh(bulletGeo, bulletMat);
bullet.position.copy(camera.position);
bullet.rotation.copy(camera.rotation);
bullet.userData = { speed: 1.3 };
scene.add(bullet);
bullets.push(bullet);
}

//摇杆
const joystick = document.getElementById('joystick');
const joystickInner = document.getElementById('joystickInner');
let joystickStartX = 0, joystickStartY = 0;
let isJoystickMoving = false;

joystick.addEventListener('touchstart', e=>{
e.preventDefault();isJoystickMoving=true;
let t = e.touches[0];
joystickStartX=t.clientX;joystickStartY=t.clientY;
});
window.addEventListener('touchmove',e=>{
if(!isJoystickMoving||!gameActive)return;
let t = e.touches[0];
let dx=t.clientX-joystickStartX;
let dy=t.clientY-joystickStartY;
let dist=Math.min(Math.hypot(dx,dy),42);
let ang=Math.atan2(dy,dx);
joystickInner.style.transform=`translate(${Math.cos(ang)*dist}px,${Mat
