<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>萌宠管家-防卡死稳定互通版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;font-family:sans-serif;}
/*登录弹窗 最简防冲突*/
.login-box{position:fixed;inset:0;background:#0007;display:flex;align-items:center;justify-content:center;z-index:99999;}
.inner{width:85%;background:#fff;border-radius:16px;padding:20px;}
.tab{display:flex;border-bottom:1px solid #eee;margin-bottom:15px;}
.t1,.t2{flex:1;text-align:center;padding:10px;}
.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none !important;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #eee;border-radius:8px;}
.btn{width:100%;padding:12px;background:#ff5c8d;color:#fff;border:none;border-radius:8px;font-size:16px;}
#nav{position:fixed;bottom:0;left:0;width:100%;height:50px;background:#fff;display:flex;border-top:1px solid #eee;}
.n-item{flex:1;text-align:center;line-height:50px;}
.n-item.active{color:#ff5c8d;font-weight:bold;}
.main{padding:15px;margin-bottom:60px;}
.card{background:#fff;padding:12px;border-radius:12px;margin:10px 0;}
</style>
</head>
<body>

<!--登录注册 纯原生无嵌套-->
<div class="login-box" id="loginPop">
<div class="inner">
<div class="tab">
<div class="t1 active" onclick="switchL()">登录</div>
<div class="t2" onclick="switchR()">注册</div>
</div>
<div id="formL">
<input id="lacc" placeholder="账号">
<input id="lpwd" type="password" placeholder="密码">
<button class="btn" onclick="doLogin()">登录</button>
</div>
<div id="formR" class="hide">
<input id="racc" placeholder="注册账号">
<input id="rnick" placeholder="昵称">
<input id="rpwd" type="password" placeholder="密码">
<button class="btn" onclick="doReg()">注册</button>
</div>
</div>
</div>

<div id="userTip" style="padding:10px;text-align:right;">未登录</div>

<div class="main">
<div id="p0">
<h3>🐾上门喂猫预约</h3>
<input id="uname" placeholder="称呼">
<input id="phone" placeholder="手机号">
<input id="addr" placeholder="地址">
<input type="datetime-local" id="ptime">
<textarea id="note" placeholder="备注"></textarea>
<button class="btn" onclick="saveOrder()">提交预约</button>
</div>

<div id="p1" class="hide">
<h3>🐱宠友云端社区</h3>
<textarea id="postTxt" placeholder="登录后发帖"></textarea>
<button class="btn" onclick="addPost()">发布帖子</button>
<div id="plist"></div>
</div>

<div id="p2" class="hide">
<h3>🔐商家后台</h3>
<input type="password" id="admPwd" placeholder="管理员密码">
<button class="btn" onclick="admLogin()">进入</button>
<div id="admBox"></div>
</div>
</div>

<div id="nav">
<div class="n-item active" onclick="goTab(0)">预约</div>
<div class="n-item" onclick="goTab(1)">社区</div>
<div class="n-item" onclick="goTab(2)">后台</div>
</div>

<script>
//========切换 极简不卡死========
function switchL(){
document.querySelector('.t1').classList.add('active');
document.querySelector('.t2').classList.remove('active');
formL.classList.remove('hide');formR.classList.add('hide');
}
function switchR(){
document.querySelector('.t2').classList.add('active');
document.querySelector('.t1').classList.remove('active');
formR.classList.remove('hide');formL.classList.add('hide');
}

//========本地用户 保留你已有账号========
function getUserList(){return JSON.parse(localStorage.getItem("userList")||"[]")}
let nowUser=null;

//注册
function doReg(){
let a=racc.value.trim(),n=rnick.value.trim(),p=rpwd.value.trim();
if(!a||!n||!p){alert('不能为空');return}
let arr=getUserList();
if(arr.some(x=>x.acc===a)){alert('账号已存在');return}
arr.push({acc:a,nick:n,pwd:p});
localStorage.setItem("userList",JSON.stringify(arr));
alert('注册成功，请登录');switchL();
}

//登录
function doLogin(){
let a=lacc.value.trim(),p=lpwd.value.trim();
let arr=getUserList();
let u=arr.find(x=>x.acc===a&&x.pwd===p);
if(!u){alert('账号密码错误');return}
nowUser=u;
userTip.innerText="欢迎："+u.nick;
loginPop.style.display="none";
renderData();
}

//底部页面切换
function goTab(i){
p0.classList.add('hide');p1.classList.add('hide');p2.classList.add('hide');
if(i===0)p0.classList.remove('hide');
if(i===1){p1.classList.remove('hide');if(nowUser)renderData();}
if(i===2)p2.classList.remove('hide');
let navs=document.querySelectorAll('.n-item');
navs.forEach((x,idx)=>x.classList.toggle('active',idx===i));
}

//预约
function saveOrder(){
let d={
n:uname.value,p:phone.value,a:addr.value,t:ptime.value,nt:note.value
};
let list=JSON.parse(localStorage.getItem("petOrder")||"[]");
list.unshift(d);localStorage.setItem("petOrder",JSON.stringify(list));
alert("预约成功");
}

//========云端互通 稳接口 防卡死========
const url="https://jsonblob.com/api/jsonBlob/1157333333333333";
async function getCloud(){try{let res=await fetch(url+"?_="+Date.now());return await res.json()||[]}catch{return []}}
async function setCloud(d){await fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}

//发帖
async function addPost(){
if(!nowUser){alert("请先登录");return}
let c=postTxt.value.trim();if(!c){alert("内容不能为空");return}
let arr=await getCloud();
arr.unshift({id:Date.now(),name:nowUser.nick,txt:c,rep:[]});
await setCloud(arr);postTxt.value="";renderData();alert("发布成功，互通可见");
}

//渲染帖子+评论
async function renderData(){
let arr=await getCloud(),h="";
if(arr.length===0)h='<div class="card" style="color:#999;text-align:center;">暂无帖子</div>';
else{
arr.forEach(item=>{
h+=`<div class="card">
<strong>${item.name}</strong>
<div>${item.txt}</div>
<div style="margin-top:10px;background:#f8f8f8;padding:8px;border-radius:8px;">
<input placeholder="回复昵称">
<textarea placeholder="写回复"></textarea>
<button class="btn" style="padding:6px" onclick="sendRep(${item.id},this)">回复</button>
${item.rep&&item.rep.length>0?item.rep.map(r=>`<div style="font-size:14px;margin-top:4px;">${r.n}:${r.c}</div>`).join(''):'<div style="color:#999;">暂无评论</div>'}
</div>
</div>`;
})
}
plist.innerHTML=h;
}

//提交回复
async function sendRep(id,dom){
if(!nowUser){alert("请登录");return}
let n=dom.parentElement.querySelector("input").trim();
let c=dom.parentElement.querySelector("textarea").trim();
if(!n||!c){alert("填写完整");return}
let arr=await getCloud();
for(let i=0;i<arr.length;i++){
if(arr[i].id===id){arr[i].rep.push({n,c});break}
}
await setCloud(arr);renderData();alert("评论同步成功");
}

//商家登录
function admLogin(){
if(admPwd.value=="123456"){
let list=JSON.parse(localStorage.getItem("petOrder")||"[]"),h="";
list.forEach(x=>h+=`<div class="card">${x.n} ${x.p} ${x.a}</div>`);
admBox.innerHTML=h;
}
}
</script>
</body>
</html>
