<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太空雷霆战机 - 3D旋转终极版 + 商城抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#000;
display:flex;justify-content:center;align-items:center;
height:100vh;overflow:hidden;touch-action:none;
color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
perspective:1500px;
}
#game{
border:2px solid #0ef;
background:linear-gradient(#000,#050612);
display:block;
box-shadow:0 0 60px rgba(0,200,255,0.5),0 0 120px rgba(0,100,255,0.25);
border-radius:8px;
}
.ui{
position:absolute;
color:#0ef;
font-size:17px;
font-weight:600;
text-shadow:0 0 6px #0ef;
background:rgba(0,10,25,0.6);
padding:6px 12px;
border-radius:20px;
backdrop-filter:blur(6px);
border:1px solid rgba(0,200,255,0.2);
}
#score{top:16px;left:16px}
#level{top:16px;left:50%;transform:translateX(-50%)}
#bossHp{
top:56px;left:50%;transform:translateX(-50%);
display:none;
min-width:220px;
text-align:center;
}
#bomb{top:16px;right:16px}
#gold{top:50px;right:16px} /* 金币 */

#ultimate{
position:absolute;
bottom:16px;left:50%;transform:translateX(-50%);
min-width:220px;
text-align:center;
}

#unlockTip{
position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
font-size:14px;color:#fff;
background:rgba(0,15,30,0.7);
padding:6px 14px;
border-radius:12px;
display:none;white-space:nowrap;
z-index:9;
}

#logo{
position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);
font-size:42px;font-weight:bold;
background:linear-gradient(90deg,#0ff,#08f,#f0f);
-webkit-background-clip:text;background-clip:text;color:transparent;
text-shadow:0 0 20px rgba(0,255,255,0.6),0 0 40px rgba(0,150,255,0.3);
white-space:nowrap;display:block;
animation:glowPulse 2s infinite alternate;
}
@keyframes glowPulse{0%{filter:brightness(1)}100%{filter:brightness(1.3)}}

#author{
position:absolute;top:30%;left:50%;transform:translateX(-50%);
font-size:16px;color:#ccc;
background:rgba(0,15,30,0.4);padding:6px 16px;border-radius:20px;
}

#startBtn{
position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);
padding:20px 50px;
font-size:24px;
background:linear-gradient(90deg,#0ff,#08f);
color:#000;border:none;border-radius:50px;font-weight:bold;
box-shadow:0 0 30px #08f;cursor:pointer;
transition:all 0.3s;
}
#startBtn:hover{transform:translate(-50%,-50%) scale(1.08);box-shadow:0 0 40px #0ff}
#startBtn:active{transform:translate(-50%,-50%) scale(0.96)}

/* 商城按钮 */
#shopBtn{
position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);
padding:16px 42px;
font-size:20px;
background:linear-gradient(90deg,#ff9,#fc0);
color:#000;border:none;border-radius:50px;font-weight:bold;
box-shadow:0 0 25px #fc0;cursor:pointer;
transition:all 0.3s;
}
#shopBtn:hover{transform:translate(-50%,-50%) scale(1.08);box-shadow:0 0 35px #fc0}

#bombBtn{
position:absolute;bottom:30px;right:30px;
width:76px;height:76px;
border-radius:50%;
background:linear-gradient(135deg,#f30,#f60);
color:#fff;font-size:16px;font-weight:bold;border:none;
box-shadow:0 0 20px #f30;display:none;
transition:all 0.2s;
}
#bombBtn:active{transform:scale(0.92);box-shadow:0 0 12px #f30}

#ultBtn{
position:absolute;bottom:30px;left:110px;
width:76px;height:76px;
border-radius:50%;
background:linear-gradient(135deg,#90f,#f0f);
color:#fff;font-size:16px;font-weight:bold;border:none;
box-shadow:0 0 25px #90f;display:none;
transition:all 0.2s;
}
#ultBtn:disabled{background:#444;box-shadow:none;opacity:0.5}
#ultBtn:active:enabled{transform:scale(0.92);box-shadow:0 0 40px #f0f}

#skinSwitchBtn{
position:absolute;bottom:30px;left:30px;
width:60px;height:60px;
border-radius:50%;
font-size:14px;font-weight:bold;
border:2px solid #0ff;background:#112;color:#0ff;
box-shadow:0 0 15px #08f;display:none;cursor:pointer;
}

#defeat{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;display:none;z-index:10;
background:rgba(0,10,25,0.85);padding:50px 40px;border-radius:20px;
backdrop-filter:blur(12px);border:1px solid rgba(255,60,60,0.3);
min-width:300px;
}
#defeatTitle{
font-size:52px;font-weight:bold;
background:linear-gradient(90deg,#f30,#f60);
-webkit-background-clip:text;background-clip:text;color:transparent;
text-shadow:0 0 25px #f30;margin-bottom:24px;
}
#defeatInfo{font-size:20px;color:#fff;margin-bottom:34px;line-height:1.7}
#restartBtn{
padding:18px 46px;font-size:22px;
background:linear-gradient(90deg,#f30,#f60);
color:#fff;border:none;border-radius:50px;font-weight:bold;
box-shadow:0 0 30px #f30;cursor:pointer;transition:all 0.3s;
}
#restartBtn:hover{transform:scale(1.06);box-shadow:0 0 40px #f30}
#restartBtn:active{transform:scale(0.94)}

/* ================== 商城界面 ================== */
#shopPanel{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:340px;max-height:80vh;
background:rgba(0,10,25,0.92);
backdrop-filter:blur(10px);
border-radius:20px;
border:2px solid #fc0;
box-shadow:0 0 60px rgba(255,180,0,0.4);
padding:24px;
display:none;
z-index:20;
overflow-y:auto;
}
.shopTitle{
text-align:center;font-size:26px;font-weight:bold;
background:linear-gradient(90deg,#ff9,#fc0);
-webkit-background-clip:text;background-clip:text;color:transparent;
margin-bottom:20px;
}
.shopTab{
display:flex;gap:10px;margin-bottom:16px;
}
.shopTab button{
flex:1;padding:10px;border-radius:12px;border:none;
font-weight:bold;background:#112;color:#fff;
}
.shopTab button.active{background:linear-gradient(90deg,#fc0,#f90);color:#000}

.shopItemList{display:flex;flex-direction:column;gap:12px;}
.shopItem{
display:flex;justify-content:space-between;align-items:center;
background:rgba(255,255,255,0.06);padding:12px 14px;border-radius:12px;
}
.shopItemName{font-size:15px;font-weight:600}
.shopItemPrice{color:#fc0;font-weight:bold}
.shopItemBtn{
padding:8px 14px;border-radius:10px;border:none;
background:linear-gradient(90deg,#0ff,#08f);color:#000;font-weight:bold;
}
.shopItemBtn:disabled{background:#444;color:#aaa}

.gachaResult{
text-align:center;font-size:16px;color:#fff;margin-top:12px;
min-height:20px;
}

#closeShopBtn{
margin-top:20px;width:100%;padding:14px;
border-radius:14px;border:none;
background:linear-gradient(90deg,#f30,#f60);color:#fff;font-weight:bold;
}
</style>
</head>
<body>
<div id="logo">太空雷霆战机</div>
<div id="author">3D旋转战机 · 商城 · 抽奖</div>

<div id="score" class="ui">分数：0</div>
<div id="level" class="ui">关卡：1</div>
<div id="bossHp" class="ui">BOSS 血量：</div>
<div id="bomb" class="ui">炸弹：0</div>
<div id="gold" class="ui">金币：0</div>
<div id="ultimate" class="ui">大招能量：0/100</div>
<div id="unlockTip">解锁提示</div>

<button id="startBtn">开始游戏</button>
<button id="shopBtn">进入商城</button>

<button id="bombBtn">全屏炸弹</button>
<button id="ultBtn">星际湮灭</button>
<button id="skinSwitchBtn">换肤</button>

<div id="defeat">
  <div id="defeatTitle">战 败</div>
  <div id="defeatInfo"></div>
  <button id="restartBtn">重新挑战</button>
</div>

<!-- ================== 商城界面 ================== -->
<div id="shopPanel">
  <div class="shopTitle">星际商城</div>
  <div class="shopTab">
    <button id="tabItem" class="active">道具商店</button>
    <button id="tabGacha">战机抽奖</button>
  </div>

  <div id="shopItems" class="shopItemList">
    <div class="shopItem">
      <div class="shopItemName">炸弹 ×1</div>
      <div class="shopItemPrice">200 金币</div>
      <button class="shopItemBtn" buy="bomb">购买</button>
    </div>
    <div class="shopItem">
      <div class="shopItemName">护盾 +1</div>
      <div class="shopItemPrice">300 金币</div>
      <button class="shopItemBtn" buy="shield">购买</button>
    </div>
    <div class="shopItem">
      <div class="shopItemName">武器升级</div>
      <div class="shopItemPrice">500 金币</div>
      <button class="shopItemBtn" buy="weapon">购买</button>
    </div>
    <div class="shopItem">
      <div class="shopItemName">僚机升级</div>
      <div class="shopItemPrice">600 金币</div>
      <button class="shopItemBtn" buy="wing">购买</button>
    </div>
    <div class="shopItem">
      <div class="shopItemName">激光升级</div>
      <div class="shopItemPrice">700 金币</div>
      <button class="shopItemBtn" buy="laser">购买</button>
    </div>
    <div class="shopItem">
      <div class="shopItemName">磁铁道具</div>
      <div class="shopItemPrice">250 金币</div>
      <button class="shopItemBtn" buy="magnet">购买</button>
    </div>
    <div class="shopItem">
      <div class="shopItemName">无敌道具</div>
      <div class="shopItemPrice">400 金币</div>
      <button class="shopItemBtn" buy="invincible">购买</button>
    </div>
  </div>

  <div id="shopGacha" class="shopItemList" style="display:none">
    <div class="shopItem">
      <div class="shopItemName">普通抽奖 ×1</div>
      <div class="shopItemPrice">300 金币</div>
      <button class="shopItemBtn" gacha="1">开始</button>
    </div>
    <div class="shopItem">
      <div class="shopItemName">十连抽奖 ×10</div>
      <div class="shopItemPrice">2700 金币</div>
      <button class="shopItemBtn" gacha="10">十连</button>
    </div>
    <div class="gachaResult" id="gachaResult"></div>
  </div>

  <button id="closeShopBtn">关闭商城</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const scoreText=document.getElementById('score');
const levelText=document.getElementById('level');
const bossHpText=document.getElementById('bossHp');
const bombText=document.getElementById('bomb');
const goldText=document.getElementById('gold');
const ultText=document.getElementById('ultimate');
const startBtn=document.getElementById('startBtn');
const shopBtn=document.getElementById('shopBtn');
const bombBtn=document.getElementById('bombBtn');
const ultBtn=document.getElementById('ultBtn');
const skinSwitchBtn=document.getElementById('skinSwitchBtn');
const logo=document.getElementById('logo');
const author=document.getElementById('author');
const defeat=document.getElementById('defeat');
const restartBtn=document.getElementById('restartBtn');
const unlockTip=document.getElementById('unlockTip');

const shopPanel=document.getElementById('shopPanel');
const tabItem=document.getElementById('tabItem');
const tabGacha=document.getElementById('tabGacha');
const shopItems=document.getElementById('shopItems');
const shopGacha=document.getElementById('shopGacha');
const gachaResult=document.getElementById('gachaResult');
const closeShopBtn=document.getElementById('closeShopBtn');

canvas.width=375;
canvas.height=667;

let gameRunning=false;
let score=0;
let level=1;
let gold=0;
let bossSpawnTimer=null;

let unlockedSkins=[1];
let currentSkin=1;
let skinColors={1:{body:'#00d9ff',bodyDark:'#005dff',wing:'#0042bd',shield:'#00d9ff'}};

let ultCharge=0;
const ultMax=100;
let ulting=false;
let ultFrame=0;
const ultDuration=60;

let shipRotate=0;
let particles=[];

const player={
  x:canvas.width/2-25,y:canvas.height*0.8,w:50,h:60,
  shieldCount:1,shieldMax:3,
  weaponLevel:1,weaponMax:3,
  laserLevel:0,laserMax:3,laserTime:0,
  wingLevel:0,wingMax:3,
  invincibleTime:0,bombCount:0,magnetTime:0
};

let bullets=[];
let enemies=[];
let items=[];
let effects=[];
let followMissiles=[];
let boss=null;
let bossBullets=[];
let textEffects=[];

// 本地存储
function loadData(){
  const d=localStorage.getItem('spaceGameData');
  if(!d)return;
  const j=JSON.parse(d);
  gold=j.gold||0;
  unlockedSkins=j.unlockedSkins||[1];
  skinColors=j.skinColors||skinColors;
  goldText.innerText='金币：'+gold;
}
function saveData(){
  localStorage.setItem('spaceGameData',JSON.stringify({gold,unlockedSkins,skinColors}));
}
window.onload=loadData;

function randomHexColor(){
  const l='0123456789ABCDEF';
  let c='#';
  for(let i=0;i<6;i++)c+=l[Math.floor(Math.random()*16)];
  return c;
}
function generateRandomSkinColor(){
  return{body:randomHexColor(),bodyDark:randomHexColor(),wing:randomHexColor(),shield:randomHexColor()};
}

function addParticle(x,y,color){
  particles.push({x,y,vx:(Math.random()-0.5)*1.2,vy:Math.random()*2+1.5,life:30+Math.random()*20,maxLife:50,color});
}
function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}
    const a=p.life/p.maxLife;const s=2+a*3;
    ctx.globalAlpha=a;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,s,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function showItemText(x,y,text){
  textEffects.push({x,y,text,alpha:1,life:60,vy:-1.5});
}

const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let bgMusicLoop=null;
let musicGain=null;

function initAudio(){if(musicGain)return;musicGain=audioCtx.createGain();musicGain.gain.value=0.25;musicGain.connect(audioCtx.destination);createBgMusic();}
function createBgMusic(){if(bgMusicLoop)return;bgMusicLoop=audioCtx.createBufferSource();bgMusicLoop.loop=true;const b=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<b.length;i++){const t=i/audioCtx.sampleRate;const n=440*Math.pow(2,(Math.floor(t*2)%4)/12);d[i]=Math.sin(2*Math.PI*n*t)*Math.exp(-t*0.5)*0.3;}bgMusicLoop.buffer=b;bgMusicLoop.connect(musicGain);}
function playSound(t){if(!audioCtx)return;const o=audioCtx.createOscillator();const g=audioCtx.createGain();g.gain.value=0.2;o.connect(g);g.connect(audioCtx.destination);switch(t){case'shoot':o.type='square';o.frequency.setValueAtTime(660,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(220,audioCtx.currentTime+0.12);g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);o.start();o.stop(audioCtx.currentTime+0.15);break;case'boom':o.type='triangle';o.frequency.setValueAtTime(150,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(20,audioCtx.currentTime+0.3);g.gain.setValueAtTime(0.4,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.35);o.start();o.stop(audioCtx.currentTime+0.35);break;case'item':o.type='sine';o.frequency.setValueAtTime(330,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(660,audioCtx.currentTime+0.15);g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.start();o.stop(audioCtx.currentTime+0.2);break;case'ult':o.type='sawtooth';o.frequency.setValueAtTime(80,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(320,audioCtx.currentTime+0.4);g.gain.setValueAtTime(0.4,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);o.start();o.stop(audioCtx.currentTime+0.5);break;case'bomb':o.type='triangle';o.frequency.setValueAtTime(60,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(10,audioCtx.currentTime+0.5);g.gain.setValueAtTime(0.5,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);o.start();o.stop(audioCtx.currentTime+0.6);break;case'gameover':o.type='sawtooth';o.frequency.setValueAtTime(440,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(110,audioCtx.currentTime+0.8);g.gain.setValueAtTime(0.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.9);o.start();o.stop(audioCtx.currentTime+0.9);break;case'unlock':o.type='sine';o.frequency.setValueAtTime(440,audioCtx.currentTime);o.frequency.setValueAtTime(550,audioCtx.currentTime+0.1);o.frequency.setValueAtTime(660,audioCtx.currentTime+0.2);g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.start();o.stop(audioCtx.currentTime+0.3);break;case'coin':o.type='sine';o.frequency.setValueAtTime(660,audioCtx.currentTime);o.frequency.setValueAtTime(880,audioCtx.currentTime+0.1);g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);o.start();o.stop(audioCtx.currentTime+0.2);break;}}
function playBgMusic(){if(!bgMusicLoop)createBgMusic();try{bgMusicLoop.start()}catch(e){}}
function stopBgMusic(){try{if(bgMusicLoop)bgMusicLoop.stop()}catch(e){}bgMusicLoop=null;}

canvas.addEventListener('touchmove',e=>{
  if(!gameRunning||ulting)return;e.preventDefault();
  const t=e.touches[0];const r=canvas.getBoundingClientRect();
  const ox=player.x;
  player.x=t.clientX-r.left-player.w/2;
  player.y=t.clientY-r.top-player.h/2;
  const d=player.x-ox;shipRotate=d*0.12;
  if(shipRotate>0.25)shipRotate=0.25;if(shipRotate<-0.25)shipRotate=-0.25;
  if(player.x<0)player.x=0;if(player.x+player.w>canvas.width)player.x=canvas.width-player.w;
  if(player.y<0)player.y=0;if(player.y+player.h>canvas.height)player.y=canvas.height-player.h;
});

skinSwitchBtn.onclick=()=>{
  let n=currentSkin;
  for(let i=0;i<10;i++){n++;if(n>5)n=1;if(unlockedSkins.includes(n)){currentSkin=n;break;}}
};
document.addEventListener('keydown',e=>{
  const k=parseInt(e.key);if(k>=1&&k<=5&&unlockedSkins.includes(k))currentSkin=k;
  if(e.key===' '&&ultCharge>=ultMax)useUltimate();
});

bombBtn.onclick=()=>{
  if(player.bombCount<=0)return;player.bombCount--;bombText.innerText='炸弹：'+player.bombCount;playSound('bomb');
  for(let i=0;i<enemies.length;i++)boom(enemies[i].x+enemies[i].w/2,enemies[i].y+enemies[i].h/2);
  enemies=[];bossBullets=[];if(boss)boss.hp-=10;
};

ultBtn.onclick=useUltimate;
function useUltimate(){
  if(ultCharge<ultMax||ulting)return;ultCharge=0;ulting=true;ultFrame=0;player.invincibleTime=2000;playSound('ult');
}
function doUltimateDamage(){
  for(let e of enemies)boom(e.x+e.w/2,e.y+e.h/2);enemies=[];bossBullets=[];if(boss)boss.hp-=25+level*5;
}

function shoot(){
  if(!gameRunning||ulting)return;playSound('shoot');const cx=player.x+player.w/2;
  if(player.laserLevel>0){bullets.push({type:'laser',x:cx-10,y:player.y,w:20,h:60,speed:14,color:'#f0f'});if(player.laserLevel>=3){bullets.push({type:'laser',x:cx-20,y:player.y+8,w:12,h:44,speed:13,color:'#f0f'});bullets.push({type:'laser',x:cx+8,y:player.y+8,w:12,h:44,speed:13,color:'#f0f'});}}
  if(player.weaponLevel>=1)bullets.push({type:'normal',x:cx-2,y:player.y,w:4,h:14,speed:9,color:'#0ff'});
  if(player.weaponLevel>=2){bullets.push({type:'normal',x:player.x+8,y:player.y+12,w:4,h:14,speed:9,color:'#0ff'});bullets.push({type:'normal',x:player.x+38,y:player.y+12,w:4,h:14,speed:9,color:'#0ff'});}
  if(player.wingLevel>=1)bullets.push({type:'normal',x:player.x-10,y:player.y+24,w:3,h:12,speed:8,color:'#0ff'});
  if(player.wingLevel>=2)bullets.push({type:'normal',x:player.x+56,y:player.y+24,w:3,h:12,speed:8,color:'#0ff'});
}

function fireFollowMissile(){
  if(!gameRunning||ulting||enemies.length===0)return;const t=enemies[Math.floor(Math.random()*enemies.length)];
  followMissiles.push({x:player.x+player.w/2,y:player.y,target:t,w:8,h:12,speed:6,color:'#f80'});
}

function createEnemy(){
  if(!gameRunning||boss||ulting)return;const s=2.6+level*0.3+Math.random()*1.8;
  enemies.push({x:Math.random()*(canvas.width-36),y:-40,w:36,h:44,speed:s,hp:1});
}

function spawnBoss(){
  if(!gameRunning||boss)return;const hp=40+level*25;let size=140+level*12;if(size>210)size=210;
  boss={x:canvas.width/2-size/2,y:50,w:size,h:size*0.75,hp:hp,maxHp:hp,speed:1.3+level*0.22,dir:1,level:level,attackTimer:0};
  bossHpText.style.display='block';
}

function bossAttack(){
  if(!gameRunning||!boss||ulting)return;boss.attackTimer++;const cd=Math.max(18,55-level*9);
  if(boss.attackTimer>=cd){boss.attackTimer=0;const cnt=4+level*2;for(let i=0;i<cnt;i++){const a=(Math.PI*2/cnt)*i;const s=3.2+level*0.5;bossBullets.push({x:boss.x+boss.w/2,y:boss.y+boss.h/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,w:8,h:8,color:'#f44'});}}
}

function collide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function boom(x,y){effects.push({x,y,t:0,max:14});playSound('boom');}

function dropItem(x,y){
  const list=['weapon','shield','laser','wing','bomb','invincible','magnet','score'];
  items.push({x,y,w:26,h:26,type:list[Math.floor(Math.random()*list.length)],speed:2});
}

function applySkinEffect(){
  if(currentSkin===4)player.shieldCount=player.shieldMax;
}

// 3D战机绘制
function drawPlayer(){
  if(player.invincibleTime>0&&Math.floor(Date.now()/120)%2==0)return;
  const cx=player.x+25;const cy=player.y+30;const c=skinColors[currentSkin];
  addParticle(cx-8,player.y+55,c.body);addParticle(cx+8,player.y+55,c.body);addParticle(cx,player.y+58,'#fff');
  ctx.save();ctx.translate(cx,cy);ctx.rotate(shipRotate);ctx.translate(-cx,-cy);
  const g=ctx.createLinearGradient(cx,player.y-10,cx,player.y+70);
  g.addColorStop(0,'#fff');g.addColorStop(0.05,c.body);g.addColorStop(0.6,c.bodyDark);g.addColorStop(1,'#000');
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(cx,player.y-8);ctx.lineTo(player.x+6,player.y+28);ctx.lineTo(player.x+10,player.y+56);ctx.lineTo(cx,player.y+64);ctx.lineTo(player.x+40,player.y+56);ctx.lineTo(player.x+44,player.y+28);ctx.closePath();ctx.fill();
  ctx.fillStyle=c.wing;ctx.beginPath();ctx.moveTo(player.x+12,player.y+18);ctx.lineTo(player.x-22,player.y+36);ctx.lineTo(player.x-18,player.y+58);ctx.lineTo(player.x+16,player.y+32);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(player.x+38,player.y+18);ctx.lineTo(player.x+72,player.y+36);ctx.lineTo(player.x+68,player.y+58);ctx.lineTo(player.x+34,player.y+32);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(cx-5,player.y+58,10,4);ctx.fillStyle=c.body;ctx.fillRect(cx-4,player.y+54,8,4);
  if(player.shieldCount>0){const a=player.shieldCount/player.shieldMax;ctx.globalAlpha=a*0.9;ctx.strokeStyle=c.shield;ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,46,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=a*0.3;ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,42,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
  ctx.restore();
  if(shipRotate>0)shipRotate-=0.01;if(shipRotate<0)shipRotate+=0.01;
}

function drawUltimate(){
  const a=ultFrame/ultDuration;const r=350*a;ctx.fillStyle=`rgba(255,0,255,${0.6-a*0.6})`;ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2,r,0,Math.PI*2);ctx.fill();
}

function drawEnemy(e){
  ctx.fillStyle='#ff2255';ctx.beginPath();ctx.moveTo(e.x+e.w/2,e.y);ctx.lineTo(e.x,e.y+e.h);ctx.lineTo(e.x+e.w,e.y+e.h);ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(e.x+e.w/2-2,e.y+10,4,6);
}

function drawBoss(){
  if(!boss)return;const g=ctx.createLinearGradient(boss.x,boss.y,boss.x,boss.y+boss.h);g.addColorStop(0,'#ff8800');g.addColorStop(1,'#ff2200');ctx.fillStyle=g;ctx.fillRect(boss.x,boss.y,boss.w,boss.h);ctx.fillStyle='#fff';ctx.fillRect(boss.x+boss.w/2-6,boss.y+10,12,8);ctx.fillRect(boss.x+20,boss.y+boss.h-20,12,8);ctx.fillRect(boss.x+boss.w-32,boss.y+boss.h-20,12,8);
}

function drawBullet(b){
  if(b.type==='laser'){ctx.fillStyle='#ff00ff';ctx.fillRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#fff';ctx.fillRect(b.x+5,b.y,10,b.h);}else{ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.fillStyle='#fff';ctx.fillRect(b.x,b.y+2,b.w,4);}
}

function drawMissile(m){ctx.fillStyle='#ff6600';ctx.fillRect(m.x,m.y,m.w,m.h);ctx.fillStyle='#ffff00';ctx.fillRect(m.x+2,m.y+2,4,8);}
function drawItem(it){const m={weapon:'#ffcc00',shield:'#00eeff',laser:'#ff00ff',wing:'#00ff88',bomb:'#ff3300',invincible:'#ffff88',magnet:'#00ffcc',score:'#ff66ff'};ctx.fillStyle=m[it.type];ctx.beginPath();ctx.arc(it.x+it.w/2,it.y+it.h/2,it.w/2,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
function drawEffect(ef){const s=ef.t*3.8;ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(ef.x,ef.y,s,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(ef.x,ef.y,s*0.6,0,Math.PI*2);ctx.fill();}
function drawTextEffects(){ctx.font='16px Arial';ctx.textAlign='center';for(let i=textEffects.length-1;i>=0;i--){const te=textEffects[i];te.life--;te.y+=te.vy;te.alpha=te.life/60;if(te.life<=0){textEffects.splice(i,1);continue}ctx.globalAlpha=te.alpha;ctx.fillStyle='#fff';ctx.fillText(te.text,te.x,te.y);}ctx.globalAlpha=1;}

// ================== 商城逻辑 ==================
shopBtn.onclick=()=>{shopPanel.style.display='block'};
closeShopBtn.onclick=()=>{shopPanel.style.display='none'};
tabItem.onclick=()=>{tabItem.classList.add('active');tabGacha.classList.remove('active');shopItems.style.display='flex';shopGacha.style.display='none'};
tabGacha.onclick=()=>{tabGacha.classList.add('active');tabItem.classList.remove('active');shopGacha.style.display='flex';shopItems.style.display='none'};

document.querySelectorAll('[buy]').forEach(b=>{
  b.onclick=()=>{
    const t=b.getAttribute('buy');
    let cost=0;
    switch(t){
      case'bomb':cost=200;if(gold>=cost){gold-=cost;player.bombCount++;bombText.innerText='炸弹：'+player.bombCount;playSound('coin');}break;
      case'shield':cost=300;if(gold>=cost&&player.shieldCount<player.shieldMax){gold-=cost;player.shieldCount++;playSound('coin');}break;
      case'weapon':cost=500;if(gold>=cost&&player.weaponLevel<player.weaponMax){gold-=cost;player.weaponLevel++;playSound('coin');}break;
      case'wing':cost=600;if(gold>=cost&&player.wingLevel<player.wingMax){gold-=cost;player.wingLevel++;playSound('coin');}break;
      case'laser':cost=700;if(gold>=cost&&player.laserLevel<player.laserMax){gold-=cost;player.laserLevel++;player.laserTime=8000;playSound('coin');}break;
      case'magnet':cost=250;if(gold>=cost){gold-=cost;player.magnetTime=6000;playSound('coin');}break;
      case'invincible':cost=400;if(gold>=cost){gold-=cost;player.invincibleTime=6000;playSound('coin');}break;
    }
    goldText.innerText='金币：'+gold;saveData();
  };
});

document.querySelectorAll('[gacha]').forEach(b=>{
  b.onclick=()=>{
    const cnt=parseInt(b.getAttribute('gacha'));
    const cost=cnt===1?300:2700;
    if(gold<cost)return;
    gold-=cost;playSound('coin');
    goldText.innerText='金币：'+gold;
    let res='';
    for(let i=0;i<cnt;i++){
      const r=Math.random();
      if(r<0.4){
        const c=Math.floor(Math.random()*3)+1;player.bombCount+=c;res+=`炸弹×${c}、`;bombText.innerText='炸弹：'+player.bombCount;
      }else if(r<0.65){
        gold+=150;res+='金币×150、';goldText.innerText='金币：'+gold;
      }else if(r<0.85){
        player.invincibleTime=5000;res+='无敌、';
      }else{
        let skin=Math.floor(Math.random()*4)+2;
        if(!unlockedSkins.includes(skin)){
          unlockedSkins.push(skin);skinColors[skin]=generateRandomSkinColor();res+=`解锁皮肤${skin}、`;playSound('unlock');
        }else{
          gold+=500;res+='金币×500、';
        }
      }
    }
    gachaResult.innerText=res.slice(0,-1);saveData();
  };
});

function loop(){
  try{
    if(!gameRunning)return;
    ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
    drawParticles();
    if(ulting){ultFrame++;drawUltimate();if(ultFrame===15)doUltimateDamage();if(ultFrame>=ultDuration)ulting=false;requestAnimationFrame(loop);return;}
    applySkinEffect();
    if(player.laserTime>0)player.laserTime-=16;
    if(player.invincibleTime>0)player.invincibleTime-=16;
    if(player.magnetTime>0)player.magnetTime-=16;
    drawPlayer();drawTextEffects();bossAttack();

    for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.y-=b.speed;drawBullet(b);if(b.y<-20)bullets.splice(i,1);}
    for(let i=followMissiles.length-1;i>=0;i--){const m=followMissiles[i];if(!m.target||enemies.indexOf(m.target)===-1){followMissiles.splice(i,1);continue}const dx=m.target.x+10-m.x;const dy=m.target.y+10-m.y;const d=Math.hypot(dx,dy)||1;m.x+=dx/d*m.speed;m.y+=dy/d*m.speed;drawMissile(m);if(collide(m,m.target)){boom(m.x,m.y);m.target.hp=0;followMissiles.splice(i,1);addUltCharge(3);}}
    for(let i=items.length-1;i>=0;i--){const it=items[i];it.y+=it.speed;if(player.magnetTime>0){const dx=player.x+player.w/2-it.x;const dy=player.y+player.h/2-it.y;const d=Math.hypot(dx,dy)||1;if(d<130){it.x+=dx/d*4.2;it.y+=dy/d*4.2;}}drawItem(it);if(collide(player,it)){playSound('item');const tx=it.x+it.w/2;const ty=it.y;switch(it.type){case'weapon':if(player.weaponLevel<player.weaponMax)player.weaponLevel++;showItemText(tx,ty,`武器Lv${player.weaponLevel}`);break;case'shield':if(player.shieldCount<player.shieldMax)player.shieldCount++;showItemText(tx,ty,`护盾${player.shieldCount}层`);break;case'laser':if(player.laserLevel<player.laserMax)player.laserLevel++;player.laserTime=8000;showItemText(tx,ty,`激光Lv${player.laserLevel}`);break;case'wing':if(player.wingLevel<player.wingMax)player.wingLevel++;showItemText(tx,ty,`僚机Lv${player.wingLevel}`);break;case'bomb':player.bombCount++;bombText.innerText='炸弹：'+player.bombCount;showItemText(tx,ty,'获得炸弹');break;case'invincible':player.invincibleTime=6000;showItemText(tx,ty,'无敌激活');break;case'magnet':player.magnetTime=6000;showItemText(tx,ty,'拾取磁铁');break;case'score':score+=currentSkin===5?150:100;scoreText.innerText='分数：'+score;showItemText(tx,ty,'加分道具');break;}items.splice(i,1);}if(it.y>canvas.height)items.splice(i,1);}
    for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.y+=e.speed;drawEnemy(e);if(collide(player,e)){if(player.shieldCount>0){boom(e.x,e.y);enemies.splice(i,1);if(currentSkin!==4)player.shieldCount--;continue;}if(player.invincibleTime>0){boom(e.x,e.y);enemies.splice(i,1);continue;}gameOver();return;}if(e.y>canvas.height+50)enemies.splice(i,1);}
    if(boss){bossHpText.innerText=`BOSS${level}血量：${boss.hp}/${boss.maxHp}`;boss.x+=boss.speed*boss.dir;if(boss.x<20||boss.x+boss.w>canvas.width-20)boss.dir*=-1;drawBoss();for(let i=bossBullets.length-1;i>=0;i--){const b=bossBullets[i];b.x+=b.vx;b.y+=b.vy;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w/2,0,Math.PI*2);ctx.fill();if(collide(player,b)){if(player.shieldCount>0){if(currentSkin!==4)player.shieldCount--;bossBullets.splice(i,1);continue;}if(player.invincibleTime>0){bossBullets.splice(i,1);continue;}gameOver();return;}if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height)bossBullets.splice(i,1);}for(let i=bullets.length-1;i>=0;i--){if(boss&&collide(bullets[i],boss)){bullets.splice(i,1);boss.hp--;addUltCharge(currentSkin===3?0.8:0.5);if(boss.hp<=0){boom(boss.x+boss.w/2,boss.y+boss.h/2);const add=currentSkin===5?1200*level:800*level;score+=add;scoreText.innerText='分数：'+score;const gAdd=currentSkin===5?300*level:200*level;gold+=gAdd;goldText.innerText='金币：'+gold;saveData();addUltCharge(30);unlockSkinByLevel(level);boss=null;bossBullets=[];bossHpText.style.display='none';level++;levelText.innerText='关卡：'+level;if(bossSpawnTimer)clearTimeout(bossSpawnTimer);bossSpawnTimer=setTimeout(spawnBoss,9000);}}}if(collide(player,boss)){if(player.invincibleTime<=0){gameOver();return;}}}
    for(let i=bullets.length-1;i>=0;i--){for(let j=enemies.length-1;j>=0;j--){if(collide(bullets[i],enemies[j])){bullets.splice(i,1);enemies[j].hp--;if(enemies[j].hp<=0){boom(enemies[j].x+enemies[j].w/2,enemies[j].y+enemies[j].h/2);if(Math.random()<0.45)dropItem(enemies[j].x,enemies[j].y);enemies.splice(j,1);const add=currentSkin===5?30:20;score+=add;scoreText.innerText='分数：'+score;gold+=currentSkin===5?4:2;goldText.innerText='金币：'+gold;saveData();addUltCharge(currentSkin===3?3:2);break;}}}}
    for(let i=effects.length-1;i>=0;i--){const ef=effects[i];ef.t++;drawEffect(ef);if(ef.t>=ef.max)effects.splice(i,1);}
    requestAnimationFrame(loop);
  }catch(e){console.error(e);requestAnimationFrame(loop);}
}

function unlockSkinByLevel(bossLevel){
  let skin=null,tip='';
  switch(bossLevel){case1:skin=2;tip='3D战机·射速更快';break;case2:skin=3;tip='3D战机·大招加速';break;case3:skin=4;tip='3D战机·护盾不破';break;case4:skin=5;tip='3D战机·分数翻倍';break;}
  if(skin&&!unlockedSkins.includes(skin)){unlockedSkins.push(skin);skinColors[skin]=generateRandomSkinColor();playSound('unlock');unlockTip.textContent='击败BOSS！解锁：'+tip;unlockTip.style.display='block';setTimeout(()=>unlockTip.style.display='none',3000);saveData();}
}

function addUltCharge(amt){
  if(ultCharge>=ultMax)return;ultCharge+=amt;if(ultCharge>ultMax)ultCharge=ultMax;ultText.innerText=`大招能量：${Math.floor(ultCharge)}/${ultMax}`;ultBtn.disabled=ultCharge<ultMax;
}

function start(){
  initAudio();stopBgMusic();createBgMusic();playBgMusic();
  gameRunning=true;score=0;level=1;
  player.weaponLevel=1;player.laserLevel=0;player.laserTime=0;player.wingLevel=0;player.shieldCount=1;player.invincibleTime=0;player.magnetTime=0;player.bombCount=0;
  ultCharge=0;ulting=false;
  scoreText.innerText='分数：0';levelText.innerText='关卡：1';bombText.innerText='炸弹：0';ultText.innerText='大招能量：0/100';
  particles=[];bullets=[];enemies=[];effects=[];items=[];textEffects=[];followMissiles=[];boss=null;bossBullets=[];
  player.x=canvas.width/2-25;player.y=canvas.height*0.8;
  if(bossSpawnTimer)clearTimeout(bossSpawnTimer);bossSpawnTimer=setTimeout(spawnBoss,30000);
  logo.style.display='none';author.style.display='none';startBtn.style.display='none';shopBtn.style.display='none';
  bombBtn.style.display='block';skinSwitchBtn.style.display='block';ultBtn.style.display='block';ultBtn.disabled=true;defeat.style.display='none';
  if(window.shootInterval)clearInterval(window.shootInterval);if(window.enemyInterval)clearInterval(window.enemyInterval);if(window.missileInterval)clearInterval(window.missileInterval);
  window.shootInterval=setInterval(shoot,currentSkin===2?180:240);window.enemyInterval=setInterval(createEnemy,1100);window.missileInterval=setInterval(fireFollowMissile,1200);
  loop();
}

function gameOver(){
  gameRunning=false;stopBgMusic();playSound('gameover');
  if(bossSpawnTimer)clearTimeout(bossSpawnTimer);clearInterval(window.shootInterval);clearInterval(window.enemyInterval);clearInterval(window.missileInterval);
  defeatInfo.innerHTML=`最高关卡：${level}<br>最终得分：${score}<br>获得金币：${gold%1000}<br>再接再厉！`;
  defeat.style.display='block';bombBtn.style.display='none';skinSwitchBtn.style.display='none';ultBtn.style.display='none';
  logo.style.display='block';author.style.display='block';startBtn.style.display='block';shopBtn.style.display='block';
}

restartBtn.onclick=start;
startBtn.onclick=start;
</script>
