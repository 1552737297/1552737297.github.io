<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>萌宠管家-注册+评论双修复最终稳定版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;}
/*登录弹窗独立层级，不冲突*/
.login-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999999;display:flex;align-items:center;justify-content:center;}
.login-main{width:85%;background:#fff;border-radius:16px;padding:20px;}
.tab-line{display:flex;border-bottom:1px solid #eee;margin-bottom:15px;}
.tab-item{flex:1;text-align:center;padding:12px 0;font-size:16px;cursor:pointer;}
.tab-item.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none !important;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #eee;border-radius:8px;}
.btn{width:100%;padding:12px;background:#ff5c8d;color:#fff;border:none;border-radius:8px;font-size:16px;}
#nav{position:fixed;bottom:0;left:0;width:100%;height:52px;background:#fff;display:flex;border-top:1px solid #eee;}
.nav-btn{flex:1;text-align:center;line-height:52px;}
.nav-btn.active{color:#ff5c8d;font-weight:bold;}
.main{padding:15px;margin-bottom:60px;}
.card{background:#fff;padding:14px;border-radius:12px;margin:10px 0;}
.reply-in{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
<div class="login-main">
<div class="tab-line">
<!-- 纯原生独立点击，绝不拦截 -->
<div class="tab-item active" onclick="switchLoginTab()">登录</div>
<div class="tab-item" onclick="switchRegTab()">注册</div>
</div>

<div id="loginForm">
<input id="lAcc" placeholder="登录账号">
<input id="lPwd" type="password" placeholder="登录密码">
<button class="btn" onclick="userLogin()">立即登录</button>
</div>

<div id="regForm" class="hide">
<input id="rAcc" placeholder="注册账号">
<input id="rNick" placeholder="显示昵称">
<input id="rPwd" type="password" placeholder="设置密码">
<button class="btn" onclick="userRegister()">立即注册</button>
</div>
</div>
</div>

<div id="userTip" style="padding:10px;text-align:right;">未登录</div>

<div class="main">
<div id="page0">
<h3>🐾上门喂猫预约</h3>
<input id="uName" placeholder="称呼">
<input id="uPhone" placeholder="手机号">
<input id="uAddr" placeholder="地址">
<input type="datetime-local" id="uTime">
<textarea id="uNote" placeholder="备注"></textarea>
<button class="btn" onclick="addOrder()">提交预约</button>
</div>

<div id="page1" class="hide">
<h3>🐱云端互通社区</h3>
<textarea id="postCont" placeholder="登录后发帖"></textarea>
<button class="btn" onclick="sendPost()">发布帖子</button>
<div id="postList"></div>
</div>

<div id="page2" class="hide">
<h3>🔐商家后台</h3>
<input type="password" id="admPwd" placeholder="管理员密码">
<button class="btn" onclick="openAdmin()">进入后台</button>
<div id="admBox"></div>
</div>
</div>

<div id="nav">
<div class="nav-btn active" onclick="changePage(0)">预约</div>
<div class="nav-btn" onclick="changePage(1)">社区</div>
<div class="nav-btn" onclick="changePage(2)">后台</div>
</div>

<script>
//---------- 登录注册切换【修复点击无反应核心】 ----------
function switchLoginTab(){
let tabs = document.querySelectorAll('.tab-item');
tabs[0].classList.add('active');tabs[1].classList.remove('active');
loginForm.classList.remove('hide');regForm.classList.add('hide');
}
function switchRegTab(){
let tabs = document.querySelectorAll('.tab-item');
tabs[1].classList.add('active');tabs[0].classList.remove('active');
regForm.classList.remove('hide');loginForm.classList.add('hide');
}

//用户本地存储，保留你之前账号
function getUserData(){return JSON.parse(localStorage.getItem("userList")||"[]")}
let nowUser = null;

//注册
function userRegister(){
let a = rAcc.value.trim(),n=rNick.value.trim(),p=rPwd.value.trim();
if(!a||!n||!p){alert('三项不能为空');return;}
let arr = getUserData();
if(arr.some(x=>x.acc===a)){alert('账号已存在');return;}
arr.push({acc:a,nick:n,pwd:p});
localStorage.setItem("userList",JSON.stringify(arr));
alert('✅注册成功，去登录');
switchLoginTab();
}

//登录
function userLogin(){
let a = lAcc.value.trim(),p=lPwd.value.trim();
let arr = getUserData();
let u = arr.find(x=>x.acc===a&&x.pwd===p);
if(!u){alert('账号密码错误');return;}
nowUser = u;
userTip.innerText = "欢迎："+u.nick;
loginWrap.style.display = "none";
loadCloudAll();
}

//页面切换
function changePage(i){
page0.className='hide';page1.className='hide';page2.className='hide';
if(i===0)page0.classList.remove('hide');
if(i===1){page1.classList.remove('hide');if(nowUser)loadCloudAll();}
if(i===2)page2.classList.remove('hide');
let navs=document.querySelectorAll('.nav-btn');
navs.forEach((x,idx)=>x.classList.toggle('active',idx===i));
}

//预约
function addOrder(){
let d={
n:uName.value,p:uPhone.value,a:uAddr.value,t:uTime.value,nt:uNote.value
};
let list=JSON.parse(localStorage.getItem("petOrder")||"[]");
list.unshift(d);localStorage.setItem("petOrder",JSON.stringify(list));
alert("预约成功");
}

//---------- 云端专属接口 帖子+评论严格对应【修复无法发评论】 ----------
const apiUrl = "https://jsonblob.com/api/jsonBlob/1158000000000000";
async function getCloudData(){try{let res=await fetch(apiUrl+"?_="+Date.now());return await res.json()||[]}catch{return []}}
async function saveCloudData(d){await fetch(apiUrl,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}

//发帖
async function sendPost(){
if(!nowUser){alert("请先登录");return;}
let txt=postCont.value.trim();
if(!txt){alert("内容不能为空");return;}
let arr=await getCloudData();
arr.unshift({id:Date.now(),name:nowUser.nick,txt:txt,reply:[]});
await saveCloudData(arr);postCont.value="";loadCloudAll();alert("发帖成功互通可见");
}

//渲染全部帖子+评论
async function loadCloudAll(){
let arr=await getCloudData(),html="";
if(arr.length===0)html='<div class="card" style="text-align:center;color:#999;">暂无帖子</div>';
else{
arr.forEach(item=>{
html += `<div class="card"><strong>${item.name}</strong><div style="margin:8px 0">${item.txt}</div>
<div class="reply-in">
<input placeholder="评论昵称">
<textarea placeholder="写评论"></textarea>
<button class="btn" style="padding:6px;margin-top:4px" onclick="submitCmt(${item.id},this)">发表评论</button>
<div style="margin-top:10px;font-size:14px">`;
item.reply&&item.reply.length>0
?item.reply.forEach(r=>html+=`<div>▪${r.rn}：${r.rt}</div>`)
:html+=`<div style="color:#999">暂无评论</div>`;
html += `</div></div></div>`;
})
}
postList.innerHTML=html;
}

//评论提交【精准字段修复，保证能存、能显示】
async function submitCmt(pid,dom){
if(!nowUser){alert("请先登录");return;}
let rn=dom.parentElement.querySelector("input").trim();
let rt=dom.parentElement.querySelector("textarea").trim();
if(!rn||!rt){alert("昵称和评论都要填");return;}
let arr=await getCloudData();
for(let i=0;i<arr.length;i++){
if(arr[i].id===pid){
arr[i].reply.push({rn:rn,rt:rt});break;
}
}
await saveCloudData(arr);loadCloudAll();alert("✅评论发布成功，实时互通");
}

//商家后台
function openAdmin(){
if(admPwd.value=="123456"){
let list=JSON.parse(localStorage.getItem("petOrder")||"[]"),h="";
list.forEach(x=>h+=`<div class="card">${x.n} ${x.p} ${x.a}</div>`);
admBox.innerHTML=h;admBox.style.display="block";
}
}
</script>

</body>
</html>
