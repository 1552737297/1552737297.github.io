<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>拼豆图纸生成器（专业优化版）</title>
<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
body{background:#f3f4f6;margin:0;padding:20px}
.container{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.header{text-align:center}
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.flex{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.btn{padding:8px 16px;border-radius:8px;border:none;background:#3b82f6;color:white;cursor:pointer;transition:0.2s}
.btn:hover{opacity:0.85}

#fileInput{display:none}

.stat th,.stat td{border:1px solid #e5e7eb;padding:8px;text-align:center}

.tip{background:#fffbeb;border:1px solid #fef3c7;padding:12px;border-radius:8px;color:#92400e}
.heatTip{background:#ecfeff;border:1px solid #cffafe;padding:12px;border-radius:8px;color:#0e7494}
.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden}
.loading.show{visibility:visible}
.spinner{border:4px solid #f3f3f3;border-top:4px solid #3b82f6;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧩 拼豆图纸生成器（专业优化版）</h1>
    <p>一键切换板尺寸 · Canvas高性能渲染 · 撤销/重做 · 色卡匹配 · 导出缩放</p>
  </div>

  <div class="card">
    <div class="flex">
      <label for="fileInput" class="btn">📸 上传图片</label>
      <input type="file" id="fileInput" accept="image/*">
      <button class="btn" onclick="app.generateGrid()">⚙️ 生成网格</button>
      <button class="btn btn-success" onclick="app.exportFull()">💾 导出图纸</button>
      
      <div style="display:flex;gap:6px">
        <button class="btn btn-presets" onclick="app.setSize(15)">15×15</button>
        <button class="btn btn-presets" onclick="app.setSize(29)">29×29</button>
        <button class="btn btn-presets" onclick="app.setSize(50)">50×50</button>
        <button class="btn btn-presets" onclick="app.setSize(52)">52×52</button>
        <button class="btn btn-presets" onclick="app.setSize(104)">104×104</button>
      </div>
      
      <div>自定义：<input type="number" id="gridSize" value="29" min="5" max="150"></div>
      <div>去白阈值：<input type="number" id="whiteThreshold" value="240" min="200" max="255"></div>
      <div><label><input type="checkbox" id="flipX"> 左右反转</label></div>
      <div><label><input type="checkbox" id="useMARD"> 使用MARD色卡</label></div>
      <div>导出缩放：<select id="exportScale"><option value="1">1倍</option><option value="2" selected>2倍</option><option value="4">4倍</option></select></div>
    </div>
    <div class="editArea">
      <div>🔹单格编辑：<input type="color" id="cellColor"> R:<input id="r" size=3> G:<input id="g" size=3> B:<input id="b" size=3>
      <button class="btn" onclick="app.applyCellEdit()">应用</button></div>
      <div>🔸批量换色：<input type="color" id="fromColor"> → <input type="color" id="toColor">
      容差：<input type="number" id="replaceTolerance" value="0" min="0" max="50" style="width:60px">
      <button class="btn" onclick="app.applyBatchReplace()">替换</button></div>
      <div><button class="btn" onclick="app.undo()">↩️ 撤销</button> <button class="btn" onclick="app.redo()">↪️ 重做</button></div>
    </div>
  </div>

  <div class="card tip">
    <strong>拼豆小贴士：</strong> 1.将拼豆摆到拼豆板上对照图纸；2.铺上助烫纸；3.熨斗中温均匀熨烫；4.冷却后翻面再烫固定。
  </div>
  <div class="card heatTip">
    <strong>熨烫提示：</strong> 温度不可过高，时间不宜过久，避免烫化变形；烫完冷却后再取下，防止变形。
  </div>

  <div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="gridCanvas"></canvas>
  </div>

  <div class="card stat">
    <h3>📊 颜色统计</h3>
    <table id="statTable">
      <thead><tr><th>颜色</th><th>十六进制</th><th>原图RGB</th><th>最终RGB</th><th>颗数</th><th>占比</th></tr></thead>
      <tbody id="statBody"></tbody>
    </table>
  </div>
</div>

<div id="loading" class="loading"><div class="spinner"></div></div>

<script>
// ======================== 扩展 MARD 色卡（常用48色） ========================
const MARD_PALETTE = [
  {r:255,g:255,b:255,code:"H2"},{r:0,g:0,b:0,code:"K1"},
  {r:253,g:246,b:226,code:"A1"},{r:250,g:240,b:190,code:"A2"},
  {r:245,g:222,b:179,code:"B1"},{r:236,g:206,b:143,code:"B2"},
  {r:255,g:217,b:117,code:"C1"},{r:255,g:193,b:7,code:"C2"},
  {r:255,g:170,b:0,code:"D1"},{r:255,g:137,b:0,code:"D2"},
  {r:255,g:105,b:0,code:"E1"},{r:255,g:70,b:0,code:"E2"},
  {r:0,g:200,b:50,code:"G1"},{r:0,g:170,b:50,code:"G2"},
  {r:0,g:150,b:100,code:"H1"},{r:0,g:90,b:150,code:"I1"},
  {r:255,g:255,b:180,code:"Y1"},{r:255,g:235,b:100,code:"Y2"},
  {r:255,g:200,b:80,code:"O1"},{r:255,g:160,b:60,code:"O2"},
  {r:255,g:120,b:40,code:"R1"},{r:255,g:80,b:20,code:"R2"},
  {r:200,g:100,b:50,code:"BR1"},{r:160,g:70,b:30,code:"BR2"},
  {r:255,g:180,b:200,code:"P1"},{r:255,g:120,b:160,code:"P2"},
  {r:180,g:80,b:150,code:"PU1"},{r:140,g:50,b:120,code:"PU2"},
  {r:100,g:200,b:220,code:"C3"},{r:50,g:160,b:200,code:"C4"},
  {r:0,g:140,b:200,code:"B3"},{r:0,g:100,b:180,code:"B4"},
  {r:120,g:200,b:80,code:"G3"},{r:80,g:160,b:60,code:"G4"},
  {r:255,g:140,b:100,code:"S1"},{r:240,g:100,b:80,code:"S2"},
  {r:180,g:180,b:180,code:"M1"},{r:120,g:120,b:120,code:"M2"},
  {r:80,g:80,b:80,code:"M3"},{r:60,g:40,b:30,code:"DK"},
  {r:255,g:220,b:140,code:"CR"},{r:210,g:180,b:110,code:"CR2"},
  {r:150,g:200,b:150,code:"MINT"},{r:100,g:180,b:140,code:"MINT2"},
  {r:200,g:130,b:70,code:"TN"},{r:160,g:90,b:40,code:"TN2"},
  {r:255,g:230,b:210,code:"SK"},{r:250,g:200,b:170,code:"SK2"}
];
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function hexToRgb(h){return [parseInt(h.substr(1,2),16),parseInt(h.substr(3,2),16),parseInt(h.substr(5,2),16)];}
function colorDist(c1,c2){const dr=c1.r-c2.r, dg=c1.g-c2.g, db=c1.b-c2.b; return dr*dr+dg*dg+db*db;}
function matchMARD(r,g,b){let best=null,bestDist=Infinity; for(const col of MARD_PALETTE){const d=colorDist({r,g,b},col); if(d<bestDist){bestDist=d; best=col;}} return best;}

// 主应用对象
const app = {
  originalImage: null,      // 存储原始Image对象
  currentSize: 29,
  pixels: [],               // 三维数组 [y][x] => {r,g,b,or,og,ob}
  history: [],              // 撤销栈
  historyIndex: -1,
  
  init(){
    this.bindEvents();
    this.loadDemoData();
  },
  
  bindEvents(){
    document.getElementById('fileInput').onchange = e => this.handleImageUpload(e);
    document.getElementById('gridSize').addEventListener('change', () => this.setSize(parseInt(document.getElementById('gridSize').value)));
    // 网格Canvas点击获取坐标
    const canvas = document.getElementById('gridCanvas');
    canvas.addEventListener('click', (e) => this.onCanvasClick(e));
  },
  
  showLoading(show){
    const el = document.getElementById('loading');
    if(show) el.classList.add('show');
    else el.classList.remove('show');
  },
  
  async handleImageUpload(e){
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.onload = () => {
      this.originalImage = img;
      // 自动生成网格
      this.generateGrid();
    };
    img.src = URL.createObjectURL(file);
  },

  setSize(n){
    document.getElementById('gridSize').value = n;
    this.currentSize = n;
    if(this.originalImage) this.generateGrid(); // 有图片则重新采样
    else this.clearGrid();
  },
  
  clearGrid(){
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 0; canvas.height = 0;
    this.pixels = [];
    this.updateStat();
  },
  
  // 核心：从原始图片生成像素矩阵
  async generateGrid(){
    if(!this.originalImage){
      alert("请先上传图片");
      return;
    }
    this.showLoading(true);
    await new Promise(r => setTimeout(r, 10)); // 让UI更新
    
    const size = parseInt(document.getElementById('gridSize').value);
    this.currentSize = size;
    const threshold = parseInt(document.getElementById('whiteThreshold').value);
    const flip = document.getElementById('flipX').checked;
    const useMARD = document.getElementById('useMARD').checked;
    
    // 创建离屏canvas缩放图片
    const offCanvas = document.createElement('canvas');
    offCanvas.width = size;
    offCanvas.height = size;
    const ctx = offCanvas.getContext('2d');
    ctx.drawImage(this.originalImage, 0, 0, size, size);
    const imgData = ctx.getImageData(0, 0, size, size);
    const data = imgData.data;
    
    const newPixels = [];
    for(let y=0; y<size; y++){
      const row = [];
      for(let x=0; x<size; x++){
        const idx = (y*size + x) * 4;
        let r = data[idx], g = data[idx+1], b = data[idx+2];
        const or=r, og=g, ob=b;
        // 去白
        if(r>threshold && g>threshold && b>threshold) r=g=b=255;
        // 色卡匹配
        if(useMARD){
          const matched = matchMARD(r,g,b);
          r=matched.r; g=matched.g; b=matched.b;
        }
        row.push({r,g,b,or,og,ob});
      }
      newPixels.push(row);
    }  // 左右反转
    if(flip){
      for(let y=0; y<size; y++){
        newPixels[y].reverse();
      }
    }
    this.pixels = newPixels;
    this.pushHistory(); // 记录初始状态
    this.renderCanvas();
    this.updateStat();
    this.showLoading(false);
  },
  
  // 渲染Canvas网格（每个格子 cellSize 根据容器自适应，固定32px）
  renderCanvas(){
    const size = this.pixels.length;
    if(size===0) return;
    const cellSize = 32;
    const canvas = document.getElementById('gridCanvas');
    canvas.width = size * cellSize;
    canvas.height = size * cellSize;
    const ctx = canvas.getContext('2d');
    for(let y=0; y<size; y++){
      for(let x=0; x<size; x++){
        const p = this.pixels[y][x];
        ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
        ctx.fillRect(x*cellSize, y*cellSize, cellSize-1, cellSize-1);
        // 可选：显示十六进制小字
        ctx.font = "10px monospace";
        ctx.fillStyle = (p.r*0.299 + p.g*0.587 + p.b*0.114) > 160 ? "#000" : "#fff";
        ctx.fillText(rgbToHex(p.r,p.g,p.b).slice(1), x*cellSize+2, y*cellSize+12);
      }
    }
  },
  
  onCanvasClick(e){
    const canvas = document.getElementById('gridCanvas');
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    const cellSize = 32;
    const x = Math.floor(mouseX / cellSize);
    const y = Math.floor(mouseY / cellSize);
    if(x>=0 && x<this.pixels.length && y>=0 && y<this.pixels.length){
      const p = this.pixels[y][x];
      document.getElementById('cellColor').value = rgbToHex(p.r,p.g,p.b);
      document.getElementById('r').value = p.r;
      document.getElementById('g').value = p.g;
      document.getElementById('b').value = p.b;
    }
  },
  applyCellEdit(){
    if(!this.pixels.length) return;
    const r = parseInt(document.getElementById('r').value);
    const g = parseInt(document.getElementById('g').value);
    const b = parseInt(document.getElementById('b').value);
    // 需要知道当前选中的格子？简化：通过canvas点击选中的坐标。但为了易用，增加全局选中坐标变量
    if(this.selectedCell){
      const {x,y} = this.selectedCell;
      if(this.pixels[y] && this.pixels[y][x]){
        this.pixels[y][x].r = r;
        this.pixels[y][x].g = g;
        this.pixels[y][x].b = b;
        this.pushHistory();
        this.renderCanvas();
        this.updateStat();
      }
    } else {
      alert("请先在网格上点击一个格子");
    }
  },
  
  // 记录选中格子（用于单格编辑）
  setSelected(x,y){
    this.selectedCell = {x,y};
  },
  
  applyBatchReplace(){
    const fromRGB = hexToRgb(document.getElementById('fromColor').value);
    const toRGB = hexToRgb(document.getElementById('toColor').value);
    const tolerance = parseInt(document.getElementById('replaceTolerance').value);
    let changed = false;
    for(let y=0; y<this.pixels.length; y++){
      for(let x=0; x<this.pixels[y].length; x++){
        const p = this.pixels[y][x];
        const dist = Math.sqrt((p.r-fromRGB[0])**2 + (p.g-fromRGB[1])**2 + (p.b-fromRGB[2])**2);
        if(dist <= tolerance){
          p.r = toRGB[0];
          p.g = toRGB[1];
          p.b = toRGB[2];
          changed = true;
        }
      }
    }
    if(changed){
      this.pushHistory();
      this.renderCanvas();
      this.updateStat();
    } else {
      alert("未找到匹配的颜色（可增加容差值）");
    }
  },
  
  // 历史记录（最多50步）
  pushHistory(){
    const copy = JSON.parse(JSON.stringify(this.pixels));
    this.history = this.history.slice(0, this.historyIndex+1);
    this.history.push(copy);
    if(this.history.length > 50) this.history.shift();
    this.historyIndex = this.history.length - 1;
  },

  undo(){
    if(this.historyIndex > 0){
      this.historyIndex--;
      this.pixels = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
      this.renderCanvas();
      this.updateStat();
    }
  },
  
  redo(){
    if(this.historyIndex < this.history.length-1){
      this.historyIndex++;
      this.pixels = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
      this.renderCanvas();
      this.updateStat();
    }
  },
  
  updateStat(){
    if(!this.pixels.length){ document.getElementById('statBody').innerHTML = '<tr><td colspan="6">暂无数据</td></tr>'; return; }
    const size = this.pixels.length;
    const total = size*size;
    const colorMap = new Map();
    for(let y=0; y<size; y++){
      for(let x=0; x<size; x++){
        const p = this.pixels[y][x];
        const key = `${p.r},${p.g},${p.b}`;
        if(!colorMap.has(key)) colorMap.set(key, {r:p.r,g:p.g,b:p.b, or:p.or, og:p.og, ob:p.ob, cnt:0});
        colorMap.get(key).cnt++;
      }
    }
    const sorted = Array.from(colorMap.values()).sort((a,b)=>b.cnt-a.cnt);
    const tbody = document.getElementById('statBody');
    tbody.innerHTML = '';
    for(const c of sorted){
      const tr = document.createElement('tr');
      const hex = rgbToHex(c.r,c.g,c.b);
      tr.innerHTML = `
        <td style="background:${hex};width:40px"></td>
        <td>${hex}</td>
        <td>${c.or},${c.og},${c.ob}</td>
        <td>${c.r},${c.g},${c.b}</td>
        <td>${c.cnt}</td>
        <td>${(c.cnt/total*100).toFixed(2)}%</td>
      `;
      tbody.appendChild(tr);
    }
  },
  exportFull(){
    if(!this.pixels.length){ alert("没有可导出的图纸"); return; }
    const size = this.pixels.length;
    const scale = parseInt(document.getElementById('exportScale').value);
    const cellSize = 32;
    const outWidth = size * cellSize * scale;
    const outHeight = size * cellSize * scale;
    // 检查canvas最大限制（某些浏览器限制16384）
    if(outWidth > 16384 || outHeight > 16384){
      alert("导出尺寸过大，请减小缩放倍数或网格尺寸");
      return;
    }
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = outWidth;
    exportCanvas.height = outHeight;
    const ctx = exportCanvas.getContext('2d');
    ctx.scale(scale, scale);
    for(let y=0; y<size; y++){
      for(let x=0; x<size; x++){
        const p = this.pixels[y][x];
        ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
        ctx.fillRect(x*cellSize, y*cellSize, cellSize, cellSize);
      }
    }
    const link = document.createElement('a');
    link.download = `拼豆图纸_${size}x${size}.png`;
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
  },
  
  loadDemoData(){
    // 生成一个默认示例棋盘格，便于体验
    const img = new Image();
    img.onload = () => {
      this.originalImage = img;
      this.generateGrid();
    };
    img.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f0f0f0'/%3E%3Ccircle cx='50' cy='50' r='40' fill='%234caf50'/%3E%3C/svg%3E";
  }
};

// 补全canvas点击时记录选中格子
document.getElementById('gridCanvas').addEventListener('click', (e) => {
  const canvas = document.getElementById('gridCanvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mouseX = (e.clientX - rect.left) * scaleX;
  const mouseY = (e.clientY - rect.top) * scaleY;
  const cellSize = 32;
  const x = Math.floor(mouseX / cellSize);
  const y = Math.floor(mouseY / cellSize);
  if(x>=0 && x<app.pixels.length && y>=0 && y<app.pixels.length){
    app.setSelected(x,y);
    const p = app.pixels[y][x];
    document.getElementById('cellColor').value = rgbToHex(p.r,p.g,p.b);
    document.getElementById('r').value = p.r;
    document.getElementById('g').value = p.g;
    document.getElementById('b').value = p.b;
  }
});

window.onload = () => { app.init(); };
</script>
</body>
</html>
