<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>稳发帖子-绝不无响应</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:70px;}
.login-pop{position:fixed;inset:0;background:#0008;z-index:999999;display:flex;align-items:center;justify-content:center;}
.box{width:85%;background:#fff;border-radius:16px;padding:20px;}
.tab{display:flex;border-bottom:1px solid #eee;margin-bottom:15px;}
.t1,.t2{flex:1;text-align:center;padding:10px;cursor:pointer;}
.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none !important;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #eee;border-radius:8px;}
.btn{width:100%;padding:12px;background:#ff5c8d;color:#fff;border:none;border-radius:8px;}
#nav{position:fixed;bottom:0;left:0;width:100%;height:50px;background:#fff;display:flex;border-top:1px solid #eee;}
.n-item{flex:1;text-align:center;line-height:50px;}
.n-item.active{color:#ff5c8d;font-weight:bold;}
.main{padding:15px;}
.card{background:#fff;padding:12px;border-radius:12px;margin:10px 0;}
</style>
</head>
<body>

<div class="login-pop" id="loginPop">
<div class="box">
<div class="tab">
<div class="t1 active" onclick="switchL()">登录</div>
<div class="t2" onclick="switchR()">注册</div>
</div>
<div id="formL">
<input id="lacc" placeholder="账号">
<input id="lpwd" type="password" placeholder="密码">
<button class="btn" onclick="doLogin()">登录</button>
</div>
<div id="formR" class="hide">
<input id="racc" placeholder="注册账号">
<input id="rnick" placeholder="昵称">
<input id="rpwd" type="password" placeholder="密码">
<button class="btn" onclick="doReg()">注册</button>
</div>
</div>
</div>

<div id="userTip" style="padding:10px;text-align:right;">未登录</div>

<div class="main">
<div id="p0">
<h3>🐾上门喂猫预约</h3>
<input id="uname" placeholder="称呼">
<input id="phone" placeholder="手机号">
<input id="addr" placeholder="地址">
<textarea id="note" placeholder="备注"></textarea>
<button class="btn" onclick="saveOrder()">提交预约</button>
</div>

<div id="p1" class="hide">
<h3>🐱宠友社区</h3>
<textarea id="postTxt" placeholder="先登录再发帖"></textarea>
<!-- 纯同步按钮，无任何异步请求 -->
<button class="btn" onclick="addLocalPost()">立即发布帖子</button>
<div id="plist"></div>
</div>

<div id="p2" class="hide">
<h3>🔐商家后台</h3>
</div>
</div>

<div id="nav">
<div class="n-item active" onclick="goPage(0)">预约</div>
<div class="n-item" onclick="goPage(1)">社区</div>
<div class="n-item" onclick="goPage(2)">后台</div>
</div>

<script>
//切换
function switchL(){
document.querySelector('.t1').classList.add('active');
document.querySelector('.t2').classList.remove('active');
formL.classList.remove('hide');formR.classList.add('hide');
}
function switchR(){
document.querySelector('.t2').classList.add('active');
document.querySelector('.t1').classList.remove('active');
formR.classList.remove('hide');formL.classList.add('hide');
}

//用户缓存保留
function getUserList(){return JSON.parse(localStorage.getItem("userList")||"[]")}
let nowUser = null;

//注册
function doReg(){
let a=racc.value.trim(),n=rnick.value.trim(),p=rpwd.value.trim();
if(!a||!n||!p){alert('不能为空');return;}
let arr=getUserList();
if(arr.some(x=>x.acc===a)){alert('账号已存在');return;}
arr.push({acc:a,nick:n,pwd:p});
localStorage.setItem("userList",JSON.stringify(arr));
alert('注册成功，请登录');switchL();
}

//登录
function doLogin(){
let a=lacc.value.trim(),p=lpwd.value.trim();
let arr=getUserList();
let u=arr.find(x=>x.acc===a&&x.pwd===p);
if(!u){alert('账号密码错误');return;}
nowUser = u;
userTip.innerText = "欢迎："+u.nick;
loginPop.style.display = "none";
renderPost();
}

//页面切换
function goPage(i){
p0.className='hide';p1.className='hide';p2.className='hide';
if(i===0)p0.classList.remove('hide');
if(i===1){p1.classList.remove('hide');if(nowUser)renderPost();}
if(i===2)p2.classList.remove('hide');
let navs=document.querySelectorAll('.n-item');
navs.forEach((el,idx)=>el.classList.toggle('active',idx===i));
}

//预约
function saveOrder(){
let data={
u:uname.value,p:phone.value,a:addr.value,n:note.value
};
let list=JSON.parse(localStorage.getItem("petOrder")||"[]");
list.unshift(data);
localStorage.setItem("petOrder",JSON.stringify(list));
alert('预约成功');
}

//========纯本地同步发帖 零异步、零卡死、点击必响应========
function getMyPost(){
return JSON.parse(localStorage.getItem("myPetPosts")||"[]");
}
function setMyPost(arr){
localStorage.setItem("myPetPosts",JSON.stringify(arr));
}

//发布核心
function addLocalPost(){
if(!nowUser){alert("请先登录");return;}
let txt = postTxt.value.trim();
if(!txt){alert("帖子内容不能为空");return;}

let arr = getMyPost();
arr.unshift({
name:nowUser.nick,
content:txt,
time:new Date().toLocaleString()
});
setMyPost(arr);

postTxt.value = "";
renderPost();
alert("✅发帖成功！立刻显示");
}

//渲染
function renderPost(){
let arr = getMyPost();
let html = "";
if(arr.length===0){
html = '<div class="card" style="text-align:center;color:#999;">暂无帖子</div>';
}else{
arr.forEach(item=>{
html += `<div class="card">
<strong>${item.name}</strong>
<div>${item.content}</div>
<div style="font-size:12px;color:#999;margin-top:4px;">${item.time}</div>
</div>`;
});
}
plist.innerHTML = html;
}
</script>

</body>
</html>
