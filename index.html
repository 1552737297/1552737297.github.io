<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>萌宠管家-本地可用+云端互通终极版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:70px;}
.login-wrap{position:fixed;inset:0;background:#0008;z-index:999999;display:flex;align-items:center;justify-content:center;}
.box{width:85%;background:#fff;border-radius:16px;padding:20px;}
.tab{display:flex;border-bottom:1px solid #eee;margin-bottom:15px;}
.t1,.t2{flex:1;text-align:center;padding:10px;cursor:pointer;}
.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none !important;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #eee;border-radius:8px;}
.btn{width:100%;padding:12px;background:#ff5c8d;color:#fff;border:none;border-radius:8px;}
#nav{position:bottom:0;left:0;width:100%;height:50px;background:#fff;display:flex;position:fixed;border-top:1px solid #eee;}
.n-item{flex:1;text-align:center;line-height:50px;}
.n-item.active{color:#ff5c8d;font-weight:bold;}
.main{padding:15px;margin-bottom:60px;}
.card{background:#fff;padding:12px;border-radius:12px;margin:10px 0;}
.reply-box{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:8px;}
</style>
</head>
<body>

<div class="login-wrap" id="loginPop">
<div class="box">
<div class="tab">
<div class="t1 active" onclick="switchL()">登录</div>
<div class="t2" onclick="switchR()">注册</div>
</div>
<div id="formL">
<input id="lacc" placeholder="账号">
<input id="lpwd" type="password" placeholder="密码">
<button class="btn" onclick="doLogin()">登录</button>
</div>
<div id="formR" class="hide">
<input id="racc" placeholder="注册账号">
<input id="rnick" placeholder="昵称">
<input id="rpwd" type="password" placeholder="密码">
<button class="btn" onclick="doReg()">注册</button>
</div>
</div>
</div>

<div id="userTip" style="padding:10px;text-align:right;">未登录</div>

<div class="main">
<div id="p0">
<h3>🐾上门喂猫预约</h3>
<input id="uname" placeholder="称呼">
<input id="phone" placeholder="手机号">
<input id="addr" placeholder="地址">
<input type="datetime-local" id="ptime">
<textarea id="note" placeholder="备注"></textarea>
<button class="btn" onclick="saveOrder()">提交预约</button>
</div>

<div id="p1" class="hide">
<h3>🐱云端互通宠友社区</h3>
<textarea id="postTxt" placeholder="登录后发布养宠动态"></textarea>
<button class="btn" onclick="sendCloudPost()">立即发布帖子</button>
<div id="plist"></div>
</div>

<div id="p2" class="hide">
<h3>🔐商家管理后台</h3>
<input type="password" id="admPwd" placeholder="管理员密码">
<button class="btn" onclick="admLogin()">进入后台</button>
<div id="admBox"></div>
</div>
</div>

<div id="nav">
<div class="n-item active" onclick="go(0)">预约</div>
<div class="n-item" onclick="go(1)">社区</div>
<div class="n-item" onclick="go(2)">后台</div>
</div>

<script>
//登录注册切换 稳定不卡
function switchL(){
document.querySelector('.t1').classList.add('active');
document.querySelector('.t2').classList.remove('active');
formL.classList.remove('hide');formR.classList.add('hide');
}
function switchR(){
document.querySelector('.t2').classList.add('active');
document.querySelector('.t1').classList.remove('active');
formR.classList.remove('hide');formL.classList.add('hide');
}

//本地用户 保留你之前注册账号
function getUser(){return JSON.parse(localStorage.getItem('userList')||'[]')}
let currUser = null;

//注册
function doReg(){
let a=racc.value.trim(),n=rnick.value.trim(),p=rpwd.value.trim();
if(!a||!n||!p){alert('不能为空');return}
let arr=getUser();
if(arr.find(x=>x.acc===a)){alert('账号存在');return}
arr.push({acc:a,nick:n,pwd:p});
localStorage.setItem('userList',JSON.stringify(arr));
alert('注册成功，请登录');switchL();
}

//登录
function doLogin(){
let a=lacc.value.trim(),p=lpwd.value.trim();
let arr=getUser();
let u=arr.find(x=>x.acc===a&&x.pwd===p);
if(!u){alert('账号密码错误');return}
currUser=u;
userTip.innerText='欢迎：'+u.nick;
loginPop.style.display='none';
renderAllPost();
}

//页面切换
function go(i){
p0.className='hide';p1.className='hide';p2.className='hide';
if(i===0)p0.classList.remove('hide');
if(i===1){p1.classList.remove('hide');if(currUser)renderAllPost();}
if(i===2)p2.classList.remove('hide');
let navs=document.querySelectorAll('.n-item');
navs.forEach((x,idx)=>x.classList.toggle('active',idx===i));
}

//预约本地存储
function saveOrder(){
let d={
n:uname.value,p:phone.value,a:addr.value,t:ptime.value,nt:note.value
};
let list=JSON.parse(localStorage.getItem('petOrder')||'[]');
list.unshift(d);
localStorage.setItem('petOrder',JSON.stringify(list));
alert('预约成功');
}

//========云端公共接口 稳定互通========
const cloudUrl = "https://jsonblob.com/api/jsonBlob/1159999999999999";

async function getCloud(){
 try{
  let res = await fetch(cloudUrl+"?_="+Date.now(),{cache:"no-cache"});
  return await res.json()||[];
 }catch{
  return [];
 }
}
async function setCloud(data){
 await fetch(cloudUrl,{
  method:"PUT",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
 });
}

//发布云端帖子 先弹窗再渲染 绝不无反应
async function sendCloudPost(){
 if(!currUser){alert("请先登录");return;}
 let txt = postTxt.value.trim();
 if(!txt){alert("内容不能为空");return;}
 let all = await getCloud();
 all.unshift({
  id:Date.now(),
  nick:currUser.nick,
  content:txt,
  reply:[]
 });
 await setCloud(all);
 postTxt.value = "";
 renderAllPost();
 alert("✅发帖成功，好友手机实时互通可见");
}

//渲染帖子+评论
async function renderAllPost(){
 let arr = await getCloud();
 let html = "";
 if(arr.length===0){
  html = '<div class="card" style="text-align:center;color:#999;">暂无共享帖子</div>';
 }else{
  arr.forEach(item=>{
   html += `<div class="card">
    <strong>👤 ${item.nick}</strong>
    <div style="margin:8px 0;">${item.content}</div>
    <div class="reply-box">
     <input placeholder="评论昵称">
     <textarea placeholder="写下你的评论"></textarea>
     <button class="btn" style="padding:6px" onclick="addReply(${item.id},this)">发表评论</button>
     <div style="margin-top:8px;font-size:14px;">`;
     if(item.reply && item.reply.length>0){
      item.reply.forEach(r=>{
       html += `<div>▪ ${r.rn}：${r.rt}</div>`;
      });
     }else{
      html += `<div style="color:#999;">暂无评论</div>`;
     }
   html += `</div></div></div>`;
  });
 }
 plist.innerHTML = html;
}

//发表评论 精准字段修复
async function addReply(pid,dom){
 if(!currUser){alert("请先登录");return;}
 let rn = dom.parentElement.querySelector("input").value.trim();
 let rt = dom.parentElement.querySelector("textarea").value.trim();
 if(!rn||!rt){alert("昵称和评论都必填");return;}
 let arr = await getCloud();
 for(let i=0;i<arr.length;i++){
  if(arr[i].id === pid){
   arr[i].reply.push({rn:rn,rt:rt});
   break;
  }
 }
 await setCloud(arr);
 renderAllPost();
 alert("✅评论互通成功");
}

//商家后台
function admLogin(){
 if(admPwd.value === "123456"){
  let list = JSON.parse(localStorage.getItem("petOrder")||"[]"),h="";
  list.forEach(x=>{
   h += `<div class="card">${x.n} ${x.p} ${x.a}</div>`;
  });
  admBox.innerHTML = h;
  admBox.style.display="block";
 }
}
</script>

</body>
</html>
