<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>萌宠管家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fdf6f8;padding-bottom:80px;font-family:sans-serif;}
/* 线上防遮挡 强制可点击 */
#nav{
position:fixed;top:0;left:0;width:100%;height:52px;
background:#fff;display:flex;z-index:9999999;
pointer-events:auto !important;
box-shadow:0 1px 4px #eee;
}
.nav-item{
flex:1;text-align:center;line-height:52px;
font-size:15px;color:#666;user-select:none;
}
.nav-item.active{color:#ff5c8d;border-bottom:3px solid #ff5c8d;font-weight:bold;}
.main{margin-top:58px;padding:15px;}
.page{display:none;}
.page.show{display:block;}
.banner{width:100%;height:140px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;margin-bottom:15px;}
.form-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
input,select,textarea{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin-top:6px;margin-bottom:12px;}
.btn{width:100%;background:#ff5c8d;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;}
</style>
</head>
<body>

<!-- 最原生直绑onclick，线上手机绝不失效 -->
<div id="nav">
<div class="nav-item active" ontouchstart="goTab(0)">下单预约</div>
<div class="nav-item" ontouchstart="goTab(1)">宠友社区</div>
<div class="nav-item" ontouchstart="goTab(2)">商家后台</div>
</div>

<div class="main">
<div class="page show" id="p0">
<div class="banner">🐾上门萌宠喂养</div>
<div class="form-box">
<label>昵称</label>
<input id="uname" placeholder="您的称呼">
<label>手机号</label>
<input id="phone" placeholder="11位手机号">
<label>上门地址</label>
<input id="addr" placeholder="详细住址">
<label>预约时间</label>
<input type="datetime-local" id="ptime">
<label>备注</label>
<textarea id="note" rows="3"></textarea>
<button class="btn" onclick="orderSub()">立即预约</button>
</div>
</div>

<div class="page" id="p1">
<div class="banner">🐱宠友社区</div>
<div class="form-box">
<input id="nick" placeholder="发帖昵称">
<textarea id="cnt" rows="4" placeholder="分享养宠日常"></textarea>
<button class="btn" onclick="addPost()">发布帖子</button>
</div>
<div id="plist"></div>
</div>

<div class="page" id="p2">
<div class="banner">🔐商家管理中心</div>
<div class="form-box" style="text-align:center">
<p>管理员密码：123456</p >
<input type="password" id="pwd">
<button class="btn" onclick="loginAdmin()">登录后台</button>
</div>
<div id="adminCon" style="display:none" class="form-box">
<h4>全部订单列表</h4>
<div id="olist"></div>
</div>
</div>
</div>

<script>
// 手机+GitHub线上 专用切换 绝对不卡
function goTab(i){
let navs = document.querySelectorAll('.nav-item');
for(let j=0;j<navs.length;j++){
navs[j].classList.remove('active');
}
navs[i].classList.add('active');

let pages = document.querySelectorAll('.page');
for(let k=0;k<pages.length;k++){
pages[k].classList.remove('show');
}
document.getElementById('p'+i).classList.add('show');
}

//本地存储订单
function getOrder(){return JSON.parse(localStorage.getItem('petOrder')||'[]');}
function saveOrder(d){localStorage.setItem('petOrder',JSON.stringify(d));}
function orderSub(){
let o={
name:uname.value,phone:phone.value,addr:addr.value,
time:ptime.value,note:note.value
};
let arr=getOrder();arr.unshift(o);saveOrder(arr);
alert('预约成功！');
uname.value='';phone.value='';addr.value='';note.value='';
}

//帖子
function getPost(){return JSON.parse(localStorage.getItem('petPost')||'[]');}
function savePost(d){localStorage.setItem('petPost',JSON.stringify(d));}
function addPost(){
let arr=getPost();
arr.unshift({nick:nick.value,cnt:cnt.value});
savePost(arr);nick.value='';cnt.value='';renderPost();
}
function renderPost(){
let arr=getPost(),h='';
arr.forEach(x=>{
h+='<div style="background:#fff;padding:12px;border-radius:10px;margin-bottom:8px;"><b>'+x.nick+'</b><div style="margin-top:6px">'+x.cnt+'</div></div>';
});
document.getElementById('plist').innerHTML=h;
}

//商家登录
function loginAdmin(){
if(pwd.value==='123456'){
document.getElementById('adminCon').style.display='block';
let arr=getOrder(),h='';
arr.forEach(x=>{
h+='<div style="background:#f8f8f8;padding:10px;border-radius:8px;margin-bottom:6px;">姓名：'+x.name+'<br>手机：'+x.phone+'<br>地址：'+x.addr+'<br>时间：'+x.time+'</div>';
});
document.getElementById('olist').innerHTML=h;
alert('登录成功');
}else{alert('密码错误');}
}

window.onload=function(){renderPost();}
</script>

</body>
</html>
