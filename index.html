<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机 · 道具增强版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game {
            border: 2px solid #0ef;
            background: #0a0a1a;
            display: block;
        }
        .ui {
            position: absolute;
            color: #0ef;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 6px #0ef;
        }
        #score { top: 12px; left: 12px; }
        #hp { top: 12px; right: 12px; }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 28px;
            font-size: 20px;
            background: linear-gradient(90deg, #0ff, #08f);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body>

<div id="score" class="ui">分数：0</div>
<div id="hp" class="ui">BOSS：-</div>
<button id="startBtn">开始游戏</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const hpText = document.getElementById('hp');
const startBtn = document.getElementById('startBtn');

canvas.width = 375;
canvas.height = 667;

let gameRunning = false;
let score = 0;

// 玩家
const player = {
    x: canvas.width/2 - 25,
    y: canvas.height - 100,
    w: 50,
    h: 60,
    shield: true,
    weaponLevel: 1,   // 1=单 2=双 3=三发散射
    laserTime: 0      // 激光剩余时间
};

// 子弹、敌机、BOSS、特效、道具
let bullets = [];
let enemies = [];
let boss = null;
let effects = [];
let items = [];

// 触摸控制
canvas.addEventListener('touchmove', e => {
    if (!gameRunning) return;
    e.preventDefault();
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    player.x = t.clientX - r.left - player.w/2;
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
});

// 射击
function shoot() {
    if (player.laserTime > 0) {
        // 激光
        bullets.push({
            type: 'laser', x: player.x + 15, y: player.y, w: 20, h: canvas.height, speed: 0, color: '#f0f'
        });
    } else {
        // 普通子弹
        if (player.weaponLevel >= 1) {
            bullets.push({ type: 'normal', x: player.x + 23, y: player.y, w: 4, h: 14, speed: 9, color: '#0ff' });
        }
        if (player.weaponLevel >= 2) {
            bullets.push({ type: 'normal', x: player.x + 5, y: player.y + 10, w: 4, h: 14, speed: 9, color: '#0ff' });
            bullets.push({ type: 'normal', x: player.x + 41, y: player.y + 10, w: 4, h: 14, speed: 9, color: '#0ff' });
        }
        if (player.weaponLevel >= 3) {
            bullets.push({ type: 'normal', x: player.x - 5, y: player.y + 20, w: 4, h: 14, speed: 8, color: '#0ff' });
            bullets.push({ type: 'normal', x: player.x + 50, y: player.y + 20, w: 4, h: 14, speed: 8, color: '#0ff' });
        }
    }
    playSound('shoot');
}

// 普通敌机
function createEnemy() {
    if (boss) return;
    enemies.push({
        x: Math.random() * (canvas.width - 36),
        y: -40,
        w: 36,
        h: 44,
        speed: 2.5 + Math.random() * 2,
        hp: 1
    });
}

// BOSS
function spawnBoss() {
    if (boss) return;
    boss = {
        x: canvas.width/2 - 80,
        y: 60,
        w: 160,
        h: 120,
        hp: 40,
        maxHp: 40,
        speed: 1.5,
        dir: 1
    };
}

// 碰撞
function collide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

// 爆炸特效
function boom(x, y) {
    effects.push({ x, y, t: 0, max: 10 });
    playSound('boom');
}

// 掉落道具
function dropItem(x, y) {
    const r = Math.random();
    let type;
    if (r < 0.4) type = 'weapon';    // 武器升级
    else if (r < 0.7) type = 'shield';// 护盾
    else type = 'laser';              // 激光
    items.push({ x, y, w: 26, h: 26, type, speed: 2 });
}

// 音效
function playSound(type) {
    try {
        let o = new Audio();
        if (type === 'shoot') {
            o.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmImBze5u+wVRwASe7UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';
        } else {
            o.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmImBze5u+wVRwASe7UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';
        }
        o.volume = 0.2;
        o.play();
    } catch (e) {}
}

// 画玩家
function drawPlayer() {
    ctx.fillStyle = '#11f';
    ctx.fillRect(player.x, player.y + 20, player.w, 40);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(player.x + 20, player.y, 10, 60);
    if (player.shield) {
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(player.x + 25, player.y + 30, 40, 0, Math.PI*2);
        ctx.stroke();
    }
    if (player.laserTime > 0) {
        ctx.fillStyle = '#f0f';
        ctx.font = '16px bold';
        ctx.fillText('激光', player.x, player.y - 10);
    }
}

// 游戏主循环
function loop() {
    if (!gameRunning) return;
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 激光计时
    if (player.laserTime > 0) player.laserTime -= 16;

    drawPlayer();

    // 子弹
    for (let i=bullets.length-1; i>=0; i--) {
        let b = bullets[i];
        if (b.type === 'normal') b.y -= b.speed;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        if (b.y < -20 && b.type === 'normal') bullets.splice(i,1);
    }

    // 道具
    for (let i=items.length-1; i>=0; i--) {
        let it = items[i];
        it.y += it.speed;
        if (it.type === 'weapon') ctx.fillStyle = '#ff0';
        if (it.type === 'shield') ctx.fillStyle = '#0ff';
        if (it.type === 'laser') ctx.fillStyle = '#f0f';
        ctx.fillRect(it.x, it.y, it.w, it.h);
        if (collide(player, it)) {
            if (it.type === 'weapon') {
                if (player.weaponLevel < 3) player.weaponLevel++;
            }
            if (it.type === 'shield') player.shield = true;
            if (it.type === 'laser') player.laserTime = 5000;
            items.splice(i,1);
        }
        if (it.y > canvas.height) items.splice(i,1);
    }

    // 敌机
    for (let i=enemies.length-1; i>=0; i--) {
        let e = enemies[i];
        e.y += e.speed;
        ctx.fillStyle = '#f33';
        ctx.fillRect(e.x, e.y, e.w, e.h);

        if (collide(player, e) && player.shield) {
            boom(e.x, e.y);
            enemies.splice(i,1);
            player.shield = false;
            continue;
        }
        if (collide(player, e)) { gameOver(); return; }
        if (e.y > canvas.height + 50) enemies.splice(i,1);
    }

    // BOSS
    if (boss) {
        hpText.innerText = `BOSS: ${boss.hp}/${boss.maxHp}`;
        boss.x += boss.speed * boss.dir;
        if (boss.x < 20 || boss.x + boss.w > canvas.width - 20) boss.dir *= -1;
        ctx.fillStyle = '#f80';
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);

        for (let i=bullets.length-1; i>=0; i--) {
            if (boss && collide(bullets[i], boss)) {
                if (bullets[i].type === 'normal') bullets.splice(i,1);
                boss.hp--;
                if (boss.hp <= 0) {
                    boom(boss.x + boss.w/2, boss.y + boss.h/2);
                    score += 300;
                    scoreText.innerText = `分数：${score}`;
                    boss = null;
                    hpText.innerText = 'BOSS：-';
                }
            }
        }
        if (collide(player, boss)) { gameOver(); return; }
    } else {
        hpText.innerText = 'BOSS：-';
    }

    // 子弹打敌机
    for (let i=bullets.length-1; i>=0; i--) {
        for (let j=enemies.length-1; j>=0; j--) {
            if (collide(bullets[i], enemies[j])) {
                if (bullets[i].type === 'normal') bullets.splice(i,1);
                enemies[j].hp--;
                if (enemies[j].hp <= 0) {
                    boom(enemies[j].x, enemies[j].y);
                    if (Math.random() < 0.35) dropItem(enemies[j].x, enemies[j].y);
                    enemies.splice(j,1);
                    score += 20;
                    scoreText.innerText = `分数：${score}`;
                    break;
                }
            }
        }
    }

    // 爆炸特效
    for (let i=effects.length-1; i>=0; i--) {
        let ef = effects[i];
        ef.t++;
        let s = ef.t * 3;
        ctx.fillStyle = '#f80';
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, s, 0, Math.PI*2);
        ctx.fill();
        if (ef.t >= ef.max) effects.splice(i,1);
    }

    requestAnimationFrame(loop);
}

// 开始
function start() {
    gameRunning = true;
    score = 0;
    player.weaponLevel = 1;
    player.laserTime = 0;
    scoreText.innerText = `分数：${score}`;
    bullets = []; enemies = []; effects = []; items = []; boss = null;
    player.x = canvas.width/2 - 25;
    player.shield = true;
    startBtn.style.display = 'none';

    setInterval(shoot, 200);
    setInterval(createEnemy, 1200);
    setTimeout(spawnBoss, 30000);
    loop();
}

function gameOver() {
    gameRunning = false;
    alert(`游戏结束！得分：${score}`);
    startBtn.style.display = 'block';
}

startBtn.onclick = start;
</script>
</body>
</html>
