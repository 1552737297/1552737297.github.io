<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>萌宠管家-账号登录+云端互通版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#fdf6f8;padding-bottom:80px;}
/*登录弹窗*/
.login-wrap{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{width:85%;background:#fff;border-radius:16px;padding:20px;}
.tab-btn{display:inline-block;width:48%;text-align:center;padding:10px;font-size:16px;}
.tab-btn.active{color:#ff5c8d;border-bottom:2px solid #ff5c8d;}
.hide{display:none;}
input{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin:8px 0;}
.btn{width:100%;background:#ff5c8d;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;margin-top:8px;}
#userTip{text-align:right;padding:10px;color:#666;}

/*导航*/
#nav{position:fixed;top:0;left:0;width:100%;height:52px;background:#fff;display:flex;z-index:999;box-shadow:0 1px 4px #eee;}
.nav-item{flex:1;text-align:center;line-height:52px;font-size:15px;color:#666;}
.nav-item.active{color:#ff5c8d;border-bottom:3px solid #ff5c8d;font-weight:bold;}
.main{margin-top:58px;padding:15px;}
.page{display:none;}
.page.show{display:block;}
.banner{width:100%;height:140px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:bold;margin-bottom:15px;}
.form-box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
textarea{width:100%;padding:10px;border:1px solid #eee;border-radius:8px;margin:8px 0;}
.post-card{background:#fff;padding:14px;border-radius:12px;margin-bottom:12px;}
.reply-area{background:#f8f8f8;padding:10px;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>

<!--登录注册弹窗 默认显示-->
<div class="login-wrap" id="loginWrap">
<div class="login-box">
<div>
<span class="tab-btn active" onclick="switchLoginTab(0)">登录</span>
<span class="tab-btn" onclick="switchLoginTab(1)">注册</span>
</div>

<div id="loginForm">
<input id="loginAcc" placeholder="请输入账号">
<input id="loginPwd" type="password" placeholder="请输入密码">
<button class="btn" onclick="userLogin()">立即登录</button>
</div>

<div id="regForm" class="hide">
<input id="regAcc" placeholder="设置登录账号">
<input id="regName" placeholder="设置昵称（社区显示）">
<input id="regPwd" type="password" placeholder="设置登录密码">
<button class="btn" onclick="userReg()">立即注册</button>
</div>
</div>
</div>

<div id="userTip">当前游客 <span id="nowUser"></span></div>

<!--导航-->
<div id="nav">
<div class="nav-item active" onclick="goTab(0)">下单预约</div>
<div class="nav-item" onclick="goTab(1)">宠友社区</div>
<div class="nav-item" onclick="goTab(2)">商家后台</div>
</div>

<div class="main">
<div class="page show" id="p0">
<div class="banner">🐾上门萌宠喂养</div>
<div class="form-box">
<label>昵称</label>
<input id="uname">
<label>手机号</label>
<input id="phone">
<label>上门地址</label>
<input id="addr">
<label>预约时间</label>
<input type="datetime-local" id="ptime">
<label>备注</label>
<textarea id="note" rows="3"></textarea>
<button class="btn" onclick="orderSub()">立即预约</button>
</div>
</div>

<div class="page" id="p1">
<div class="banner">🐱宠友云端社区</div>
<div class="form-box">
<input id="talkContent" placeholder="登录后才可发帖">
<button class="btn" onclick="pubTalk()">发布帖子</button>
</div>
<div id="talkList">加载公共社区数据...</div>
</div>

<div class="page" id="p2">
<div class="banner">🔐商家管理中心</div>
<div class="form-box" style="text-align:center">
<p>管理员密码：123456</p >
<input type="password" id="admPwd">
<button class="btn" onclick="admLogin()">登录后台</button>
</div>
<div id="admBox" style="display:none;"></div>
</div>
</div>

<script>
//========= 本地账号系统 =========
let currentUser = null;
//切换登录注册面板
function switchLoginTab(t){
document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
event.target.classList.add('active');
if(t===0){
loginForm.classList.remove('hide');regForm.classList.add('hide');
}else{
loginForm.classList.add('hide');regForm.classList.remove('hide');
}
}
//获取用户列表
function getUserList(){
return JSON.parse(localStorage.getItem('petUserList')||'[]');
}
//注册
function userReg(){
let acc = regAcc.value.trim();
let nick = regName.value.trim();
let pwd = regPwd.value.trim();
if(!acc||!nick||!pwd){alert('账号、昵称、密码不能为空');return;}
let arr = getUserList();
let has = arr.some(x=>x.acc===acc);
if(has){alert('账号已存在，请换一个');return;}
arr.push({acc,nick,pwd});
localStorage.setItem('petUserList',JSON.stringify(arr));
alert('注册成功，请登录');
switchLoginTab(0);
}
//登录
function userLogin(){
let acc = loginAcc.value.trim();
let pwd = loginPwd.value.trim();
if(!acc||!pwd){alert('请输入账号密码');return;}
let arr = getUserList();
let u = arr.find(x=>x.acc===acc&&x.pwd===pwd);
if(!u){alert('账号或密码错误');return;}
currentUser = u;
nowUser.innerText = "欢迎："+u.nick;
loginWrap.style.display = 'none';
loadCloudTalk();
}

//页面切换
function goTab(i){
let nav = document.querySelectorAll('.nav-item');
let pg = document.querySelectorAll('.page');
nav.forEach(x=>x.classList.remove('active'));nav[i].classList.add('active');
pg.forEach(x=>x.classList.remove('show'));pg[i].classList.add('show');
if(i===1&&currentUser){loadCloudTalk();}
}

//预约本地
function getOrd(){return JSON.parse(localStorage.getItem("petOrd")||"[]")}
function saveOrd(d){localStorage.setItem("petOrd",JSON.stringify(d))}
function orderSub(){
let o={n:uname.value,p:phone.value,a:addr.value,t:ptime.value,nt:note.value};
let arr=getOrd();arr.unshift(o);saveOrd(arr);
alert("预约成功");
}

//========= 专属稳定云端公共社区 =========
const cloudUrl = "https://jsonblob.com/api/jsonBlob/1156227890123456789";
async function getCloud(){
try{
let res = await fetch(cloudUrl+"?_="+Date.now());
return await res.json()||[];
}catch(e){return [];}
}
async function setCloud(d){
await fetch(cloudUrl,{
method:"PUT",headers:{"Content-Type":"application/json"},
body:JSON.stringify(d)
});
}

//发帖 检测是否登录
async function pubTalk(){
if(!currentUser){alert('请先登录账号，才可发帖');return;}
let val = talkContent.value.trim();
if(!val){alert('内容不能为空');return;}
let list = await getCloud();
list.unshift({
id:Date.now(),
nick:currentUser.nick,
text:val,
reply:[]
});
await setCloud(list);
talkContent.value='';
loadCloudTalk();
alert('发布成功，所有人云端同步可见');
}

//加载帖子+互通回复
async function loadCloudTalk(){
let arr = await getCloud();
let html = '';
if(arr.length===0){
html = '<div style="padding:30px;text-align:center;color:#999;">暂无共享帖子</div>';
}else{
arr.forEach(item=>{
html += `<div class="post-card">
<strong>👤 ${item.nick}</strong>
<div style="margin:8px 0;">${item.text}</div>
<div class="reply-area">
<input placeholder="你的回复昵称">
<textarea placeholder="写回复"></textarea>
<button class="btn" style="padding:6px" onclick="addTalkReply(${item.id},this)">回复</button>
</
