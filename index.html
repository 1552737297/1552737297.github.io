<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>3D 迷你泰拉瑞亚</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;user-select:none;touch-action:none;}
body {overflow:hidden;background:#87CEEB;}
canvas {display:block;}

/* 手机横屏提示 */
.rotate-tip{
  position:fixed;inset:0;background:#000c;color:#fff;
  font-size:24px;display:flex;align-items:center;justify-content:center;
  z-index:9999;
}
/* 移动端操控UI */
.ctrl{position:fixed;z-index:100;pointer-events:auto;}
.left-ctrl{bottom:40px;left:20px;}
.right-ctrl{bottom:40px;right:20px;display:flex;flex-direction:column;gap:12px;}
.btn{
  width:65px;height:65px;border-radius:50%;
  background:rgba(255,255,255,0.25);border:2px solid #fff;
  color:#fff;font-size:20px;text-align:center;line-height:65px;
}
</style>
</head>
<body>
<div class="rotate-tip" id="rotateTip">请横屏游玩 3D泰拉瑞亚</div>

<div class="ctrl left-ctrl">
  <div class="btn" id="btnL">←</div>
  <div class="btn" id="btnR">→</div>
</div>
<div class="ctrl right-ctrl">
  <div class="btn" id="btnJump">跳</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>
// 横屏检测
const rotateTip = document.getElementById('rotateTip');
function checkOrient(){
  if(window.innerWidth > window.innerHeight){
    rotateTip.style.display = 'none';
  }else{
    rotateTip.style.display = 'flex';
  }
}
window.addEventListener('resize',checkOrient);
window.addEventListener('orientationchange',checkOrient);
checkOrient();

// ===== Three.js 初始化 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// 轨道控制器(拖拽视角、缩放)
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI/2 - 0.1;

// 灯光
const dirLight = new THREE.DirectionalLight(0xffffff,1);
dirLight.position.set(50,100,50);
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0xffffff,0.4));

// ===== 体素世界配置 =====
const BLOCK_SIZE = 2;
const WORLD_X = 64;
const WORLD_Z = 64;
const WORLD_Y = 32;

// 方块材质
const matGrass = new THREE.MeshLambertMaterial({color:0x3e9c36});
const matDirt = new THREE.MeshLambertMaterial({color:0x8b572a});
const matStone = new THREE.MeshLambertMaterial({color:0x888888});
const blockGeo = new THREE.BoxGeometry(BLOCK_SIZE,BLOCK_SIZE,BLOCK_SIZE);

// 存储方块方便挖矿
const blockList = [];

// 生成3D起伏地形
function createVoxelWorld(){
  for(let x = 0; x < WORLD_X; x++){
    for(let z = 0; z < WORLD_Z; z++){
      // 地表高度起伏
      let groundY = Math.floor(WORLD_Y/2 + Math.sin(x*0.25)*3 + Math.cos(z*0.25)*3);
      
      for(let y = 0; y < WORLD_Y; y++){
        let mesh;
        if(y === groundY){
          mesh = new THREE.Mesh(blockGeo,matGrass.clone());
        }else if(y > groundY && y < groundY + 6){
          mesh = new THREE.Mesh(blockGeo,matDirt.clone());
        }else if(y >= groundY + 6){
          mesh = new THREE.Mesh(blockGeo,matStone.clone());
        }else continue;

        mesh.position.set(
          (x - WORLD_X/2)*BLOCK_SIZE,
          y*BLOCK_SIZE,
          (z - WORLD_Z/2)*BLOCK_SIZE
        );
        scene.add(mesh);
        blockList.push(mesh);
      }
    }
  }
}
createVoxelWorld();

// ===== 玩家角色 =====
const playerGeo = new THREE.CapsuleGeometry(0.6,2,4,8);
const playerMat = new THREE.MeshLambertMaterial({color:0xff3333});
const player = new THREE.Mesh(playerGeo,playerMat);
player.position.set(0, WORLD_Y/2 * BLOCK_SIZE + 5, 0);
scene.add(player);

// 玩家物理
let velY = 0;
const gravity = -0.08;
const jumpPower = 1.8;
let onGround = false;

// 按键控制
const key = {left:false,right:false,jump:false};

// 移动端按钮
document.getElementById('btnL').ontouchstart=e=>{e.preventDefault();key.left=true};
document.getElementById('btnL').ontouchend=()=>key.left=false;
document.getElementById('btnR').ontouchstart=e=>{e.preventDefault();key.right=true};
document.getElementById('btnR').ontouchend=()=>key.right=false;
document.getElementById('btnJump').ontouchstart=e=>{
  e.preventDefault();if(onGround)key.jump=true;
};

// 电脑键鼠
window.addEventListener('keydown',e=>{
  if(e.key==='a')key.left=true;
  if(e.key==='d')key.right=true;
  if(e.key===' '&&onGround)key.jump=true;
});
window.addEventListener('keyup',e=>{
  if(e.key==='a')key.left=false;
  if(e.key==='d')key.right=false;
});

// ===== 3D 挖矿射线检测 =====
const raycaster = new THREE.Raycaster();
renderer.domElement.addEventListener('click',e=>{
  const mouse = new THREE.Vector2();
  mouse.x = (e.clientX/window.innerWidth)*2 -1;
  mouse.y = -(e.clientY/window.innerHeight)*2 +1;
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(blockList);
  if(intersects.length > 0){
    let obj = intersects[0].object;
    scene.remove(obj);
    const idx = blockList.indexOf(obj);
    if(idx>-1)blockList.splice(idx,1);
  }
});

// 相机初始位置
camera.position.set(30,40,30);

// 动画循环
function animate(){
  requestAnimationFrame(animate);

  // 左右移动
  if(key.left) player.position.x -= 0.3;
  if(key.right) player.position.x += 0.3;

  // 重力跳跃
  velY += gravity;
  if(key.jump){velY = jumpPower;key.jump=false;}
  player.position.y += velY;

  // 简易落地检测
  onGround = false;
  if(player.position.y <= WORLD_Y/2 * BLOCK_SIZE){
    player.position.y = WORLD_Y/2 * BLOCK_SIZE;
    velY = 0;
    onGround = true;
  }

  controls.update();
  renderer.render(scene,camera);
}
animate();

// 适配大小
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
