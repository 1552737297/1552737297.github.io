<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太空雷霆战机 - 金色机甲版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 background:#000;
display:flex;justify-content:center;align-items:center;
height:100vh;overflow:hidden;touch-action:none;
color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}
#game{
border:2px solid #ffcc00;
background:linear-gradient(#000,#10182a);
display:block;
box-shadow: 0 0 40px rgba(255,200,0,0.3), 0 0 80px rgba(255,150,0,0.15);
border-radius: 8px;
}
.ui{
position:absolute;
color:#ffcc00;
font-size:17px;
font-weight:600;
text-shadow:0 0 6px #ffcc00;
background:rgba(0,10,25,0.6);
padding: 6px 12px;
border-radius: 20px;
backdrop-filter: blur(6px);
border: 1px solid rgba(255,200,0,0.2);
}
#score{top:16px;left:16px}
#level{top:16px;left:50%;transform:translateX(-50%)}
#bossHp{
top:56px;left:50%;transform:translateX(-50%);
display:none;
min-width: 220px;
text-align: center;
}
#bomb{top:16px;right:16px}

#logo{
position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);
font-size:42px;font-weight:bold;
background: linear-gradient(90deg,#ffcc00,#ffdd66,#ffcc00);
-webkit-background-clip: text;
background-clip: text;
color:transparent;
text-shadow:0 0 20px rgba(255,200,0,0.6);
white-space:nowrap;
animation: glowPulse 2s infinite alternate;
}
@keyframes glowPulse {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.3); }
}
#author{
position:absolute;top:30%;left:50%;transform:translateX(-50%);
font-size:16px;color:#ccc;
opacity:0.9;
background:rgba(0,15,30,0.4);
padding: 6px 16px;
border-radius: 20px;
}
#startBtn{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
padding:20px 50px;
font-size:24px;
background:linear-gradient(90deg,#ffcc00,#ff9900);
color:#000;
border:none;
border-radius:50px;
font-weight:bold;
box-shadow:0 0 30px #ffcc00;
cursor:pointer;
transition: all 0.3s ease;
}
#startBtn:hover{
transform:translate(-50%,-50%) scale(1.08);
box-shadow:0 0 40px #ffcc00;
}
#startBtn:active{
transform:translate(-50%,-50%) scale(0.96);
}

#bombBtn{
position:absolute;bottom:30px;right:30px;
width:76px;height:76px;
border-radius:50%;
background:linear-gradient(135deg,#f30,#f60);
color:#fff;
font-size:16px;
font-weight:bold;
border:none;
box-shadow:0 0 20px #f30;
display:none;
transition: all 0.2s ease;
}
#bombBtn:active{
transform: scale(0.92);
box-shadow:0 0 12px #f30;
}

#defeat{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;
display:none;
z-index:10;
background:rgba(0,10,25,0.85);
padding: 50px 40px;
border-radius: 20px;
backdrop-filter: blur(12px);
border: 1px solid rgba(255,60,60,0.3);
box-shadow: 0 0 50px rgba(255,60,60,0.2);
min-width: 300px;
}
#defeatTitle{
font-size:52px;
font-weight:bold;
background: linear-gradient(90deg,#f30,#f60);
-webkit-background-clip: text;
background-clip: text;
color:transparent;
text-shadow:0 0 25px #f30;
margin-bottom:24px;
}
#defeatInfo{
font-size:20px;
color:#fff;
margin-bottom:34px;
line-height:1.7;
opacity: 0.9;
}
#restartBtn{
padding:18px 46px;
font-size:22px;
background:linear-gradient(90deg,#f30,#f60);
color:#fff;
border:none;
border-radius:50px;
font-weight:bold;
box-shadow:0 0 30px #f30;
cursor:pointer;
transition: all 0.3s ease;
}
#restartBtn:hover{
transform: scale(1.06);
box-shadow:0 0 40px #f30;
}
#restartBtn:active{
transform: scale(0.94);
}
</style>
</head>
<body>
<div id="logo">太空雷霆战机</div>
<div id="author">金色机甲·终极版</div>
<div id="score" class="ui">分数：0</div>
<div id="level" class="ui">关卡：1</div>
<div id="bossHp" class="ui">BOSS 血量：</div>
<div id="bomb" class="ui">炸弹：0</div>
<button id="startBtn">开始游戏</button>
<button id="bombBtn">全屏炸弹</button>

<div id="defeat">
  <div id="defeatTitle">战 败</div>
  <div id="defeatInfo"></div>
  <button id="restartBtn">重新挑战</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const levelText = document.getElementById('level');
const bossHpText = document.getElementById('bossHp');
const bombText = document.getElementById('bomb');
const startBtn = document.getElementById('startBtn');
const bombBtn = document.getElementById('bombBtn');
const logo = document.getElementById('logo');
const author = document.getElementById('author');
const defeat = document.getElementById('defeat');
const defeatInfo = document.getElementById('defeatInfo');
const restartBtn = document.getElementById('restartBtn');

canvas.width = 375;
canvas.height = 667;

// 直接用网络图片，不需要你本地图片，100%能跑
const imgPlayer = new Image();
const imgEnemy = new Image();
const imgBoss  = new Image();
const imgBg    = new Image();
const imgBoom  = new Image();

imgPlayer.src = "https://picsum.photos/id/1076/300/300";
imgEnemy.src  = "https://picsum.photos/id/1048/200/200";
imgBoss.src   = "https://picsum.photos/id/1074/400/300";
imgBg.src     = "https://picsum.photos/id/1039/800/1600";
imgBoom.src   = "https://picsum.photos/id/65/200/200";

// 音效
const audioShoot = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3");
const audioBoom  = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3");
const audioBomb  = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-mechanical-bling-210.mp3");
const audioItem  = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-coin-collection-215.mp3");

let gameRunning = false;
let score = 0;
let level = 1;
let bossSpawnTimer = null;
let bgY = 0;

const player = {
  x: canvas.width/2-25, y: canvas.height*0.8, w:50, h:60,
  shield:true, weaponLevel:1, laserTime:0,
  invincibleTime:0, bombCount:0,
  wing1:false, wing2:false, magnetTime:0
};

let bullets = [];
let enemies = [];
let items = [];
let effects = [];
let followMissiles = [];
let boss = null;
let bossBullets = [];

canvas.addEventListener('touchmove', e=>{
  if(!gameRunning) return;
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  player.x = t.clientX - r.left - player.w/2;
  player.y = t.clientY - r.top - player.h/2;
  if(player.x < 0) player.x = 0;
  if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;
  if(player.y < 0) player.y = 0;
  if(player.y + player.h > canvas.height) player.y = canvas.height - player.h;
});

bombBtn.onclick = () => {
  if(player.bombCount <= 0) return;
  player.bombCount--;
  bombText.innerText = '炸弹：'+player.bombCount;
  audioBomb.play();
  for(let i=0;i<enemies.length;i++) boom(enemies[i].x+enemies[i].w/2, enemies[i].y+enemies[i].h/2);
  enemies = [];
  bossBullets = [];
  if(boss) boss.hp -= 10;
}

function shoot(){
  if(!gameRunning) return;
  audioShoot.play();
  if(player.laserTime > 0){
    bullets.push({type:'laser',x:player.x+player.w/2-10,y:player.y,w:20,h:60,speed:14,color:'#f0f'});
  } else {
    if(player.weaponLevel>=1) bullets.push({type:'normal',x:player.x+23,y:player.y,w:4,h:14,speed:9,color:'#ffcc00'});
    if(player.weaponLevel>=2){
      bullets.push({type:'normal',x:player.x+5,y:player.y+10,w:4,h:14,speed:9,color:'#ffcc00'});
      bullets.push({type:'normal',x:player.x+41,y:player.y+10,w:4,h:14,speed:9,color:'#ffcc00'});
    }
    if(player.weaponLevel>=3){
      bullets.push({type:'normal',x:player.x-5,y:player.y+20,w:4,h:14,speed:8,color:'#ffcc00'});
      bullets.push({type:'normal',x:player.x+50,y:player.y+20,w:4,h:14,speed:8,color:'#ffcc00'});
    }
  }
  if(player.wing1) bullets.push({type:'normal',x:player.x-12,y:player.y+25,w:3,h:12,speed:8,color:'#ffcc00'});
  if(player.wing2) bullets.push({type:'normal',x:player.x+58,y:player.y+25,w:3,h:12,speed:8,color:'#ffcc00'});
}

function fireFollowMissile(){
  if(!gameRunning || enemies.length === 0) return;
  let t = enemies[Math.floor(Math.random()*enemies.length)];
  followMissiles.push({x:player.x+player.w/2,y:player.y,target:t,w:8,h:12,speed:6,color:'#f80'});
}

function createEnemy(){
  if(!gameRunning || boss) return;
  let speed = 2.6 + level*0.3 + Math.random()*1.8;
  enemies.push({x:Math.random()*(canvas.width-36),y:-40,w:36,h:44,speed:speed,hp:1});
}

function spawnBoss(){
  if(!gameRunning || boss) return;
  let hp = 40 + level*25;
  let size = 140 + level*12;
  if(size > 210) size = 210;
  boss = {
    x: canvas.width/2 - size/2, y: 50,
    w: size, h: size*0.75,
    hp: hp, maxHp: hp,
    speed: 1.3 + level*0.22, dir: 1, level: level, attackTimer: 0
  };
  bossHpText.style.display = 'block';
}

function bossAttack(){
  if(!gameRunning || !boss) return;
  boss.attackTimer++;
  let cd = Math.max(18, 55 - level*9);
  if(boss.attackTimer >= cd){
    boss.attackTimer = 0;
    let cnt = 4 + level*2;
    for(let i=0;i<cnt;i++){
      let ang = (Math.PI*2/cnt)*i;
      let sp = 3.2 + level*0.5;
      bossBullets.push({
        x: boss.x + boss.w/2, y: boss.y + boss.h/2,
        vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
        w: 8, h:8, color:'#f44'
      });
    }
  }
}

function collide(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function boom(x,y){
  effects.push({x,y,t:0,max:14});
  audioBoom.play();
}

function dropItem(x,y){
  const list = ['weapon','shield','laser','wing','bomb','invincible','magnet','score'];
  let type = list[Math.floor(Math.random()*list.length)];
  items.push({x,y,w:26,h:26,type,speed:2});
}

// ====================== 金色机甲战机绘制 ======================
function drawPlayer(){
  if(player.invincibleTime>0 && Math.floor(Date.now()/120)%2==0) return;
  const cx = player.x + 25;
  const cy = player.y + 30;

  const goldBody = '#ffcc00';
  const goldLight = '#ffdd66';
  const goldDark = '#cc9900';
  const goldGlow = '#ffff00';

  ctx.fillStyle = goldBody;
  ctx.beginPath();
  ctx.moveTo(cx, player.y);
  ctx.lineTo(player.x + 5, player.y + 30);
  ctx.lineTo(player.x + 10, player.y + 55);
  ctx.lineTo(cx, player.y + 60);
  ctx.lineTo(player.x + 40, player.y + 55);
  ctx.lineTo(player.x + 45, player.y + 30);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = goldDark;
  ctx.fillRect(cx-8, player.y+15, 16, 6);
  ctx.fillRect(cx-6, player.y+25, 12, 5);

  ctx.fillStyle = goldGlow;
  ctx.beginPath();
  ctx.arc(cx, player.y + 8, 6, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = goldGlow;
  ctx.fillRect(cx - 5, player.y + 52, 10, 10);
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 2, player.y + 54, 4, 6);

  // 左机甲翅膀
  if(player.wing1){
    ctx.fillStyle = goldBody;
    ctx.beginPath();
    ctx.moveTo(player.x + 10, player.y + 25);
    ctx.lineTo(player.x - 22, player.y + 35);
    ctx.lineTo(player.x - 22, player.y + 55);
    ctx.lineTo(player.x + 10, player.y + 40);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = goldLight;
    ctx.fillRect(player.x - 18, player.y + 40, 8, 8);
  }

  // 右机甲翅膀
  if(player.wing2){
    ctx.fillStyle = goldBody;
    ctx.beginPath();
    ctx.moveTo(player.x + 40, player.y + 25);
    ctx.lineTo(player.x + 72, player.y + 35);
    ctx.lineTo(player.x + 72, player.y + 55);
    ctx.lineTo(player.x + 40, player.y + 40);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = goldLight;
    ctx.fillRect(player.x + 60, player.y + 40, 8, 8);
  }

  // 金色护盾
  if(player.shield){
    ctx.strokeStyle = goldGlow; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(cx, cy, 42, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = goldLight; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx, cy, 37, 0, Math.PI*2); ctx.stroke();
  }
}

function drawEnemy(e){
  ctx.fillStyle = '#ff2255';
  ctx.beginPath();
  ctx.moveTo(e.x + e.w/2, e.y);
  ctx.lineTo(e.x, e.y + e.h);
  ctx.lineTo(e.x + e.w, e.y + e.h);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(e.x + e.w/2 - 2, e.y + 10, 4, 6);
}

// ====================== 纯代码金色机甲BOSS ======================
function drawBoss(){
  if(!boss) return;
  
  // 金色机甲配色
  const goldBody = '#ffcc00';
  const goldLight = '#ffdd66';
  const goldDark = '#cc9900';
  const goldGlow = '#ffff00';

  // 1. 机甲主体（硬朗矩形+棱角）
  const grd = ctx.createLinearGradient(boss.x, boss.y, boss.x, boss.y + boss.h);
  grd.addColorStop(0, goldBody);
  grd.addColorStop(1, goldDark);
  ctx.fillStyle = grd;
  ctx.fillRect(boss.x, boss.y, boss.w, boss.h);

  // 2. 机甲装甲分割线
  ctx.fillStyle = goldDark;
  ctx.fillRect(boss.x + boss.w*0.2, boss.y, 4, boss.h);
  ctx.fillRect(boss.x + boss.w*0.8, boss.y, 4, boss.h);
  ctx.fillRect(boss.x, boss.y + boss.h*0.3, boss.w, 4);
  ctx.fillRect(boss.x, boss.y + boss.h*0.7, boss.w, 4);

  // 3. 顶部主炮台（发光核心）
  ctx.fillStyle = goldGlow;
  ctx.beginPath();
  ctx.arc(boss.x + boss.w/2, boss.y + 20, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 4. 左右侧副炮台
  ctx.fillStyle = goldLight;
  ctx.fillRect(boss.x + 25, boss.y + boss.h - 30, 20, 15);
  ctx.fillRect(boss.x + boss.w - 45, boss.y + boss.h - 30, 20, 15);
  
  ctx.fillStyle = goldGlow;
  ctx.fillRect(boss.x + 30, boss.y + boss.h - 26, 10, 7);
  ctx.fillRect(boss.x + boss.w - 40, boss.y + boss.h - 26, 10, 7);

  // 5. 机甲翅膀/侧翼装饰
  ctx.fillStyle = goldBody;
  ctx.beginPath();
  ctx.moveTo(boss.x, boss.y + boss.h*0.5);
  ctx.lineTo(boss.x - 20, boss.y + boss.h*0.3);
  ctx.lineTo(boss.x - 20, boss.y + boss.h*0.7);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(boss.x + boss.w, boss.y + boss.h*0.5);
  ctx.lineTo(boss.x + boss.w + 20, boss.y + boss.h*0.3);
  ctx.lineTo(boss.x + boss.w + 20, boss.y + boss.h*0.7);
  ctx.closePath();
  ctx.fill();
}

function drawBullet(b){
  ctx.fillStyle = b.color;
  ctx.fillRect(b.x, b.y, b.w, b.h);
}

function drawMissile(m){
  ctx.fillStyle = m.color;
  ctx.fillRect(m.x, m.y, m.w, m.h);
}

function drawItem(it){
  const colMap = {
    weapon:'#ffcc00',
    shield:'#ffdd66',
    laser:'#ff00ff',
    wing:'#00ff88',
    bomb:'#ff3300',
    invincible:'#ffff88',
    magnet:'#00ffcc',
    score:'#ff66ff'
  };
  ctx.fillStyle = colMap[it.type];
  ctx.beginPath();
  ctx.arc(it.x+it.w/2, it.y+it.h/2, it.w/2, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawEffect(ef){
  let s = ef.t * 3.5;
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.arc(ef.x, ef.y, s, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.arc(ef.x, ef.y, s * 0.6, 0, Math.PI*2);
  ctx.fill();
}

// ====================== 主循环 ======================
function loop(){
  try {
    if(!gameRunning) return;
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 滚动星空背景
    ctx.drawImage(imgBg, 0, bgY, canvas.width, canvas.height);
    ctx.drawImage(imgBg, 0, bgY - canvas.height, canvas.width, canvas.height);
    bgY += 1;
    if(bgY >= canvas.height) bgY = 0;

    if(player.laserTime>0) player.laserTime -= 16;
    if(player.invincibleTime>0) player.invincibleTime -= 16;
    if(player.magnetTime>0) player.magnetTime -= 16;

    drawPlayer();
    bossAttack();

    for(let i=bullets.length-1;i>=0;i--){
      let b = bullets[i]; b.y -= b.speed; drawBullet(b);
      if(b.y < -20) bullets.splice(i,1);
    }

    for(let i=followMissiles.length-1;i>=0;i--){
      let m = followMissiles[i];
      if(!m.target || enemies.indexOf(m.target)===-1){followMissiles.splice(i,1);continue;}
      let dx=m.target.x+10-m.x, dy=m.target.y+10-m.y, d=Math.hypot(dx,dy)||1;
      m.x+=dx/d*m.speed; m.y+=dy/d*m.speed; drawMissile(m);
      if(collide(m,m.target)){boom(m.x,m.y);m.target.hp=0;followMissiles.splice(i,1);}
    }

    for(let i=items.length-1;i>=0;i--){
      let it=items[i]; it.y+=it.speed;
      if(player.magnetTime>0){
        let dx=player.x+player.w/2-it.x, dy=player.y+player.h/2-it.y, d=Math.hypot(dx,dy)||1;
        if(d<130){it.x+=dx/d*4.2;it.y+=dy/d*4.2;}
      }
      drawItem(it);
      if(collide(player,it)){
        audioItem.play();
        if(it.type==='weapon'){if(player.weaponLevel<3)player.weaponLevel++;}
        if(it.type==='shield')player.shield=true;
        if(it.type==='laser')player.laserTime=5500;
        if(it.type==='wing'){if(!player.wing1)player.wing1=true;else player.wing2=true;}
        if(it.type==='bomb'){player.bombCount++;bombText.innerText='炸弹：'+player.bombCount;}
        if(it.type==='invincible')player.invincibleTime=5500;
        if(it.type==='magnet')player.magnetTime=5500;
        if(it.type==='score'){score+=100;scoreText.innerText='分数：'+score;}
        items.splice(i,1);
      }
      if(it.y>canvas.height)items.splice(i,1);
    }

    for(let i=enemies.length-1;i>=0;i--){
      let e=enemies[i]; e.y+=e.speed; drawEnemy(e);
      if(collide(player,e)){
        if(player.shield){boom(e.x,e.y);enemies.splice(i,1);player.shield=false;continue;}
        if(player.invincibleTime>0){boom(e.x,e.y);enemies.splice(i,1);continue;}
        gameOver();return;
      }
      if(e.y>canvas.height+50)enemies.splice(i,1);
    }

    if(boss){
      bossHpText.innerText=`BOSS ${level} 血量：${boss.hp}/${boss.maxHp}`;
      boss.x+=boss.speed*boss.dir;
      if(boss.x<20||boss.x+boss.w>canvas.width-20)boss.dir*=-1;
      drawBoss();
      for(let i=bossBullets.length-1;i>=0;i--){
        let b=bossBullets[i]; b.x+=b.vx; b.y+=b.vy;
        ctx.fillStyle=b.color; ctx.beginPath(); ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w/2,0,Math.PI*2); ctx.fill();
        if(collide(player,b)){
          if(player.shield){player.shield=false;bossBullets.splice(i,1);continue;}
          if(player.invincibleTime>0){bossBullets.splice(i,1);continue;}
          gameOver();return;
        }
        if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height)bossBullets.splice(i,1);
      }
      for(let i=bullets.length-1;i>=0;i--){
        if(boss&&collide(bullets[i],boss)){
          bullets.splice(i,1);boss.hp--;
          if(boss.hp<=0){
            boom(boss.x+boss.w/2,boss.y+boss.h/2);
            score+=800*level;scoreText.innerText='分数：'+score;
            boss=null;bossBullets=[];bossHpText.style.display='none';
            level++;levelText.innerText='关卡：'+level;
            if(bossSpawnTimer)clearTimeout(bossSpawnTimer);
            bossSpawnTimer=setTimeout(spawnBoss,9000);
          }
        }
      }
      if(collide(player,boss)){if(player.invincibleTime<=0){gameOver();return;}}
    }

    for(let i=bullets.length-1;i>=0;i--){
      for(let j=enemies.length-1;j>=0;j--){
        if(collide(bullets[i],enemies[j])){
          bullets.splice(i,1);enemies[j].hp--;
          if(enemies[j].hp<=0){
            boom(enemies[j].x+enemies[j].w/2,enemies[j].y+enemies[j].h/2);
            if(Math.random()<0.45)dropItem(enemies[j].x,enemies[j].y);
            enemies.splice(j,1);score+=20;scoreText.innerText='分数：'+score;
            break;
          }
        }
      }
    }

    for(let i=effects.length-1;i>=0;i--){let ef=effects[i];ef.t++;drawEffect(ef);if(ef.t>=ef.max)effects.splice(i,1);}

    requestAnimationFrame(loop);
  }catch(err){console.error(err);requestAnimationFrame(loop);}
}

function start(){
  gameRunning=true;score=0;level=1;
  player.weaponLevel=1;player.laserTime=0;player.shield=true;
  player.wing1=false;player.wing2=false;player.bombCount=0;
  player.invincibleTime=0;player.magnetTime=0;
  scoreText.innerText='分数：0';levelText.innerText='关卡：1';bombText.innerText='炸弹：0';
  bullets=[];enemies=[];effects=[];items=[];followMissiles=[];boss=null;bossBullets=[];
  player.x=canvas.width/2-25;player.y=canvas.height*0.8;
  if(bossSpawnTimer)clearTimeout(bossSpawnTimer);bossSpawnTimer=setTimeout(spawnBoss,30000);
  logo.style.display='none';author.style.display='none';startBtn.style.display='none';bombBtn.style.display='block';defeat.style.display='none';
  if(window.shootInterval)clearInterval(window.shootInterval);
  if(window.enemyInterval)clearInterval(window.enemyInterval);
  if(window.missileInterval)clearInterval(window.missileInterval);
  window.shootInterval=setInterval(shoot,220);
  window.enemyInterval=setInterval(createEnemy,1100);
  window.missileInterval=setInterval(fireFollowMissile,1200);
  loop();
}

function gameOver(){
  gameRunning=false;
  if(bossSpawnTimer)clearTimeout(bossSpawnTimer);
  clearInterval(window.shootInterval);clearInterval(window.enemyInterval);clearInterval(window.missileInterval);
  defeatInfo.innerHTML=`最高关卡：${level}<br>最终得分：${score}<br>再接再厉！`;
  defeat.style.display='block';bombBtn.style.display='none';
}

restartBtn.onclick=start;
startBtn.onclick=start;
</script>
