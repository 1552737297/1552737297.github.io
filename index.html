<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<!-- 完美手机端视口适配 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>宠物上门喂养 · 社区</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:PingFang SC,Microsoft Yahei;}
body{background:#f5f7fa;font-size:14px;padding-bottom:120rpx;}

/* 登录卡片 */
.login-box{background:#fff;margin:15px;border-radius:12px;padding:20px;}
.user-txt{font-size:16px;margin-bottom:12px;color:#333;}
input{width:100%;height:44px;padding:0 12px;border:1px solid #eee;border-radius:8px;margin-bottom:10px;}

/* 按钮手机适配 */
.btn-row{display:flex;gap:10px;}
button{flex:1;height:42px;border:none;border-radius:8px;font-size:14px;}
.btn-blue{background:#07c160;color:#fff;}
.btn-gray{background:#eeeeee;color:#666;}

/* 发帖区域 */
.pub-box{background:#fff;margin:15px;border-radius:12px;padding:20px;}
textarea{width:100%;height:90px;border:1px solid #eee;border-radius:8px;padding:12px;resize:none;}

/* 帖子列表 */
.list-box{background:#fff;margin:15px;border-radius:12px;padding:20px;}
.title-line{font-size:15px;font-weight:bold;margin-bottom:15px;color:#333;}
.post-item{padding:15px 0;border-bottom:1px solid #f5f5f5;}
.post-nick{color:#07c160;font-size:13px;margin-bottom:6px;}
.post-time{color:#999;font-size:12px;margin:4px 0;}
</style>
</head>
<body>

<!-- 顶部登录 -->
<div class="login-box">
  <div class="user-txt" id="userInfo">未登录，请输入昵称</div>
  <input id="nick" placeholder="请输入你的昵称" />
  <div class="btn-row">
    <button class="btn-blue" onclick="login()">立即登录</button>
    <button class="btn-gray" onclick="logout()">退出登录</button>
  </div>
</div>

<!-- 发帖模块 -->
<div class="pub-box">
  <textarea id="content" placeholder="分享上门喂宠、寄养心得..."></textarea>
  <div class="btn-row" style="margin-top:10px;">
    <button class="btn-blue" onclick="publish()">发布动态</button>
    <button class="btn-gray" onclick="refreshAllPost()">刷新全部帖子</button>
  </div>
</div>

<!-- 全局社区动态 -->
<div class="list-box">
  <div class="title-line">🌐 所有人社区动态</div>
  <div id="allPost"></div>
</div>

<!-- 我的发布 -->
<div class="list-box">
  <div class="title-line">🙋 我的发布</div>
  <div id="myPost"></div>
</div>

<script>
// 本地持久化登录 - 手机刷新不掉号
function setUser(info){
  localStorage.setItem("petMobileUser",JSON.stringify(info));
}
function getUser(){
  let s = localStorage.getItem("petMobileUser");
  return s ? JSON.parse(s) : null;
}
function logout(){
  localStorage.removeItem("petMobileUser");
  alert("已退出登录");
  renderUser();
}
function login(){
  let nick = document.getElementById("nick").value.trim();
  if(!nick){
    alert("请输入昵称");
    return;
  }
  let user = {
    userId: Date.now() + "_" + Math.random().toFixed(3),
    nick: nick
  };
  setUser(user);
  renderUser();
  alert("登录成功");
}
function renderUser(){
  let u = getUser();
  document.getElementById("userInfo").innerText = u ? "✅ 已登录："+u.nick : "未登录，请输入昵称";
}

// 模拟云端公共仓库 解决：看不到别人数据、本地云端冲突
const CLOUD_POST_KEY = "petGlobalCloudData";
function getCloudList(){
  let str = localStorage.getItem(CLOUD_POST_KEY);
  return str ? JSON.parse(str) : [];
}
function saveCloudList(arr){
  localStorage.setItem(CLOUD_POST_KEY, JSON.stringify(arr));
}

// 发布帖子同步云端
function publish(){
  let user = getUser();
  if(!user){
    alert("请先登录");
    return;
  }
  let val = document.getElementById("content").value.trim();
  if(!val){
    alert("内容不能为空");
    return;
  }
  let list = getCloudList();
  list.unshift({
    userId: user.userId,
    nick: user.nick,
    content: val,
    time: new Date().toLocaleString()
  });
  saveCloudList(list);
  document.getElementById("content").value = "";
  alert("发布成功，点刷新即可互相查看");
  refreshAllPost();
}

// 核心修复：双向拉取公共云端，根治不同步
function refreshAllPost(){
  let list = getCloudList();
  let html = "";
  if(list.length === 0){
    html = '<div class="post-item">暂无任何人发布动态</div>';
  }else{
    list.forEach(item=>{
      html += `
      <div class="post-item">
        <div class="post-nick">${item.nick}</div>
        <div>${item.content}</div>
        <div class="post-time">${item.time}</div>
      </div>
      `;
    });
  }
  document.getElementById("allPost").innerHTML = html;
  renderMyPost();
}

// 只展示自己的帖子
function renderMyPost(){
  let user = getUser();
  if(!user){
    document.getElementById("myPost").innerHTML = '<div class="post-item">请先登录查看自己发布</div>';
    return;
  }
  let all = getCloudList();
  let mine = all.filter(p=>p.userId === user.userId);
  let html = "";
  if(mine.length === 0){
    html = '<div class="post-item">你还没有发布内容</div>';
  }else{
    mine.forEach(item=>{
      html += `
      <div class="post-item">
        <div>${item.content}</div>
        <div class="post-time">${item.time}</div>
      </div>
      `;
    });
  }
  document.getElementById("myPost").innerHTML = html;
}

// 手机打开自动初始化
window.onload = function(){
  renderUser();
  refreshAllPost();
}
</script>

</body>
</html>
