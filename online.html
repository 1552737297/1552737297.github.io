<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空雷霆战机 - 双人本地联机（终极无错版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;color:#fff;font-family:system-ui;
display:flex;justify-content:center;align-items:center;height:100vh;
}
#game{border:2px solid #0ef;background:#000612}
.ui{position:absolute;color:#0ef;background:#0018;padding:4px 10px;border-radius:6px}
#roomUi{top:10px;left:10px}
#roomInput{padding:6px;width:100px;background:#112;color:#0ef;border:1px solid #0ef}
#roomBtn{padding:6px 10px;background:#0ef;color:#000;border:none;border-radius:4px}
#status{top:10px;right:10px}
#levelUi{top:45px;left:10px}
</style>
</head>
<body>

<div class="ui" id="roomUi">
房间：<input id="roomInput" value="1111" maxlength="6">
<button id="roomBtn">连接双人</button>
</div>
<div class="ui" id="status">状态：未连接</div>
<div class="ui" id="levelUi">战机 Lv.1</div>

<canvas id="game" width="375" height="667"></canvas>

<script>
// ============================
// 纯本地联机（无服务器！）
// ============================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const roomInput = document.getElementById('roomInput');
const roomBtn = document.getElementById('roomBtn');
const statusText = document.getElementById('status');
const levelUi = document.getElementById('levelUi');

let roomId = "";
let connected = false;
let channel = null;

// 我
let me = {
  id: Math.random().toString(36).slice(2),
  x: 160, y: 520, level:1
};

// 队友
let other = null;
let rainbowOffset = 0;

// ============================
// 本地广播联机（100%无404）
// ============================
function connect() {
  roomId = roomInput.value.trim();
  try {
    if (channel) channel.close();
    channel = new BroadcastChannel(roomId);
    
    channel.onmessage = (e) => {
      if (e.data.from === me.id) return;
      other = e.data;
      connected = true;
      statusText.textContent = "状态：联机成功";
    };
    
    statusText.textContent = "状态：等待队友";
    setInterval(() => {
      channel.postMessage({
        from: me.id,
        x: me.x, y: me.y, level: me.level
      });
    }, 50);
    
  } catch(e) {
    statusText.textContent = "状态：连接失败";
  }
}

// ============================
// 战机绘制（对称+机翼+Lv6流光）
// ============================
function getColor(level) {
  if (level >= 6) {
    rainbowOffset += 2;
    return `hsl(${rainbowOffset % 360}, 100%, 65%)`;
  }
  return "#0ef";
}

function drawJet(x, y, scale, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + 25*scale, y);
  ctx.lineTo(x + 10*scale, y + 40*scale);
  ctx.lineTo(x + 15*scale, y + 55*scale);
  ctx.lineTo(x + 25*scale, y + 60*scale);
  ctx.lineTo(x + 35*scale, y + 55*scale);
  ctx.lineTo(x + 40*scale, y + 40*scale);
  ctx.closePath();
  ctx.fill();

  // 左机翼
  ctx.beginPath();
  ctx.moveTo(x + 12*scale, y + 38*scale);
  ctx.lineTo(x - 18*scale, y + 48*scale);
  ctx.lineTo(x - 18*scale, y + 58*scale);
  ctx.lineTo(x + 12*scale, y + 48*scale);
  ctx.fill();

  // 右机翼
  ctx.beginPath();
  ctx.moveTo(x + 38*scale, y + 38*scale);
  ctx.lineTo(x + 68*scale, y + 48*scale);
  ctx.lineTo(x + 68*scale, y + 58*scale);
  ctx.lineTo(x + 38*scale, y + 48*scale);
  ctx.fill();
}

function drawPlayer(p) {
  if (!p) return;
  const c = getColor(p.level);
  const f = Math.min(4, p.level);

  drawJet(p.x, p.y, 1, c);
  if (f >= 2) { drawJet(p.x-50,p.y+10,0.7,c); drawJet(p.x+50,p.y+10,0.7,c); }
  if (f >= 3) { drawJet(p.x-30,p.y-12,0.6,c); drawJet(p.x+30,p.y-12,0.6,c); }
  if (f >= 4) { drawJet(p.x-65,p.y+20,0.55,c); drawJet(p.x+65,p.y+20,0.55,c); }
}

// ============================
// 控制
// ============================
canvas.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect();
  me.x = e.clientX - r.left - 25;
  me.y = e.clientY - r.top - 30;
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  me.x = e.touches[0].clientX - r.left - 25;
  me.y = e.touches[0].clientY - r.top - 30;
});

// ============================
// 自动升级
// ============================
let lvTimer = 0;
function autoLevel() {
  if (me.level >= 10) return;
  lvTimer++;
  if (lvTimer > 200) {
    me.level++;
    levelUi.textContent = `战机 Lv.${me.level}`;
    lvTimer = 0;
  }
}

// ============================
// 主循环
// ============================
function loop() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,375,667);
  
  autoLevel();
  drawPlayer(me);
  drawPlayer(other);
  
  requestAnimationFrame(loop);
}

roomBtn.onclick = connect;
loop();
</script>
</body>
</html>
